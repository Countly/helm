apiVersion: v1
kind: Pod
metadata:
  name: {{ include "countly-kafka.fullname" . }}-test-connection
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "countly-kafka.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
  - name: test
    image: busybox:1.35
    command: ['sh', '-c', 'nc -z {{ include "countly-kafka.fullname" . }}-kafka-bootstrap 9092']
