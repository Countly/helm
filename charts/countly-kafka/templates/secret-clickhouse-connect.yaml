{{- if and .Values.kafkaConnect.enabled (not .Values.kafkaConnect.clickhouse.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.kafkaConnect.clickhouse.secretName }}
  labels:
    {{- include "countly-kafka.labels" . | nindent 4 }}
  annotations:
    {{- if .Values.secrets.keep }}
    helm.sh/resource-policy: keep
    {{- end }}
type: Opaque
data:
  {{- $secretName := .Values.kafkaConnect.clickhouse.secretName }}
  {{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
  {{- if and $existing (not .Values.kafkaConnect.clickhouse.password) }}
  username: {{ index $existing.data "username" }}
  password: {{ index $existing.data "password" }}
  {{- else if .Values.kafkaConnect.clickhouse.password }}
  username: {{ .Values.kafkaConnect.clickhouse.username | b64enc }}
  password: {{ .Values.kafkaConnect.clickhouse.password | b64enc }}
  {{- else }}
  {{- fail "kafkaConnect.clickhouse.password is required on first install. Set the value or provide kafkaConnect.clickhouse.existingSecret." }}
  {{- end }}
{{- end }}
