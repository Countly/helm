{{- if and .Values.kafkaConnect.enabled (eq (.Values.secrets.mode | default "values") "externalSecret") (not .Values.kafkaConnect.clickhouse.existingSecret) }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.kafkaConnect.clickhouse.secretName }}
  labels:
    {{- include "countly-kafka.labels" . | nindent 4 }}
  annotations:
    {{- include "countly-kafka.syncWave" (dict "wave" "0" "root" .) | nindent 4 }}
spec:
  refreshInterval: {{ .Values.secrets.externalSecret.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ required "secrets.externalSecret.secretStoreRef.name is required when secrets.mode=externalSecret" .Values.secrets.externalSecret.secretStoreRef.name }}
    kind: {{ .Values.secrets.externalSecret.secretStoreRef.kind | default "ClusterSecretStore" }}
  target:
    name: {{ .Values.kafkaConnect.clickhouse.secretName }}
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        {{- if not .Values.secrets.externalSecret.remoteRefs.clickhouse.username }}
        username: {{ .Values.kafkaConnect.clickhouse.username | quote }}
        {{- end }}
        {{- if not .Values.secrets.externalSecret.remoteRefs.clickhouse.password }}
        password: {{ .Values.kafkaConnect.clickhouse.password | quote }}
        {{- end }}
  data:
    {{- if .Values.secrets.externalSecret.remoteRefs.clickhouse.username }}
    - secretKey: username
      remoteRef:
        key: {{ required "secrets.externalSecret.remoteRefs.clickhouse.username is required when secrets.mode=externalSecret" .Values.secrets.externalSecret.remoteRefs.clickhouse.username }}
    {{- end }}
    {{- if .Values.secrets.externalSecret.remoteRefs.clickhouse.password }}
    - secretKey: password
      remoteRef:
        key: {{ required "secrets.externalSecret.remoteRefs.clickhouse.password is required when secrets.mode=externalSecret" .Values.secrets.externalSecret.remoteRefs.clickhouse.password }}
    {{- end }}
{{- end }}
