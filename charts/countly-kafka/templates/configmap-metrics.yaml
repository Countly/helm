{{- if .Values.metrics.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "countly-kafka.fullname" . }}-metrics
  labels:
    {{- include "countly-kafka.labels" . | nindent 4 }}
data:
  kafka-metrics-config.yml: |
    lowercaseOutputName: true
    lowercaseOutputLabelNames: true
    rules:
      - pattern: "kafka.server<type=(.+), name=(.+), clientId=(.+), topic=(.+), partition=(.*)>Value"
        name: "kafka_server_$1_$2"
        type: GAUGE
        labels:
          clientId: "$3"
          topic: "$4"
          partition: "$5"
      - pattern: "kafka.server<type=(.+), name=(.+), clientId=(.+), brokerHost=(.+), brokerPort=(.+)>Value"
        name: "kafka_server_$1_$2"
        type: GAUGE
        labels:
          clientId: "$3"
          broker: "$4:$5"
      - pattern: "kafka.server<type=(.+), name=(.+)>Value"
        name: "kafka_server_$1_$2"
        type: GAUGE
      - pattern: "kafka.server<type=(.+), name=(.+)>Count"
        name: "kafka_server_$1_$2_total"
        type: COUNTER
      - pattern: "kafka.network<type=(.+), name=(.+)>Value"
        name: "kafka_network_$1_$2"
        type: GAUGE
      - pattern: "kafka.network<type=(.+), name=(.+), request=(.+)>Count"
        name: "kafka_network_$1_$2_total"
        type: COUNTER
        labels:
          request: "$3"
      - pattern: "kafka.log<type=(.+), name=(.+), topic=(.+), partition=(.+)>Value"
        name: "kafka_log_$1_$2"
        type: GAUGE
        labels:
          topic: "$3"
          partition: "$4"
  connect-metrics-config.yml: |
    lowercaseOutputName: true
    lowercaseOutputLabelNames: true
    rules:
      - pattern: "kafka.connect<type=(.+), connector=(.+), task=(.+)><>(.+): (.+)"
        name: "kafka_connect_$1_$4"
        type: GAUGE
        labels:
          connector: "$2"
          task: "$3"
      - pattern: "kafka.connect<type=connect-worker-metrics>([a-z-]+)"
        name: "kafka_connect_worker_$1"
        type: GAUGE
      - pattern: "kafka.connect<type=connect-metrics, client-id=(.+)><>(.+)"
        name: "kafka_connect_$2"
        type: GAUGE
        labels:
          client_id: "$1"
{{- end }}
