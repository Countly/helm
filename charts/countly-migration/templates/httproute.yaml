{{- if .Values.gateway.enabled }}
{{- $gwName := ternary (include "countly-migration.fullname" .) .Values.gateway.existingGateway.name .Values.gateway.create -}}
{{- $gwNamespace := ternary .Release.Namespace (.Values.gateway.existingGateway.namespace | default .Release.Namespace) .Values.gateway.create -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "countly-migration.fullname" . }}
  labels:
    {{- include "countly-migration.labels" . | nindent 4 }}
  annotations:
    {{- include "countly-migration.syncWave" (dict "wave" "11" "root" .) | nindent 4 }}
    {{- if and .Values.externalLink.enabled .Values.externalLink.url }}
    link.argocd.argoproj.io/external-link: {{ .Values.externalLink.url | quote }}
    {{- end }}
spec:
  parentRefs:
    - name: {{ $gwName }}
      namespace: {{ $gwNamespace }}
      sectionName: http
  hostnames:
    - {{ .Values.gateway.hostname | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ include "countly-migration.fullname" . }}
          port: {{ .Values.service.port }}
{{- end }}
