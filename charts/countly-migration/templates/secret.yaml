{{- if eq (.Values.secrets.mode | default "values") "values" }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "countly-migration.fullname" . }}
  labels:
    {{- include "countly-migration.labels" . | nindent 4 }}
  {{- if or .Values.secrets.keep ((.Values.argocd).enabled) }}
  annotations:
    {{- if .Values.secrets.keep }}
    helm.sh/resource-policy: keep
    {{- end }}
    {{- include "countly-migration.syncWave" (dict "wave" "1" "root" .) | nindent 4 }}
  {{- end }}
type: Opaque
data:
  {{- $secretName := include "countly-migration.fullname" . }}
  {{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
  MONGO_URI: {{ include "countly-migration.mongoUri" . | b64enc }}
  CLICKHOUSE_URL: {{ include "countly-migration.clickhouseUrl" . | b64enc }}
  {{- if .Values.backingServices.clickhouse.password }}
  CLICKHOUSE_PASSWORD: {{ .Values.backingServices.clickhouse.password | b64enc }}
  {{- else if and $existing (index $existing.data "CLICKHOUSE_PASSWORD") }}
  CLICKHOUSE_PASSWORD: {{ index $existing.data "CLICKHOUSE_PASSWORD" }}
  {{- else }}
  CLICKHOUSE_PASSWORD: {{ "" | b64enc }}
  {{- end }}
  {{- $redisUrl := include "countly-migration.redisUrl" . }}
  {{- if $redisUrl }}
  REDIS_URL: {{ $redisUrl | b64enc }}
  {{- else if and $existing (index $existing.data "REDIS_URL") }}
  REDIS_URL: {{ index $existing.data "REDIS_URL" }}
  {{- else }}
  REDIS_URL: {{ "" | b64enc }}
  {{- end }}
{{- end }}
