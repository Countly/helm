{{- if and .Values.gateway.enabled .Values.gateway.create }}
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ include "countly-migration.fullname" . }}
  labels:
    {{- include "countly-migration.labels" . | nindent 4 }}
  annotations:
    {{- include "countly-migration.syncWave" (dict "wave" "10" "root" .) | nindent 4 }}
    {{- with .Values.gateway.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  gatewayClassName: {{ .Values.gateway.className }}
  listeners:
    - name: http
      port: 80
      protocol: HTTP
      hostname: {{ .Values.gateway.hostname | quote }}
{{- end }}
