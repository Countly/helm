apiVersion: v1
kind: Pod
metadata:
  name: {{ include "countly-migration.fullname" . }}-test-health
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "countly-migration.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
  - name: test
    image: busybox:1.35
    command: ['sh', '-c', 'wget -qO- --timeout=10 http://{{ include "countly-migration.fullname" . }}:{{ .Values.service.port }}/healthz']
