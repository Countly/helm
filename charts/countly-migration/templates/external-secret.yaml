{{- if eq (.Values.secrets.mode | default "values") "externalSecret" }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "countly-migration.fullname" . }}
  labels:
    {{- include "countly-migration.labels" . | nindent 4 }}
  {{- if ((.Values.argocd).enabled) }}
  annotations:
    {{- include "countly-migration.syncWave" (dict "wave" "0" "root" .) | nindent 4 }}
  {{- end }}
spec:
  refreshInterval: {{ .Values.secrets.externalSecret.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ required "secrets.externalSecret.secretStoreRef.name is required when secrets.mode=externalSecret" .Values.secrets.externalSecret.secretStoreRef.name }}
    kind: {{ .Values.secrets.externalSecret.secretStoreRef.kind | default "ClusterSecretStore" }}
  target:
    name: {{ include "countly-migration.fullname" . }}
    creationPolicy: Owner
  data:
    - secretKey: MONGO_URI
      remoteRef:
        key: {{ required "secrets.externalSecret.remoteRefs.mongoUri is required" .Values.secrets.externalSecret.remoteRefs.mongoUri }}
    - secretKey: CLICKHOUSE_URL
      remoteRef:
        key: {{ required "secrets.externalSecret.remoteRefs.clickhouseUrl is required" .Values.secrets.externalSecret.remoteRefs.clickhouseUrl }}
    - secretKey: CLICKHOUSE_PASSWORD
      remoteRef:
        key: {{ required "secrets.externalSecret.remoteRefs.clickhousePassword is required" .Values.secrets.externalSecret.remoteRefs.clickhousePassword }}
    - secretKey: REDIS_URL
      remoteRef:
        key: {{ required "secrets.externalSecret.remoteRefs.redisUrl is required" .Values.secrets.externalSecret.remoteRefs.redisUrl }}
{{- end }}
