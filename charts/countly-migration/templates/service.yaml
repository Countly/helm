apiVersion: v1
kind: Service
metadata:
  name: {{ include "countly-migration.fullname" . }}
  labels:
    {{- include "countly-migration.labels" . | nindent 4 }}
  {{- if or ((.Values.argocd).enabled) .Values.service.annotations }}
  annotations:
    {{- include "countly-migration.syncWave" (dict "wave" "10" "root" .) | nindent 4 }}
    {{- with .Values.service.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "countly-migration.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
