apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "countly-migration.fullname" . }}
  labels:
    {{- include "countly-migration.labels" . | nindent 4 }}
  {{- if ((.Values.argocd).enabled) }}
  annotations:
    {{- include "countly-migration.syncWave" (dict "wave" "0" "root" .) | nindent 4 }}
  {{- end }}
data:
  {{- range $k, $v := .Values.config }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
  {{- /* Multi-pod worker configuration */ -}}
  {{- with .Values.worker }}
  MULTI_POD_ENABLED: {{ .enabled | quote }}
  LOCK_TTL_SECONDS: {{ .lockTtlSec | quote }}
  LOCK_RENEW_MS: {{ .lockRenewMs | quote }}
  POD_HEARTBEAT_MS: {{ .podHeartbeatMs | quote }}
  POD_DEAD_AFTER_SEC: {{ .podDeadAfterSec | quote }}
  RANGE_PARALLEL_THRESHOLD: {{ .rangeParallelThreshold | quote }}
  RANGE_COUNT: {{ .rangeCount | quote }}
  RANGE_LEASE_TTL_SEC: {{ .rangeLeaseTtlSec | quote }}
  PROGRESS_UPDATE_MS: {{ .progressUpdateMs | quote }}
  ASYNC_WRITE_FLUSH_INTERVAL_MS: {{ .asyncWriteFlushIntervalMs | quote }}
  ASYNC_WRITE_FLUSH_BATCH_SIZE: {{ .asyncWriteFlushBatchSize | quote }}
  {{- end }}
