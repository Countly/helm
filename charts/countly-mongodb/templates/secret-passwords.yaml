{{- if eq (.Values.secrets.mode | default "values") "values" }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.users.app.passwordSecretName }}
  labels:
    {{- include "countly-mongodb.labels" . | nindent 4 }}
  annotations:
    {{- if .Values.secrets.keep }}
    helm.sh/resource-policy: keep
    {{- end }}
    {{- include "countly-mongodb.syncWave" (dict "wave" "0" "root" .) | nindent 4 }}
type: Opaque
data:
  {{ .Values.users.app.passwordSecretKey }}: |-
    {{- $existing := lookup "v1" "Secret" .Release.Namespace .Values.users.app.passwordSecretName -}}
    {{- if and $existing (not .Values.users.app.password) }}
    {{ index $existing.data .Values.users.app.passwordSecretKey }}
    {{- else if .Values.users.app.password }}
    {{ .Values.users.app.password | b64enc }}
    {{- else }}
    {{- fail "MongoDB app user password is required on first install. Set users.app.password." }}
    {{- end }}
---
{{- if .Values.users.metrics.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.users.metrics.passwordSecretName }}
  labels:
    {{- include "countly-mongodb.labels" . | nindent 4 }}
  annotations:
    {{- if .Values.secrets.keep }}
    helm.sh/resource-policy: keep
    {{- end }}
    {{- include "countly-mongodb.syncWave" (dict "wave" "0" "root" .) | nindent 4 }}
type: Opaque
data:
  {{ .Values.users.metrics.passwordSecretKey }}: |-
    {{- $existing := lookup "v1" "Secret" .Release.Namespace .Values.users.metrics.passwordSecretName -}}
    {{- if and $existing (not .Values.users.metrics.password) }}
    {{ index $existing.data .Values.users.metrics.passwordSecretKey }}
    {{- else if .Values.users.metrics.password }}
    {{ .Values.users.metrics.password | b64enc }}
{{- else }}
{{- fail "MongoDB metrics user password is required on first install. Set users.metrics.password." }}
{{- end }}
{{- end }}
{{- end }}
{{- if eq (.Values.secrets.mode | default "values") "externalSecret" }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.users.app.passwordSecretName }}
  labels:
    {{- include "countly-mongodb.labels" . | nindent 4 }}
  annotations:
    {{- include "countly-mongodb.syncWave" (dict "wave" "0" "root" .) | nindent 4 }}
spec:
  refreshInterval: {{ .Values.secrets.externalSecret.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ required "secrets.externalSecret.secretStoreRef.name is required when secrets.mode=externalSecret" .Values.secrets.externalSecret.secretStoreRef.name }}
    kind: {{ .Values.secrets.externalSecret.secretStoreRef.kind | default "ClusterSecretStore" }}
  target:
    name: {{ .Values.users.app.passwordSecretName }}
    creationPolicy: Owner
  data:
    - secretKey: {{ .Values.users.app.passwordSecretKey }}
      remoteRef:
        key: {{ required "secrets.externalSecret.remoteRefs.app.password is required when secrets.mode=externalSecret" .Values.secrets.externalSecret.remoteRefs.app.password }}
{{- if .Values.users.metrics.enabled }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.users.metrics.passwordSecretName }}
  labels:
    {{- include "countly-mongodb.labels" . | nindent 4 }}
  annotations:
    {{- include "countly-mongodb.syncWave" (dict "wave" "0" "root" .) | nindent 4 }}
spec:
  refreshInterval: {{ .Values.secrets.externalSecret.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ required "secrets.externalSecret.secretStoreRef.name is required when secrets.mode=externalSecret" .Values.secrets.externalSecret.secretStoreRef.name }}
    kind: {{ .Values.secrets.externalSecret.secretStoreRef.kind | default "ClusterSecretStore" }}
  target:
    name: {{ .Values.users.metrics.passwordSecretName }}
    creationPolicy: Owner
  data:
    - secretKey: {{ .Values.users.metrics.passwordSecretKey }}
      remoteRef:
        key: {{ required "secrets.externalSecret.remoteRefs.metrics.password is required when secrets.mode=externalSecret" .Values.secrets.externalSecret.remoteRefs.metrics.password }}
{{- end }}
{{- end }}
