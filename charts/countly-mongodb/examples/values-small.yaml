# Small / development MongoDB replica set.
# 2 members, minimal resources, exporter enabled.

mongodb:
  version: "8.2.5"
  members: 2
  resources:
    requests:
      cpu: "250m"
      memory: "1Gi"
    limits:
      cpu: "1"
      memory: "4Gi"
  persistence:
    size: 20Gi

users:
  app:
    password: "dev-app-password"
  metrics:
    password: "dev-metrics-password"

exporter:
  enabled: true
