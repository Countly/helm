{{- if and (include "obs.deployGrafana" .) .Values.gateway.enabled }}
{{- $gwName := ternary (printf "%s-grafana" (include "obs.fullname" .)) .Values.gateway.existingGateway.name .Values.gateway.create -}}
{{- $gwNamespace := ternary .Release.Namespace (.Values.gateway.existingGateway.namespace | default .Release.Namespace) .Values.gateway.create -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "obs.fullname" . }}-grafana
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "obs.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
  {{- if ((.Values.argocd).enabled) }}
  annotations:
    {{- include "obs.syncWave" (dict "wave" "6" "root" .) | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
    - name: {{ $gwName }}
      namespace: {{ $gwNamespace }}
      sectionName: http
  hostnames:
    - {{ .Values.gateway.hostname | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ include "obs.fullname" . }}-grafana
          port: 3000
{{- end }}
