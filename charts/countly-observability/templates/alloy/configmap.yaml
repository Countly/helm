{{- if (include "obs.deployAlloy" .) }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "obs.fullname" . }}-alloy-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "obs.labels" . | nindent 4 }}
    app.kubernetes.io/component: alloy
data:
  config.alloy: |
{{- if .Values.logs.enabled }}
    // ===== LOG COLLECTION PIPELINE =====
    discovery.kubernetes "pods" {
      role = "pod"
      namespaces {
        names = ["{{ .Values.countlyNamespace }}", "{{ .Values.ingressNamespace }}", "{{ .Values.clickhouseNamespace }}", "{{ .Values.mongodbNamespace }}", "{{ .Values.kafkaNamespace }}"]
      }
    }

    discovery.relabel "pods" {
      targets = discovery.kubernetes.pods.targets

      // Exclude observability infrastructure pods to prevent recursive log collection
      rule {
        source_labels = ["__meta_kubernetes_namespace"]
        regex         = "{{ .Release.Namespace }}"
        action        = "drop"
      }

      rule {
        source_labels = ["__meta_kubernetes_pod_controller_name"]
        regex         = "([0-9a-z-.]+?)(-[0-9a-f]{8,10})?"
        target_label  = "__tmp_controller_name"
      }

      rule {
        source_labels = ["__meta_kubernetes_pod_label_app", "__meta_kubernetes_pod_label_component", "__tmp_controller_name", "__meta_kubernetes_pod_name"]
        regex         = "^;*([^;]+)(;.*)?$"
        target_label  = "app"
      }

      rule {
        source_labels = ["__meta_kubernetes_namespace"]
        target_label  = "namespace"
      }

      rule {
        source_labels = ["namespace", "app"]
        separator     = "/"
        target_label  = "job"
      }

      rule {
        source_labels = ["__meta_kubernetes_pod_container_name"]
        target_label  = "container"
      }

      rule {
        source_labels = ["__meta_kubernetes_pod_uid", "__meta_kubernetes_pod_container_name"]
        separator     = "/"
        target_label  = "__path__"
        replacement   = "/var/log/pods/*$1/*.log"
      }
    }

    local.file_match "pods" {
      path_targets = discovery.relabel.pods.output
    }

    loki.write "default" {
      endpoint {
        url = "{{ include "obs.loki.pushUrl" . }}"
      }
      external_labels = {}
    }

    loki.process "pods" {
      forward_to = [loki.write.default.receiver]

      // 1. Strip CRI prelude (stdout/stderr wrappers)
      stage.cri {}

      // 2. Drop blank/whitespace-only lines
      stage.drop { expression = "^\\s*$" }

      // 3. Attempt JSON parse (keeps non-JSON lines automatically)
      stage.json {
        source         = "log"
        drop_malformed = false
        expressions = {
          level    = "level",
          msg      = "msg",
          log_time = "time",
          trace_id = "traceId",
          span_id  = "spanId",
        }
      }

      // 4. Fallback for NGINX access logs
      stage.regex {
        expression = "traceId=(?P<trace_id>[A-Fa-f0-9]{32}).*spanId=(?P<span_id>[A-Fa-f0-9]{16})"
      }

      // 5. Low-cardinality labels
      stage.labels {
        values = {
          traceID = "trace_id",
          spanID  = "span_id",
          level   = "level",
        }
      }

      // 6. Timestamps - prefer app time, fall back to CRI time
      stage.timestamp {
        source = "log_time"
        format = "RFC3339Nano"
      }
      stage.timestamp {
        source = "timestamp"
        format = "RFC3339Nano"
      }

  {{- if .Values.logs.sampling.enabled }}
      // 7. Log sampling — drop a fraction of log lines
      stage.sampling {
        drop_rate = {{ .Values.logs.sampling.dropRate }}
      }
  {{- end }}
    }

    loki.source.file "pods" {
      targets               = local.file_match.pods.targets
      forward_to            = [loki.process.pods.receiver]
      legacy_positions_file = "/tmp/alloy/positions.yaml"
    }
{{- end }}

{{- if .Values.metrics.enabled }}
    // ===== METRICS (self only + remote write target for trace-derived metrics) =====
    prometheus.remote_write "default" {
      endpoint {
        url = "{{ include "obs.prometheus.remoteWriteUrl" . }}"

        queue_config {
          capacity              = 15000
          max_shards            = 1
          min_shards            = 1
          max_samples_per_send  = 300
          batch_send_deadline   = "45s"
          min_backoff           = "1s"
          max_backoff           = "60s"
        }

        metadata_config {
          send = false
        }

        send_exemplars         = false
        send_native_histograms = false
      }

      wal {
        truncate_frequency = "2h"
        min_keepalive_time = "5m"
        max_keepalive_time = "8h"
      }
    }

    prometheus.exporter.self "alloy" {
    }

    prometheus.scrape "alloy_self" {
      targets         = prometheus.exporter.self.alloy.targets
      forward_to      = [prometheus.remote_write.default.receiver]
      job_name        = "alloy-internal"
      scrape_interval = "30s"
    }
{{- end }}

{{- end }}
