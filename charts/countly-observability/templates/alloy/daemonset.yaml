{{- if (include "obs.deployAlloy" .) }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "obs.fullname" . }}-alloy
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "obs.labels" . | nindent 4 }}
    app.kubernetes.io/component: alloy
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "obs.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: alloy
  template:
    metadata:
      labels:
        {{- include "obs.labels" . | nindent 8 }}
        app.kubernetes.io/component: alloy
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/alloy/configmap.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ include "obs.fullname" . }}-alloy
      {{- include "obs.scheduling" (dict "values" .Values.alloy "global" .Values.global "component" "alloy" "fullname" (include "obs.fullname" .)) | nindent 6 }}
      containers:
      - name: alloy
        image: {{ include "obs.image" (dict "global" .Values.global "image" .Values.alloy.image) }}
        args:
          - run
          - /etc/alloy/config.alloy
          - --storage.path=/tmp/alloy
          - --server.http.listen-addr=0.0.0.0:12345
        ports:
        - containerPort: 12345
          name: http-metrics
          protocol: TCP
        env:
        - name: HOSTNAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: ALLOY_DEPLOY_MODE
          value: "helm"
        securityContext:
          runAsUser: 0
          readOnlyRootFilesystem: false
          capabilities:
            add:
            - SYS_PTRACE
        volumeMounts:
        - name: config
          mountPath: /etc/alloy
        - name: alloy-storage
          mountPath: /tmp/alloy
        {{- if .Values.logs.enabled }}
        - name: varlog
          mountPath: /var/log
          readOnly: true
        - name: varlibdockercontainers
          mountPath: /var/lib/docker/containers
          readOnly: true
        {{- end }}
        {{- with .Values.alloy.resources }}
        resources:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        livenessProbe:
          httpGet:
            path: /-/healthy
            port: 12345
          initialDelaySeconds: 30
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /-/ready
            port: 12345
          initialDelaySeconds: 10
          periodSeconds: 10
      volumes:
      - name: config
        configMap:
          name: {{ include "obs.fullname" . }}-alloy-config
      - name: alloy-storage
        emptyDir: {}
      {{- if .Values.logs.enabled }}
      - name: varlog
        hostPath:
          path: /var/log
      - name: varlibdockercontainers
        hostPath:
          path: /var/lib/docker/containers
      {{- end }}
{{- end }}
