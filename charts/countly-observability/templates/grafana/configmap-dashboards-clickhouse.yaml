{{- if and (include "obs.deployGrafana" .) .Values.grafana.dashboards.enabled .Values.grafana.dashboards.clickhouse }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "obs.fullname" . }}-grafana-dashboards-clickhouse
  labels:
    {{- include "obs.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
data:
  clickhouse-comprehensive.json: |-
    {{ .Files.Get "dashboards/clickhouse-comprehensive.json" | nindent 4 }}
  clickhouse-query-performance.json: |-
    {{ .Files.Get "dashboards/clickhouse-query-performance.json" | nindent 4 }}
  http-traffic-comprehensive.json: |-
    {{ .Files.Get "dashboards/http-traffic-comprehensive.json" | nindent 4 }}
{{- end }}
