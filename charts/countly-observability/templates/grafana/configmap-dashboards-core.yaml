{{- if and (include "obs.deployGrafana" .) .Values.grafana.dashboards.enabled .Values.grafana.dashboards.core }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "obs.fullname" . }}-grafana-dashboards-core
  labels:
    {{- include "obs.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
data:
  combined-observability.json: |-
    {{ .Files.Get "dashboards/combined-observability.json" | nindent 4 }}
  comprehensive-observability.json: |-
    {{ .Files.Get "dashboards/comprehensive-observability.json" | nindent 4 }}
  http-metrics.json: |-
    {{ .Files.Get "dashboards/http-metrics.json" | nindent 4 }}
  infrastructure-metrics.json: |-
    {{ .Files.Get "dashboards/infrastructure-metrics.json" | nindent 4 }}
  nodejs-metrics.json: |-
    {{ .Files.Get "dashboards/nodejs-metrics.json" | nindent 4 }}
  otel-validation.json: |-
    {{ .Files.Get "dashboards/otel-validation.json" | nindent 4 }}
  kubernetes-infrastructure.json: |-
    {{ .Files.Get "dashboards/kubernetes-infrastructure.json" | nindent 4 }}
{{- end }}
