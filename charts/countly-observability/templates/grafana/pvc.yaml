{{- if and (include "obs.deployGrafana" .) .Values.grafana.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "obs.fullname" . }}-grafana
  labels:
    {{- include "obs.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
spec:
  accessModes:
    - ReadWriteOnce
  {{- include "obs.storageClass" (dict "componentSC" .Values.grafana.persistence.storageClass "globalSC" .Values.global.storageClass) | nindent 2 }}
  resources:
    requests:
      storage: {{ .Values.grafana.persistence.size }}
{{- end }}
