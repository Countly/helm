{{- if and (include "obs.deployGrafana" .) .Values.grafana.dashboards.enabled .Values.grafana.dashboards.countly }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "obs.fullname" . }}-grafana-dashboards-countly
  labels:
    {{- include "obs.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
data:
  countly-service-overview.json: |-
    {{ .Files.Get "dashboards/20-countly/countly-service-overview.json" | nindent 4 }}
  countly-runtime.json: |-
    {{ .Files.Get "dashboards/20-countly/countly-runtime.json" | nindent 4 }}
  countly-pipeline-queries.json: |-
    {{ .Files.Get "dashboards/20-countly/countly-pipeline-queries.json" | nindent 4 }}
{{- end }}
