{{- if and (include "obs.deployGrafana" .) .Values.grafana.dashboards.enabled .Values.grafana.dashboards.data }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "obs.fullname" . }}-grafana-dashboards-data
  labels:
    {{- include "obs.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
data:
  mongodb-overview.json: |-
    {{ .Files.Get "dashboards/30-data/mongodb-overview.json" | nindent 4 }}
  clickhouse-server.json: |-
    {{ .Files.Get "dashboards/30-data/clickhouse-server.json" | nindent 4 }}
  clickhouse-keeper.json: |-
    {{ .Files.Get "dashboards/30-data/clickhouse-keeper.json" | nindent 4 }}
  kafka-cluster.json: |-
    {{ .Files.Get "dashboards/30-data/kafka-cluster.json" | nindent 4 }}
  kafka-connect.json: |-
    {{ .Files.Get "dashboards/30-data/kafka-connect.json" | nindent 4 }}
{{- end }}
