{{- if (include "obs.deployLoki" .) }}
{{- include "obs.storageValidation" (dict "component" "loki" "storage" .Values.loki.storage "default" "filesystem" "allowed" (list "filesystem" "s3" "gcs" "azure")) }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "obs.fullname" . }}-loki
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "obs.labels" . | nindent 4 }}
    app.kubernetes.io/component: loki
data:
  loki.yaml: |
    auth_enabled: false

    server:
      http_listen_port: 3100
      grpc_listen_port: 9096

    common:
      path_prefix: /loki
      storage:
        {{- $backend := (.Values.loki.storage).backend | default "filesystem" }}
        {{- if eq $backend "s3" }}
        s3:
          bucketnames: {{ .Values.loki.storage.bucket }}
          {{- if .Values.loki.storage.endpoint }}
          endpoint: {{ .Values.loki.storage.endpoint }}
          {{- end }}
          {{- if .Values.loki.storage.region }}
          region: {{ .Values.loki.storage.region }}
          {{- end }}
          {{- if .Values.loki.storage.insecure }}
          insecure: {{ .Values.loki.storage.insecure }}
          {{- end }}
          s3forcepathstyle: {{ .Values.loki.storage.forcePathStyle | default false }}
          {{- with .Values.loki.storage.config }}
          {{- toYaml . | nindent 10 }}
          {{- end }}
        {{- else if eq $backend "gcs" }}
        gcs:
          bucket_name: {{ .Values.loki.storage.bucket }}
          {{- with .Values.loki.storage.config }}
          {{- toYaml . | nindent 10 }}
          {{- end }}
        {{- else if eq $backend "azure" }}
        azure:
          container_name: {{ .Values.loki.storage.bucket }}
          {{- if .Values.loki.storage.endpoint }}
          endpoint_suffix: {{ .Values.loki.storage.endpoint }}
          {{- end }}
          {{- with .Values.loki.storage.config }}
          {{- toYaml . | nindent 10 }}
          {{- end }}
        {{- else }}
        filesystem:
          chunks_directory: /loki/chunks
          rules_directory: /loki/rules
        {{- end }}
      replication_factor: 1
      ring:
        instance_addr: 127.0.0.1
        kvstore:
          store: inmemory

    query_range:
      results_cache:
        cache:
          embedded_cache:
            enabled: true
            max_size_mb: 100

    schema_config:
      configs:
        - from: 2020-10-24
          store: tsdb
          object_store: {{ (.Values.loki.storage).backend | default "filesystem" }}
          schema: v13
          index:
            prefix: index_
            period: 24h

    ruler:
      alertmanager_url: http://localhost:9093

    limits_config:
      retention_period: {{ .Values.loki.retention }}
      max_streams_per_user: {{ .Values.loki.config.maxStreamsPerUser }}
      max_line_size: {{ .Values.loki.config.maxLineSize }}
      reject_old_samples: true
      reject_old_samples_max_age: 168h
      ingestion_rate_mb: {{ .Values.loki.config.ingestionRateMb }}
      ingestion_burst_size_mb: {{ .Values.loki.config.ingestionBurstSizeMb }}

    compactor:
      working_directory: /loki/compactor
      retention_enabled: true
      delete_request_store: {{ (.Values.loki.storage).backend | default "filesystem" }}
{{- end }}
