{{- if .Values.networkPolicy.enabled }}
---
# Default deny all ingress in the observability namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "obs.fullname" . }}-default-deny
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "obs.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
# Allow inter-pod traffic within the observability namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "obs.fullname" . }}-allow-internal
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "obs.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Release.Namespace }}
---
# Allow Countly namespace to reach Alloy OTLP endpoints
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "obs.fullname" . }}-allow-countly-otlp
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "obs.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: alloy
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.countlyNamespace }}
      ports:
        - protocol: TCP
          port: 4317
        - protocol: TCP
          port: 4318
        - protocol: TCP
          port: 9999
{{- if .Values.networkPolicy.additionalIngress }}
---
# Additional ingress rules
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "obs.fullname" . }}-additional-ingress
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "obs.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    {{- toYaml .Values.networkPolicy.additionalIngress | nindent 4 }}
{{- end }}
---
# Allow all egress (collectors need to reach pods in other namespaces and external endpoints)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "obs.fullname" . }}-allow-egress
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "obs.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - {}
{{- end }}
