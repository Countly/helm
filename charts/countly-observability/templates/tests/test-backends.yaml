{{- if and .Values.metrics.enabled (ne .Values.mode "external") }}
apiVersion: v1
kind: Pod
metadata:
  name: {{ include "obs.fullname" . }}-test-prometheus
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "obs.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
  - name: test
    image: busybox:1.37.0
    command: ['sh', '-c', 'wget -qO- --timeout=10 http://{{ include "obs.fullname" . }}-prometheus:9090/-/ready']
---
{{- end }}
