{{- if eq (.Values.secrets.mode | default "values") "externalSecret" }}
{{- if not .Values.secrets.mongodb.existingSecret }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "countly.fullname" . }}-mongodb
  labels:
    {{- include "countly.labels" . | nindent 4 }}
  {{- if ((.Values.argocd).enabled) }}
  annotations:
    {{- include "countly.syncWave" (dict "wave" "1" "root" .) | nindent 4 }}
  {{- end }}
spec:
  refreshInterval: {{ .Values.secrets.externalSecret.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ required "secrets.externalSecret.secretStoreRef.name is required when secrets.mode=externalSecret" .Values.secrets.externalSecret.secretStoreRef.name }}
    kind: {{ .Values.secrets.externalSecret.secretStoreRef.kind | default "ClusterSecretStore" }}
  target:
    name: {{ include "countly.fullname" . }}-mongodb
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        {{- if .Values.secrets.externalSecret.remoteRefs.mongodb.connectionString }}
        {{- else if .Values.secrets.externalSecret.remoteRefs.mongodb.password }}
        {{ .Values.secrets.mongodb.key | default "connectionString.standard" }}: {{ include "countly.mongodb.connectionStringWithPassword" (dict "root" . "password" "{{ .mongodbPassword | urlquery | replace \"+\" \"%20\" }}" ) | quote }}
        {{- else }}
        {{ .Values.secrets.mongodb.key | default "connectionString.standard" }}: {{ include "countly.mongodb.connectionString" . | quote }}
        {{- end }}
  data:
    {{- if .Values.secrets.externalSecret.remoteRefs.mongodb.connectionString }}
    - secretKey: {{ .Values.secrets.mongodb.key | default "connectionString.standard" }}
      remoteRef:
        key: {{ required "secrets.externalSecret.remoteRefs.mongodb.connectionString is required" .Values.secrets.externalSecret.remoteRefs.mongodb.connectionString }}
    {{- else if .Values.secrets.externalSecret.remoteRefs.mongodb.password }}
    - secretKey: mongodbPassword
      remoteRef:
        key: {{ required "secrets.externalSecret.remoteRefs.mongodb.password is required" .Values.secrets.externalSecret.remoteRefs.mongodb.password }}
    {{- end }}
{{- end }}
{{- end }}
