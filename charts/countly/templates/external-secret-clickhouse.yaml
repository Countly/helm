{{- if eq (.Values.secrets.mode | default "values") "externalSecret" }}
{{- if not .Values.secrets.clickhouse.existingSecret }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "countly.fullname" . }}-clickhouse
  labels:
    {{- include "countly.labels" . | nindent 4 }}
  {{- if .Values.argocd.enabled }}
  annotations:
    {{- include "countly.syncWave" (dict "wave" "1" "root" .) | nindent 4 }}
  {{- end }}
spec:
  refreshInterval: {{ .Values.secrets.externalSecret.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ required "secrets.externalSecret.secretStoreRef.name is required when secrets.mode=externalSecret" .Values.secrets.externalSecret.secretStoreRef.name }}
    kind: {{ .Values.secrets.externalSecret.secretStoreRef.kind | default "ClusterSecretStore" }}
  target:
    name: {{ include "countly.fullname" . }}-clickhouse
    creationPolicy: Owner
    template:
      engineVersion: v2
      mergePolicy: Merge
      data:
        {{- if not .Values.secrets.externalSecret.remoteRefs.clickhouse.url }}
        COUNTLY_CONFIG__CLICKHOUSE_URL: {{ include "countly.clickhouse.url" . | quote }}
        {{- end }}
        {{- if not .Values.secrets.externalSecret.remoteRefs.clickhouse.username }}
        COUNTLY_CONFIG__CLICKHOUSE_USERNAME: {{ (.Values.secrets.clickhouse.username | default ((.Values.backingServices).clickhouse).username | default "default") | quote }}
        {{- end }}
        {{- if not .Values.secrets.externalSecret.remoteRefs.clickhouse.password }}
        COUNTLY_CONFIG__CLICKHOUSE_PASSWORD: {{ (.Values.secrets.clickhouse.password | default ((.Values.backingServices).clickhouse).password) | quote }}
        {{- end }}
        {{- if not .Values.secrets.externalSecret.remoteRefs.clickhouse.database }}
        COUNTLY_CONFIG__CLICKHOUSE_DATABASE: {{ (.Values.secrets.clickhouse.database | default ((.Values.backingServices).clickhouse).database | default "countly_drill") | quote }}
        {{- end }}
  data:
    {{- if .Values.secrets.externalSecret.remoteRefs.clickhouse.url }}
    - secretKey: COUNTLY_CONFIG__CLICKHOUSE_URL
      remoteRef:
        key: {{ required "secrets.externalSecret.remoteRefs.clickhouse.url is required" .Values.secrets.externalSecret.remoteRefs.clickhouse.url }}
    {{- end }}
    {{- if .Values.secrets.externalSecret.remoteRefs.clickhouse.username }}
    - secretKey: COUNTLY_CONFIG__CLICKHOUSE_USERNAME
      remoteRef:
        key: {{ required "secrets.externalSecret.remoteRefs.clickhouse.username is required" .Values.secrets.externalSecret.remoteRefs.clickhouse.username }}
    {{- end }}
    {{- if .Values.secrets.externalSecret.remoteRefs.clickhouse.password }}
    - secretKey: COUNTLY_CONFIG__CLICKHOUSE_PASSWORD
      remoteRef:
        key: {{ required "secrets.externalSecret.remoteRefs.clickhouse.password is required" .Values.secrets.externalSecret.remoteRefs.clickhouse.password }}
    {{- end }}
    {{- if .Values.secrets.externalSecret.remoteRefs.clickhouse.database }}
    - secretKey: COUNTLY_CONFIG__CLICKHOUSE_DATABASE
      remoteRef:
        key: {{ required "secrets.externalSecret.remoteRefs.clickhouse.database is required" .Values.secrets.externalSecret.remoteRefs.clickhouse.database }}
    {{- end }}
{{- end }}
{{- end }}
