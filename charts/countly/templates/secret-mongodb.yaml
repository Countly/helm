{{- if and (ne (.Values.secrets.mode | default "values") "externalSecret") (not .Values.secrets.mongodb.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "countly.fullname" . }}-mongodb
  labels:
    {{- include "countly.labels" . | nindent 4 }}
  annotations:
    {{- if .Values.secrets.keep }}
    helm.sh/resource-policy: keep
    {{- end }}
    {{- if .Values.secrets.rotationId }}
    countly.io/rotation-id: {{ .Values.secrets.rotationId | quote }}
    {{- end }}
    {{- include "countly.syncWave" (dict "wave" "1" "root" .) | nindent 4 }}
type: Opaque
data:
  {{ .Values.secrets.mongodb.key }}: {{ include "countly.mongodb.connectionString" . | b64enc }}
{{- end }}
