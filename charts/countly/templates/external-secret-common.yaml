{{- if eq (.Values.secrets.mode | default "values") "externalSecret" }}
{{- if not .Values.secrets.common.existingSecret }}
{{- $commonRemote := .Values.secrets.externalSecret.remoteRefs.common | default dict -}}
{{- $commonUsesExternal := or $commonRemote.encryptionReportsKey $commonRemote.webSessionSecret $commonRemote.passwordSecret -}}
{{- if $commonUsesExternal }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "countly.fullname" . }}-common
  labels:
    {{- include "countly.labels" . | nindent 4 }}
  {{- if .Values.argocd.enabled }}
  annotations:
    {{- include "countly.syncWave" (dict "wave" "1" "root" .) | nindent 4 }}
  {{- end }}
spec:
  refreshInterval: {{ .Values.secrets.externalSecret.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ required "secrets.externalSecret.secretStoreRef.name is required when secrets.mode=externalSecret" .Values.secrets.externalSecret.secretStoreRef.name }}
    kind: {{ .Values.secrets.externalSecret.secretStoreRef.kind | default "ClusterSecretStore" }}
  target:
    name: {{ include "countly.fullname" . }}-common
    creationPolicy: Owner
    {{- $hasCommonTemplateData := not (and $commonRemote.encryptionReportsKey $commonRemote.webSessionSecret $commonRemote.passwordSecret) }}
    {{- if $hasCommonTemplateData }}
    template:
      engineVersion: v2
      mergePolicy: Merge
      data:
        {{- if not .Values.secrets.externalSecret.remoteRefs.common.encryptionReportsKey }}
        COUNTLY_CONFIG__ENCRYPTION_REPORTS_KEY: {{ .Values.secrets.common.encryptionReportsKey | quote }}
        {{- end }}
        {{- if not .Values.secrets.externalSecret.remoteRefs.common.webSessionSecret }}
        COUNTLY_CONFIG__WEB_SESSION_SECRET: {{ .Values.secrets.common.webSessionSecret | quote }}
        {{- end }}
        {{- if not .Values.secrets.externalSecret.remoteRefs.common.passwordSecret }}
        COUNTLY_CONFIG__PASSWORDSECRET: {{ .Values.secrets.common.passwordSecret | quote }}
        {{- end }}
    {{- end }}
  data:
    {{- if .Values.secrets.externalSecret.remoteRefs.common.encryptionReportsKey }}
    - secretKey: COUNTLY_CONFIG__ENCRYPTION_REPORTS_KEY
      remoteRef:
        key: {{ required "secrets.externalSecret.remoteRefs.common.encryptionReportsKey is required" .Values.secrets.externalSecret.remoteRefs.common.encryptionReportsKey }}
    {{- end }}
    {{- if .Values.secrets.externalSecret.remoteRefs.common.webSessionSecret }}
    - secretKey: COUNTLY_CONFIG__WEB_SESSION_SECRET
      remoteRef:
        key: {{ required "secrets.externalSecret.remoteRefs.common.webSessionSecret is required" .Values.secrets.externalSecret.remoteRefs.common.webSessionSecret }}
    {{- end }}
    {{- if .Values.secrets.externalSecret.remoteRefs.common.passwordSecret }}
    - secretKey: COUNTLY_CONFIG__PASSWORDSECRET
      remoteRef:
        key: {{ required "secrets.externalSecret.remoteRefs.common.passwordSecret is required" .Values.secrets.externalSecret.remoteRefs.common.passwordSecret }}
    {{- end }}
{{- end }}
{{- end }}
{{- end }}
