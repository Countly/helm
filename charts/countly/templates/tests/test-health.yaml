{{- if .Values.api.enabled }}
apiVersion: v1
kind: Pod
metadata:
  name: {{ include "countly.fullname" . }}-test-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "countly.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
  - name: test
    image: busybox:1.35
    command: ['sh', '-c', 'wget -qO- --timeout=30 http://{{ include "countly.fullname" . }}-api:{{ .Values.api.port }}{{ .Values.api.healthCheck.path }}']
---
{{- end }}
{{- if .Values.frontend.enabled }}
apiVersion: v1
kind: Pod
metadata:
  name: {{ include "countly.fullname" . }}-test-frontend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "countly.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
  - name: test
    image: busybox:1.35
    command: ['sh', '-c', 'wget -qO- --timeout=30 http://{{ include "countly.fullname" . }}-frontend:{{ .Values.frontend.port }}{{ .Values.frontend.healthCheck.path }}']
{{- end }}
