{{- if .Values.gateway.enabled }}
{{- $fullname := include "countly.fullname" . -}}
{{- $gwName := ternary $fullname .Values.gateway.existingGateway.name .Values.gateway.create -}}

{{/*
ClientTrafficPolicy — controls how Envoy handles incoming client connections.
Targets our Gateway; only created when we own the Gateway (gateway.create: true)
to avoid conflicting with policies set by other workloads on a shared Gateway.

Replaces these NGINX Ingress annotations:
  nginx.org/client-max-body-size         → connection.bufferLimit
  nginx.org/client-body-buffer-size      → connection.bufferLimit
  client_header_timeout (server-snippet) → timeout.http.requestReceivedTimeout
  client_body_timeout   (location-snippet) → timeout.http.requestReceivedTimeout

Header forwarding (X-Forwarded-Proto, X-Real-IP, Connection: "") is handled
natively by Envoy and does not require explicit configuration here.

X-Request-ID is generated by Envoy if the client does not send one.
*/}}
{{- if and .Values.gateway.clientTrafficPolicy.enabled .Values.gateway.create }}
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: ClientTrafficPolicy
metadata:
  name: {{ $fullname }}
  labels:
    {{- include "countly.labels" . | nindent 4 }}
  annotations:
    {{- include "countly.syncWave" (dict "wave" "12" "root" .) | nindent 4 }}
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ $gwName }}
  connection:
    # Incoming request buffer per connection.
    # Replaces: nginx.org/client-max-body-size + nginx.org/client-body-buffer-size
    bufferLimit: {{ .Values.gateway.clientTrafficPolicy.connectionBufferLimit | quote }}
  timeout:
    http:
      # Time to receive the complete request (headers + body) from the client.
      # Replaces: client_header_timeout + client_body_timeout
      requestReceivedTimeout: {{ .Values.gateway.clientTrafficPolicy.requestReceivedTimeout | quote }}
{{- end }}

{{/*
BackendTrafficPolicy — controls how Envoy handles connections to upstream backends.
Targets our HTTPRoute so it remains scoped to Countly services even on a shared Gateway.

Replaces these NGINX Ingress annotations / snippets:
  nginx.org/proxy-connect-timeout                 → timeout.tcp.connectTimeout
  nginx.org/proxy-read-timeout                    → timeout.http.requestTimeout
  nginx.org/proxy-send-timeout                    → timeout.http.requestTimeout
  nginx.org/keepalive                             → circuitBreaker.maxConnections
  proxy_next_upstream error timeout http_5xx      → retry.retryOn.triggers
  proxy_next_upstream http_502/503/504            → retry.retryOn.httpStatusCodes
  proxy_next_upstream_timeout                     → retry.perRetryTimeout
  proxy_next_upstream_tries                       → retry.numRetries

proxy_buffering / proxy_buffer_size / proxy_buffers / proxy_busy_buffers_size /
proxy_max_temp_file_size are handled internally by Envoy's streaming proxy and
have no equivalent configuration surface in the Gateway API.
*/}}
{{- if .Values.gateway.backendTrafficPolicy.enabled }}
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: {{ $fullname }}
  labels:
    {{- include "countly.labels" . | nindent 4 }}
  annotations:
    {{- include "countly.syncWave" (dict "wave" "12" "root" .) | nindent 4 }}
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: {{ $fullname }}
  timeout:
    tcp:
      # Replaces: nginx.org/proxy-connect-timeout
      connectTimeout: {{ .Values.gateway.backendTrafficPolicy.connectTimeout | quote }}
    http:
      # Replaces: nginx.org/proxy-read-timeout + nginx.org/proxy-send-timeout
      requestTimeout: {{ .Values.gateway.backendTrafficPolicy.requestTimeout | quote }}
      connectionIdleTimeout: {{ .Values.gateway.backendTrafficPolicy.connectionIdleTimeout | quote }}
  circuitBreaker:
    # Replaces: nginx.org/keepalive (max upstream connections per endpoint)
    maxConnections: {{ .Values.gateway.backendTrafficPolicy.maxConnections }}
    maxPendingRequests: {{ .Values.gateway.backendTrafficPolicy.maxPendingRequests }}
  {{- with .Values.gateway.backendTrafficPolicy.retry }}
  retry:
    # Replaces: proxy_next_upstream_tries
    numRetries: {{ .numRetries }}
    retryOn:
      # Replaces: proxy_next_upstream error timeout
      triggers:
        {{- range .retryOn.triggers }}
        - {{ . }}
        {{- end }}
      # Replaces: proxy_next_upstream http_502 http_503 http_504
      httpStatusCodes:
        {{- range .retryOn.httpStatusCodes }}
        - {{ . }}
        {{- end }}
  {{- end }}
{{- end }}
{{- end }}
