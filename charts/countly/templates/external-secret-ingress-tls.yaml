{{- $tlsMode := include "countly.tls.mode" . -}}
{{- if and (eq $tlsMode "existingSecret") .Values.ingress.tls.externalSecret.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "countly.tls.secretName" . }}
  labels:
    {{- include "countly.labels" . | nindent 4 }}
  {{- if .Values.argocd.enabled }}
  annotations:
    {{- include "countly.syncWave" (dict "wave" "1" "root" .) | nindent 4 }}
  {{- end }}
spec:
  refreshInterval: {{ .Values.ingress.tls.externalSecret.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ required "ingress.tls.externalSecret.secretStoreRef.name is required when ingress.tls.externalSecret.enabled is true" .Values.ingress.tls.externalSecret.secretStoreRef.name }}
    kind: {{ .Values.ingress.tls.externalSecret.secretStoreRef.kind | default "ClusterSecretStore" }}
  target:
    name: {{ include "countly.tls.secretName" . }}
    creationPolicy: Owner
    template:
      type: kubernetes.io/tls
  data:
    - secretKey: tls.crt
      remoteRef:
        key: {{ required "ingress.tls.externalSecret.remoteRefs.tlsCrt is required when ingress.tls.externalSecret.enabled is true" .Values.ingress.tls.externalSecret.remoteRefs.tlsCrt }}
    - secretKey: tls.key
      remoteRef:
        key: {{ required "ingress.tls.externalSecret.remoteRefs.tlsKey is required when ingress.tls.externalSecret.enabled is true" .Values.ingress.tls.externalSecret.remoteRefs.tlsKey }}
{{- end }}
