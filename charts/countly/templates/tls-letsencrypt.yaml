{{- $tlsMode := include "countly.tls.mode" . -}}
{{- if and (eq $tlsMode "letsencrypt") .Values.gateway.enabled -}}
{{- $fullname := include "countly.fullname" . -}}
{{- $gwName := ternary $fullname .Values.gateway.existingGateway.name .Values.gateway.create -}}
{{- $gwNamespace := ternary .Release.Namespace .Values.gateway.existingGateway.namespace .Values.gateway.create -}}
{{- $issuerName := .Values.gateway.tls.clusterIssuer | default "letsencrypt-prod" -}}
{{- $email := .Values.gateway.tls.acmeEmail -}}
{{- if not $email -}}
{{- fail "gateway.tls.acmeEmail is required when gateway.tls.mode is letsencrypt" -}}
{{- end -}}
---
# ClusterIssuer for Let's Encrypt (HTTP-01 via Gateway API)
# cert-manager creates a temporary HTTPRoute on the Gateway to serve the
# .well-known/acme-challenge/ path during domain validation.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: {{ $issuerName }}
  labels:
    {{- include "countly.labels" . | nindent 4 }}
  annotations:
    {{- include "countly.syncWave" (dict "wave" "10" "root" .) | nindent 4 }}
spec:
  acme:
    email: {{ $email | quote }}
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: {{ $issuerName }}
    solvers:
      - http01:
          gatewayHTTPRoute:
            parentRefs:
              - name: {{ $gwName }}
                namespace: {{ $gwNamespace }}
                kind: Gateway
{{- end }}
