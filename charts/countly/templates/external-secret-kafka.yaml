{{- if eq (.Values.secrets.mode | default "values") "externalSecret" }}
{{- if not .Values.secrets.kafka.existingSecret }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "countly.fullname" . }}-kafka
  labels:
    {{- include "countly.labels" . | nindent 4 }}
  {{- if .Values.argocd.enabled }}
  annotations:
    {{- include "countly.syncWave" (dict "wave" "1" "root" .) | nindent 4 }}
  {{- end }}
spec:
  refreshInterval: {{ .Values.secrets.externalSecret.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ required "secrets.externalSecret.secretStoreRef.name is required when secrets.mode=externalSecret" .Values.secrets.externalSecret.secretStoreRef.name }}
    kind: {{ .Values.secrets.externalSecret.secretStoreRef.kind | default "ClusterSecretStore" }}
  target:
    name: {{ include "countly.fullname" . }}-kafka
    creationPolicy: Owner
  data:
    - secretKey: COUNTLY_CONFIG__KAFKA_RDKAFKA_BROKERS
      remoteRef:
        key: {{ required "secrets.externalSecret.remoteRefs.kafka.brokers is required" .Values.secrets.externalSecret.remoteRefs.kafka.brokers }}
    - secretKey: COUNTLY_CONFIG__KAFKA_RDKAFKA_SECURITYPROTOCOL
      remoteRef:
        key: {{ required "secrets.externalSecret.remoteRefs.kafka.securityProtocol is required" .Values.secrets.externalSecret.remoteRefs.kafka.securityProtocol }}
    {{- if .Values.secrets.externalSecret.remoteRefs.kafka.saslMechanism }}
    - secretKey: COUNTLY_CONFIG__KAFKA_RDKAFKA_SASLMECHANISM
      remoteRef:
        key: {{ .Values.secrets.externalSecret.remoteRefs.kafka.saslMechanism }}
    {{- end }}
    {{- if .Values.secrets.externalSecret.remoteRefs.kafka.saslUsername }}
    - secretKey: COUNTLY_CONFIG__KAFKA_RDKAFKA_SASLUSERNAME
      remoteRef:
        key: {{ .Values.secrets.externalSecret.remoteRefs.kafka.saslUsername }}
    {{- end }}
    {{- if .Values.secrets.externalSecret.remoteRefs.kafka.saslPassword }}
    - secretKey: COUNTLY_CONFIG__KAFKA_RDKAFKA_SASLPASSWORD
      remoteRef:
        key: {{ .Values.secrets.externalSecret.remoteRefs.kafka.saslPassword }}
    {{- end }}
{{- end }}
{{- end }}
