{{- if and (ne (.Values.secrets.mode | default "values") "externalSecret") (not .Values.secrets.kafka.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "countly.fullname" . }}-kafka
  labels:
    {{- include "countly.labels" . | nindent 4 }}
  annotations:
    {{- if .Values.secrets.keep }}
    helm.sh/resource-policy: keep
    {{- end }}
    {{- if .Values.secrets.rotationId }}
    countly.io/rotation-id: {{ .Values.secrets.rotationId | quote }}
    {{- end }}
    {{- include "countly.syncWave" (dict "wave" "1" "root" .) | nindent 4 }}
type: Opaque
data:
  COUNTLY_CONFIG__KAFKA_RDKAFKA_BROKERS: {{ include "countly.kafka.brokers" . | b64enc }}
  COUNTLY_CONFIG__KAFKA_RDKAFKA_SECURITYPROTOCOL: {{ (.Values.secrets.kafka.securityProtocol | default ((.Values.backingServices).kafka).securityProtocol | default "PLAINTEXT") | b64enc }}
  {{- $saslMechanism := .Values.secrets.kafka.saslMechanism | default ((.Values.backingServices).kafka).saslMechanism }}
  {{- if $saslMechanism }}
  COUNTLY_CONFIG__KAFKA_RDKAFKA_SASLMECHANISM: {{ $saslMechanism | b64enc }}
  COUNTLY_CONFIG__KAFKA_RDKAFKA_SASLUSERNAME: {{ (.Values.secrets.kafka.saslUsername | default ((.Values.backingServices).kafka).saslUsername) | b64enc }}
  COUNTLY_CONFIG__KAFKA_RDKAFKA_SASLPASSWORD: {{ (.Values.secrets.kafka.saslPassword | default ((.Values.backingServices).kafka).saslPassword) | b64enc }}
  {{- end }}
{{- end }}
