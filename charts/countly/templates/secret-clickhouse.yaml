{{- if and (ne (.Values.secrets.mode | default "values") "externalSecret") (not .Values.secrets.clickhouse.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "countly.fullname" . }}-clickhouse
  labels:
    {{- include "countly.labels" . | nindent 4 }}
  annotations:
    {{- if .Values.secrets.keep }}
    helm.sh/resource-policy: keep
    {{- end }}
    {{- if .Values.secrets.rotationId }}
    countly.io/rotation-id: {{ .Values.secrets.rotationId | quote }}
    {{- end }}
    {{- include "countly.syncWave" (dict "wave" "1" "root" .) | nindent 4 }}
type: Opaque
data:
  COUNTLY_CONFIG__CLICKHOUSE_URL: {{ include "countly.clickhouse.url" . | b64enc }}
  COUNTLY_CONFIG__CLICKHOUSE_USERNAME: {{ (.Values.secrets.clickhouse.username | default ((.Values.backingServices).clickhouse).username | default "default") | b64enc }}
  COUNTLY_CONFIG__CLICKHOUSE_PASSWORD: {{ include "countly.secret.value" (dict "secretName" (printf "%s-clickhouse" (include "countly.fullname" .)) "key" "COUNTLY_CONFIG__CLICKHOUSE_PASSWORD" "value" (.Values.secrets.clickhouse.password | default ((.Values.backingServices).clickhouse).password) "namespace" .Release.Namespace) }}
  COUNTLY_CONFIG__CLICKHOUSE_DATABASE: {{ (.Values.secrets.clickhouse.database | default ((.Values.backingServices).clickhouse).database | default "countly_drill") | b64enc }}
{{- end }}
