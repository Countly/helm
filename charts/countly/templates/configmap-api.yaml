apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "countly.fullname" . }}-config-api
  labels:
    {{- include "countly.labels" . | nindent 4 }}
data:
  NODE_OPTIONS: {{ .Values.nodeOptions.api | quote }}
  {{- range $key, $value := .Values.config.api }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
