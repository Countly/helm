apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "countly.fullname" . }}-config-ingestor
  labels:
    {{- include "countly.labels" . | nindent 4 }}
  {{- if .Values.argocd.enabled }}
  annotations:
    {{- include "countly.syncWave" (dict "wave" "2" "root" .) | nindent 4 }}
  {{- end }}
data:
  NODE_OPTIONS: {{ .Values.nodeOptions.ingestor | quote }}
  {{- range $key, $value := .Values.config.ingestor }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
