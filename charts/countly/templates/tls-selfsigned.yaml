{{- $tlsMode := include "countly.tls.mode" . -}}
{{- if eq $tlsMode "selfSigned" }}
{{- $fullname := include "countly.fullname" . -}}
{{- $caSecretName := (.Values.ingress.tls.selfSigned).caSecretName | default (printf "%s-ca-keypair" $fullname) -}}
{{- $issuerName := (.Values.ingress.tls.selfSigned).issuerName | default (printf "%s-ca-issuer" $fullname) -}}
{{- $selfSignedIssuerName := printf "%s-selfsigned-issuer" $fullname -}}
---
# Step 1: SelfSigned issuer (bootstraps the CA)
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: {{ $selfSignedIssuerName }}
  {{- if ((.Values.argocd).enabled) }}
  annotations:
    {{- include "countly.syncWave" (dict "wave" "10" "root" $) | nindent 4 }}
  {{- end }}
  labels:
    {{- include "countly.labels" . | nindent 4 }}
spec:
  selfSigned: {}
---
# Step 2: CA Certificate (issued by selfsigned-issuer)
# Must be in cert-manager namespace — ClusterIssuers read secrets from
# --cluster-resource-namespace which defaults to cert-manager
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ $caSecretName }}
  namespace: cert-manager
  labels:
    {{- include "countly.labels" . | nindent 4 }}
  {{- if ((.Values.argocd).enabled) }}
  annotations:
    {{- include "countly.syncWave" (dict "wave" "11" "root" $) | nindent 4 }}
  {{- end }}
spec:
  isCA: true
  commonName: {{ $fullname }}-ca
  secretName: {{ $caSecretName }}
  duration: 87600h # 10 years
  issuerRef:
    name: {{ $selfSignedIssuerName }}
    kind: ClusterIssuer
    group: cert-manager.io
---
# Step 3: CA Issuer (signs actual TLS certificates for Ingress resources)
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: {{ $issuerName }}
  labels:
    {{- include "countly.labels" . | nindent 4 }}
  {{- if ((.Values.argocd).enabled) }}
  annotations:
    {{- include "countly.syncWave" (dict "wave" "12" "root" $) | nindent 4 }}
  {{- end }}
spec:
  ca:
    secretName: {{ $caSecretName }}
{{- end }}
