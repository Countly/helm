apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "countly.fullname" . }}-config-kafka
  labels:
    {{- include "countly.labels" . | nindent 4 }}
  {{- if ((.Values.argocd).enabled) }}
  annotations:
    {{- include "countly.syncWave" (dict "wave" "2" "root" .) | nindent 4 }}
  {{- end }}
data:
  {{- range $key, $value := .Values.config.kafka }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
  COUNTLY_CONFIG__KAFKA_CONNECTAPIURL: {{ include "countly.kafka.connectApiUrl" . | quote }}
