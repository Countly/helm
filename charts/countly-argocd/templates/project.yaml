apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: {{ include "countly-argocd.projectName" . }}
  namespace: argocd
  labels:
    {{- include "countly-argocd.labels" . | nindent 4 }}
spec:
  description: "Countly analytics platform ({{ .Values.environment }})"
  sourceRepos:
    - {{ .Values.repoURL | quote }}
  destinations:
    - namespace: "*"
      server: {{ .Values.destination.server }}
  clusterResourceWhitelist:
    - group: storage.k8s.io
      kind: StorageClass
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
    - group: cert-manager.io
      kind: ClusterIssuer
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
  orphanedResources:
    warn: true
