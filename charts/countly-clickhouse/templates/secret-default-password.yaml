{{- if and (ne (.Values.secrets.mode | default "values") "externalSecret") (not .Values.auth.defaultUserPassword.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.auth.defaultUserPassword.secretName }}
  labels:
    {{- include "countly-clickhouse.labels" . | nindent 4 }}
  annotations:
    {{- if .Values.secrets.keep }}
    helm.sh/resource-policy: keep
    {{- end }}
    {{- include "countly-clickhouse.syncWave" (dict "wave" "0" "root" .) | nindent 4 }}
type: Opaque
data:
  {{- $existing := lookup "v1" "Secret" .Release.Namespace .Values.auth.defaultUserPassword.secretName }}
  {{- if and $existing (not .Values.auth.defaultUserPassword.password) }}
  {{ .Values.auth.defaultUserPassword.key }}: {{ index $existing.data .Values.auth.defaultUserPassword.key }}
  {{- else if .Values.auth.defaultUserPassword.password }}
  {{ .Values.auth.defaultUserPassword.key }}: {{ .Values.auth.defaultUserPassword.password | b64enc }}
  {{- else }}
  {{- fail (printf "ClickHouse password is required. Set auth.defaultUserPassword.password or provide auth.defaultUserPassword.existingSecret.") }}
  {{- end }}
{{- end }}
