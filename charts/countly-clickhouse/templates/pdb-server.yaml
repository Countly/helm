{{- if .Values.podDisruptionBudget.server.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "countly-clickhouse.fullname" . }}-server-pdb
  labels:
    {{- include "countly-clickhouse.labels" . | nindent 4 }}
  {{- if ((.Values.argocd).enabled) }}
  annotations:
    {{- include "countly-clickhouse.syncWave" (dict "wave" "5" "root" .) | nindent 4 }}
  {{- end }}
spec:
  maxUnavailable: {{ .Values.podDisruptionBudget.server.maxUnavailable | default 1 }}
  selector:
    matchLabels:
      clickhouse.com/role: clickhouse-server
{{- end }}
