{{- if .Values.server.persistence.createStorageClass }}
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: {{ .Values.server.persistence.storageClassName }}
  labels:
    {{- include "countly-clickhouse.labels" . | nindent 4 }}
allowVolumeExpansion: true
provisioner: pd.csi.storage.gke.io
parameters:
  type: pd-balanced
reclaimPolicy: Retain
volumeBindingMode: WaitForFirstConsumer
{{- end }}
