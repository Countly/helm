{{- if and (eq (.Values.secrets.mode | default "values") "externalSecret") (not .Values.auth.defaultUserPassword.existingSecret) }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.auth.defaultUserPassword.secretName }}
  labels:
    {{- include "countly-clickhouse.labels" . | nindent 4 }}
  annotations:
    {{- include "countly-clickhouse.syncWave" (dict "wave" "0" "root" .) | nindent 4 }}
spec:
  refreshInterval: {{ .Values.secrets.externalSecret.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ required "secrets.externalSecret.secretStoreRef.name is required when secrets.mode=externalSecret" .Values.secrets.externalSecret.secretStoreRef.name }}
    kind: {{ .Values.secrets.externalSecret.secretStoreRef.kind | default "ClusterSecretStore" }}
  target:
    name: {{ .Values.auth.defaultUserPassword.secretName }}
    creationPolicy: Owner
  data:
    - secretKey: {{ .Values.auth.defaultUserPassword.key }}
      remoteRef:
        key: {{ required "secrets.externalSecret.remoteRefs.defaultUserPassword is required when secrets.mode=externalSecret" .Values.secrets.externalSecret.remoteRefs.defaultUserPassword }}
{{- end }}
