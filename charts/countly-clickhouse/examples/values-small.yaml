# Small / development ClickHouse cluster.
# Single shard, single replica, minimal resources.

shards: 1
replicas: 1

auth:
  defaultUserPassword:
    password: "dev-password"

server:
  resources:
    requests:
      cpu: "500m"
      memory: "2Gi"
    limits:
      cpu: "1"
      memory: "4Gi"
  persistence:
    size: 20Gi

keeper:
  replicas: 1
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "250m"
      memory: "512Mi"
  persistence:
    size: 2Gi
