# -- Global settings shared across all Countly charts
global:
  # -- Override container image registry for all images
  imageRegistry: ""
  # -- Global image pull secrets
  imagePullSecrets: []
  # -- Default StorageClass for PVCs (empty = cluster default)
  storageClass: ""
  # -- Sizing profile name (informational, used by environment overlays)
  sizing: small
  # -- Global scheduling defaults (merged with per-component settings)
  scheduling:
    nodeSelector: {}
    tolerations: []

# -- Override the chart name used in resource names
nameOverride: ""
# -- Override the full resource name
fullnameOverride: ""

# -- Create the target namespace (disable when ArgoCD manages namespace creation)
createNamespace: false

# -- ArgoCD integration (adds sync-wave annotations when enabled)
argocd:
  enabled: false

# -- ClickHouse Operator CRD API version
clickhouseOperator:
  apiVersion: clickhouse.com/v1alpha1

# -- ClickHouse server version
version: "26.2"
# -- Number of shards in the cluster
shards: 1
# -- Number of replicas per shard
replicas: 2

# -- Container images for ClickHouse components
image:
  # -- ClickHouse server image
  server: clickhouse/clickhouse-server
  # -- ClickHouse Keeper image
  keeper: clickhouse/clickhouse-keeper

# -- Default database created on cluster initialization
database: countly_drill

# -- Authentication configuration
auth:
  # -- Default user password (required on first install)
  defaultUserPassword:
    # -- Use a pre-created Secret instead of creating one from values
    existingSecret: ""
    # -- Name of the Secret to create (when existingSecret is empty)
    secretName: clickhouse-default-password
    # -- Key within the Secret containing the password
    key: password
    # -- Password value (REQUIRED on first install unless existingSecret is set)
    password: ""
  # -- Optional admin user with SHA256 password hash
  adminUser:
    # -- Create the admin user
    enabled: false
    # Precomputed SHA256 hex of the admin password (64 hex chars).
    # Generate: echo -n 'your_password' | sha256sum | cut -d' ' -f1
    # Supply via overlay (DO NOT commit to VCS).
    # Use a long random password to mitigate offline guessing attacks.
    passwordSha256Hex: ""

# --- OpenTelemetry Server-Side Tracing ---
# When enabled, ClickHouse logs spans to system.opentelemetry_span_log for queries
# that arrive with W3C traceparent headers (injected by ClickhouseClient.js).
# A separate export bridge is needed to ship spans from this table to Tempo.
opentelemetry:
  # -- Enable server-side OpenTelemetry span logging
  enabled: false
  spanLog:
    # -- TTL in days for span log entries
    ttlDays: 7
    # -- Flush interval for the span log buffer
    flushIntervalMs: 1000

# -- ClickHouse server configuration
server:
  # -- Pod security context for server pods
  securityContext:
    runAsNonRoot: true
    runAsUser: 101
    runAsGroup: 101
    fsGroup: 101
  # -- Resource requests and limits per server replica
  resources:
    requests:
      cpu: "1"
      memory: "4Gi"
    limits:
      cpu: "2"
      memory: "8Gi"
  # -- Persistent volume configuration for server data
  persistence:
    # -- StorageClass override (empty = global or cluster default)
    storageClass: ""
    # -- Data volume size per server replica
    size: 50Gi
  # -- ClickHouse server settings
  settings:
    # -- Maximum concurrent connections
    maxConnections: 4096
    # -- Additional XML config merged into config.xml
    extraConfig: ""
    # -- Additional XML config merged into users.xml
    extraUsersConfig: ""
    # -- Prometheus metrics endpoint on each server pod
    prometheus:
      enabled: true
      port: 9363
      endpoint: /metrics
  # -- Scheduling constraints for server pods
  scheduling:
    nodeSelector: {}
    tolerations: []
    affinity: {}
    topologySpreadConstraints: []
    # -- Pod anti-affinity to spread server replicas across nodes
    antiAffinity:
      enabled: true
      # -- preferred or required
      type: preferred
      topologyKey: kubernetes.io/hostname
      weight: 100

# -- ClickHouse Keeper configuration (distributed coordination)
keeper:
  # -- Number of Keeper nodes (use odd numbers: 1, 3, 5)
  replicas: 1
  # -- Pod security context for Keeper pods
  securityContext:
    runAsNonRoot: true
    runAsUser: 101
    runAsGroup: 101
    fsGroup: 101
  # -- Resource requests and limits per Keeper node
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "500m"
      memory: "1Gi"
  # -- Persistent volume configuration for Keeper data
  persistence:
    # -- StorageClass override (empty = global or cluster default)
    storageClass: ""
    # -- Data volume size per Keeper node
    size: 5Gi
  # -- Keeper settings
  settings:
    # -- Prometheus metrics endpoint on each Keeper pod
    prometheus:
      enabled: true
      port: 9090
      endpoint: /metrics
  # -- Scheduling constraints for Keeper pods
  scheduling:
    nodeSelector: {}
    tolerations: []
    affinity: {}
    # -- Pod anti-affinity to spread Keeper nodes across nodes
    antiAffinity:
      enabled: true
      type: preferred
      topologyKey: kubernetes.io/hostname
      weight: 100

# -- Pod disruption budgets
podDisruptionBudget:
  # -- PDB for ClickHouse server pods
  server:
    enabled: false
    maxUnavailable: 1
  # -- PDB for Keeper pods
  keeper:
    enabled: false
    maxUnavailable: 1

# -- Network policy restricting ingress to ClickHouse pods
networkPolicy:
  # -- Enable the NetworkPolicy
  enabled: false
  # -- Namespaces allowed to connect to ClickHouse
  allowedNamespaces:
    - countly
    - kafka
  # -- Allow ingress from the monitoring namespace (for metrics scraping)
  allowMonitoring: false
  # -- Label selector for the monitoring namespace
  monitoringNamespaceSelector:
    kubernetes.io/metadata.name: monitoring
  # -- Additional custom ingress rules
  additionalIngress: []

# -- Prometheus ServiceMonitor for ClickHouse metrics
serviceMonitor:
  # -- Deploy a ServiceMonitor resource
  enabled: false
  # -- Scrape interval
  interval: "15s"
  # -- "headless" for per-pod scraping, "clusterIP" for any-pod
  serviceType: headless

# -- Secret retention settings
secrets:
  # -- Preserve secrets on helm uninstall/upgrade
  keep: true
