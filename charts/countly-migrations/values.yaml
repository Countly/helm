global:
  imageRegistry: ""
  imagePullSecrets: []
  storageClass: ""
  scheduling:
    nodeSelector: {}
    tolerations: []

nameOverride: ""
fullnameOverride: ""

createNamespace: false

strimzi:
  apiVersion: kafka.strimzi.io/v1beta2

# ── MIGRATION CONTROL ──────────────────────────────────
# Master switch for all connectors. Per-connector overrides available below.
migration:
  state: running            # running | paused | stopped
  deleteClaim: false        # Set true before teardown to auto-delete PVCs

# ── ARGOCD (optional) ─────────────────────────────────
# When enabled, adds sync-wave annotations for ordered deployment.
# When disabled (default), chart works with plain helm install.
argocd:
  enabled: false

# ── STRIMZI OPERATOR ──────────────────────────────────
# Deploys a namespace-scoped Strimzi operator. CRDs must be pre-installed.
operator:
  enabled: true
  image: quay.io/strimzi/operator:0.47.0
  replicas: 1
  resources:
    requests:
      cpu: 200m
      memory: 384Mi
    limits:
      cpu: 500m
      memory: 384Mi
  reconciliationIntervalMs: "120000"
  operationTimeoutMs: "300000"
  # Strimzi image maps (operator resolves container images from these)
  imageMaps:
    kafka: "quay.io/strimzi/kafka:0.47.0-kafka-4.0.0"
    kafkaConnect: "quay.io/strimzi/kafka:0.47.0-kafka-4.0.0"
    kafkaBridge: "quay.io/strimzi/kafka:0.47.0-kafka-4.0.0"
    kafkaMirrorMaker2: "quay.io/strimzi/kafka:0.47.0-kafka-4.0.0"
  kanikoImage: "quay.io/strimzi/kaniko-executor:0.47.0"
  mavenBuilderImage: "quay.io/strimzi/maven-builder:0.47.0"

# ── STORAGE ───────────────────────────────────────────
storageClass:
  create: true
  name: migrations-storage
  provisioner: pd.csi.storage.gke.io    # GKE default
  parameters:
    type: pd-ssd
  reclaimPolicy: Retain
  allowVolumeExpansion: true
  volumeBindingMode: WaitForFirstConsumer

# ── KAFKA ─────────────────────────────────────────────
version: "4.0.0"

listeners:
  - name: internal
    port: 9092
    type: internal
    tls: false

brokers:
  replicas: 1
  resources:
    requests:
      cpu: "500m"
      memory: "2Gi"
    limits:
      cpu: "1"
      memory: "4Gi"
  jvmOptions:
    xms: "1g"
    xmx: "2g"
  config:
    default.replication.factor: 1
    min.insync.replicas: 1
    unclean.leader.election.enable: false
    log.retention.hours: 48
    log.segment.bytes: "1073741824"
    log.cleanup.policy: delete
    compression.type: zstd
    auto.create.topics.enable: true
    offsets.topic.replication.factor: 1
    transaction.state.log.replication.factor: 1
    transaction.state.log.min.isr: 1
  persistence:
    size: 50Gi
    storageClass: ""
    deleteClaim: false
  scheduling:
    nodeSelector: {}
    tolerations: []

controllers:
  replicas: 1
  resources:
    requests:
      cpu: "200m"
      memory: "1Gi"
    limits:
      cpu: "500m"
      memory: "2Gi"
  persistence:
    size: 10Gi
    storageClass: ""
    deleteClaim: false
  scheduling:
    nodeSelector: {}
    tolerations: []

# ── CONNECT SOURCE (Debezium) ─────────────────────────
connectSrc:
  name: connect-mig-src
  image: "kanwarujjaval/connect-migrations:0.47.0-kafka-4.0.0-dbz-3.2.2-ch-1.3.3"
  replicas: 1
  resources:
    requests:
      cpu: "500m"
      memory: "2Gi"
    limits:
      cpu: "1"
      memory: "3Gi"
  jvmOptions:
    xms: "1g"
    xmx: "2g"
  workerConfig:
    group.id: connect-mig-src
    config.storage.topic: mig_src_configs
    offset.storage.topic: mig_src_offsets
    status.storage.topic: mig_src_status
    config.storage.replication.factor: 1
    offset.storage.replication.factor: 1
    status.storage.replication.factor: 1
    key.converter: org.apache.kafka.connect.storage.StringConverter
    value.converter: org.apache.kafka.connect.json.JsonConverter
    value.converter.schemas.enable: "false"
    connector.client.config.override.policy: All
    config.providers: env
    config.providers.env.class: org.apache.kafka.common.config.provider.EnvVarConfigProvider

# ── CONNECT SINK (ClickHouse + Writeback) ─────────────
connectSink:
  name: connect-mig-sink
  image: "kanwarujjaval/connect-migrations:0.47.0-kafka-4.0.0-dbz-3.2.2-ch-1.3.3"
  replicas: 1
  resources:
    requests:
      cpu: "1"
      memory: "4Gi"
    limits:
      cpu: "2"
      memory: "8Gi"
  jvmOptions:
    xms: "2g"
    xmx: "4g"
  workerConfig:
    group.id: connect-mig-sink
    config.storage.topic: mig_sink_configs
    offset.storage.topic: mig_sink_offsets
    status.storage.topic: mig_sink_status
    config.storage.replication.factor: 1
    offset.storage.replication.factor: 1
    status.storage.replication.factor: 1
    key.converter: org.apache.kafka.connect.storage.StringConverter
    value.converter: org.apache.kafka.connect.json.JsonConverter
    value.converter.schemas.enable: "false"
    connector.client.config.override.policy: All
    config.providers: env
    config.providers.env.class: org.apache.kafka.common.config.provider.EnvVarConfigProvider

# ── MONGODB SOURCE ────────────────────────────────────
mongodb:
  connectionString: "mongodb://host:27017/?replicaSet=rs0"
  database: countly_drill
  filtersMatchMode: regex       # literal | regex
  namespaceSelector: "countly_drill[.]drill_events.*"
  topicPrefix: mig

# ── CLICKHOUSE TARGET ─────────────────────────────────
clickhouse:
  existingSecret: ""
  secretName: clickhouse-auth
  host: ch.clickhouse.svc.cluster.local
  port: "8123"
  ssl: "false"
  database: countly_drill
  username: default
  password: ""
  settings: "input_format_binary_read_json_as_string=1,allow_experimental_json_type=1,enable_json_type=1,async_insert=1,wait_for_async_insert=1,input_format_skip_unknown_fields=1"
  bypassRowBinary: "false"
  tableRefreshInterval: "300"

# ── DEBEZIUM TUNING ──────────────────────────────────
debezium:
  snapshotMode: initial
  snapshotMaxThreads: 8
  snapshotFetchSize: 5000
  maxBatchSize: 2048
  maxQueueSize: 8192

# ── CONVERTERS ────────────────────────────────────────
converters:
  key: org.apache.kafka.connect.storage.StringConverter
  value: org.apache.kafka.connect.json.JsonConverter
  valueSchemasEnable: "false"

# ── BEHAVIOR ──────────────────────────────────────────
behavior:
  exactlyOnce: "false"
  errorsRetryTimeout: "60"
  errorsTolerance: all

# ── CONSUMER TUNING ──────────────────────────────────
consumerTuning:
  sink:
    fetchMinBytes: "2097152"
    fetchMaxWaitMs: "5000"
    maxPollRecords: "50000"
    maxPartitionFetchBytes: "5242880"
    fetchMaxBytes: "134217728"
  writeback:
    maxPollRecords: "10000"
    fetchMaxWaitMs: "500"

# ── CONNECTORS ────────────────────────────────────────
connectors:
  source:
    enabled: true
    state: ""                   # Empty = inherit migration.state
    tasksMax: 1
    topicPartitions: 4
    topicReplicationFactor: 1
    snapshotFilter: '{"migrated": {"$ne": true}}'
  clickhouseSink:
    enabled: true
    state: ""
    tasksMax: 4
    topics: drill-events-migration
    topic2TableMap: "drill-events-migration=drill_events"
    dlq:
      topicName: drill-migration-dlq
      replicationFactor: 1
      headerEnabled: true
  mongoWriteback:
    enabled: true
    state: ""
    tasksMax: 2
    bulkWriteOrdered: "false"
    bulkWriteSize: 10000
    maxRetries: 3
    dlq:
      topicName: writeback-dlq
      replicationFactor: 1
      headerEnabled: true

# ── METRICS ───────────────────────────────────────────
metrics:
  enabled: true

# ── PROGRESS MONITOR ─────────────────────────────────
progressMonitor:
  enabled: false
  schedule: "*/5 * * * *"
  image: bitnami/kubectl:1.30
  mongodb:
    namespace: mongodb
    pod: app-mongodb-0
    container: mongod
    user: app
    database: countly_drill
  clickhouse:
    namespace: clickhouse
    pod: chi-ch-prod-main-0-0-0
    container: clickhouse
    database: countly_drill
    table: drill_events

# ── SECRETS ───────────────────────────────────────────
secrets:
  keep: true
