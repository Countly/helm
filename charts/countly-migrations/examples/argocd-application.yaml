# Example ArgoCD Application for countly-migrations chart.
# This is NOT deployed by the chart — copy and customize for your setup.
#
# Prerequisites:
#   - ArgoCD installed in the cluster
#   - Strimzi CRDs installed (from production Kafka or separately)
#   - Set argocd.enabled=true in your values to add sync-wave annotations
#   - Custom health checks for Strimzi CRDs in argocd-cm (see below)
#
# Strimzi health checks (add to argocd-cm ConfigMap):
#   resource.customizations.health.kafka.strimzi.io_Kafka: |
#     hs = {}
#     if obj.status ~= nil and obj.status.conditions ~= nil then
#       for _, c in ipairs(obj.status.conditions) do
#         if c.type == "Ready" and c.status == "True" then
#           hs.status = "Healthy"; hs.message = "Ready"; return hs
#         end
#       end
#     end
#     hs.status = "Progressing"; hs.message = "Waiting"; return hs
#
#   (Repeat for KafkaConnect, KafkaNodePool, KafkaConnector)

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: countly-migrations
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Countly/helm.git
    targetRevision: main
    path: charts/countly-migrations
    helm:
      releaseName: mig
      valueFiles:
        - ../../environments/production/migrations.yaml
      parameters:
        - name: argocd.enabled
          value: "true"
  destination:
    server: https://kubernetes.default.svc
    namespace: kafka-migrations
  syncPolicy:
    automated:
      prune: true
      selfHeal: false     # false: don't fight manual pauses
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
  ignoreDifferences:
    - group: kafka.strimzi.io
      kind: Kafka
      jsonPointers:
        - /status
    - group: kafka.strimzi.io
      kind: KafkaConnect
      jsonPointers:
        - /status
    - group: kafka.strimzi.io
      kind: KafkaConnector
      jsonPointers:
        - /status
