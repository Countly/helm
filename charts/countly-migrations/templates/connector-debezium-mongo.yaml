{{- if .Values.connectors.source.enabled }}
apiVersion: {{ .Values.strimzi.apiVersion }}
kind: KafkaConnector
metadata:
  name: mongo-snapshot-only-mig
  labels:
    strimzi.io/cluster: {{ include "countly-migrations.connectSrcName" . }}
    {{- include "countly-migrations.labels" . | nindent 4 }}
  {{- if .Values.argocd.enabled }}
  annotations:
    {{- include "countly-migrations.syncWave" (dict "wave" "15" "root" .) | nindent 4 }}
  {{- end }}
spec:
  class: io.debezium.connector.mongodb.MongoDbConnector
  tasksMax: {{ .Values.connectors.source.tasksMax }}
  state: {{ include "countly-migrations.connectorState" (dict "connector" .Values.connectors.source "global" .Values.migration) }}
  autoRestart:
    enabled: true
  config:
    mongodb.connection.string: "${env:MONGO_CONN_STR}"
    topic.prefix: "${env:TOPIC_PREFIX}"
    filters.match.mode: "${env:DBZ_FILTERS_MATCH_MODE}"
    database.include.list: "${env:MONGO_DB}"
    collection.include.list: "${env:DRILL_EVENTS_NS_SELECTOR}"

    snapshot.mode: "${env:DBZ_SNAPSHOT_MODE}"
    snapshot.max.threads: "${env:DBZ_SNAPSHOT_MAX_THREADS}"
    snapshot.fetch.size: "${env:DBZ_SNAPSHOT_FETCH_SIZE}"
    # Only snapshot documents not yet marked as migrated
    snapshot.collection.filter.override.countly_drill.drill_events: {{ .Values.connectors.source.snapshotFilter | quote }}

    max.batch.size: "${env:DBZ_MAX_BATCH_SIZE}"
    max.queue.size: "${env:DBZ_MAX_QUEUE_SIZE}"
    tombstones.on.delete: "false"

    # SMT transformation chain
    transforms: "normalize,route"
    transforms.normalize.type: "dev.you.smt.ClyEventNormalize"
    transforms.route.type: "org.apache.kafka.connect.transforms.RegexRouter"
    transforms.route.regex: ".*"
    transforms.route.replacement: "drill-events-migration"

    # Topic creation
    topic.creation.enable: "true"
    topic.creation.default.partitions: {{ .Values.connectors.source.topicPartitions | quote }}
    topic.creation.default.replication.factor: {{ .Values.connectors.source.topicReplicationFactor | quote }}

    key.converter: "${env:KEY_CONVERTER}"
    value.converter: "${env:VALUE_CONVERTER}"
    value.converter.schemas.enable: "${env:VALUE_CONVERTER_SCHEMAS_ENABLE}"
{{- end }}
