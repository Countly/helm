{{- if .Values.progressMonitor.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "countly-migrations.fullname" . }}-progress
  labels:
    {{- include "countly-migrations.labels" . | nindent 4 }}
  {{- if .Values.argocd.enabled }}
  annotations:
    {{- include "countly-migrations.syncWave" (dict "wave" "20" "root" .) | nindent 4 }}
  {{- end }}
spec:
  schedule: {{ .Values.progressMonitor.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 0
      template:
        spec:
          serviceAccountName: {{ include "countly-migrations.fullname" . }}-progress
          restartPolicy: Never
          containers:
            - name: progress
              image: {{ .Values.progressMonitor.image }}
              command: ["/bin/bash", "/scripts/check-progress.sh"]
              volumeMounts:
                - name: script
                  mountPath: /scripts
                  readOnly: true
          volumes:
            - name: script
              configMap:
                name: {{ include "countly-migrations.fullname" . }}-progress-script
                defaultMode: 0755
{{- end }}
