{{- if .Values.progressMonitor.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "countly-migrations.fullname" . }}-progress
  labels:
    {{- include "countly-migrations.labels" . | nindent 4 }}
  annotations:
    {{- include "countly-migrations.syncWave" (dict "wave" "20" "root" .) | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/exec"]
    verbs: ["get", "list", "create"]
  - apiGroups: ["kafka.strimzi.io"]
    resources: ["kafkaconnectors"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "countly-migrations.fullname" . }}-progress
  labels:
    {{- include "countly-migrations.labels" . | nindent 4 }}
  annotations:
    {{- include "countly-migrations.syncWave" (dict "wave" "20" "root" .) | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "countly-migrations.fullname" . }}-progress
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "countly-migrations.fullname" . }}-progress
{{- end }}
