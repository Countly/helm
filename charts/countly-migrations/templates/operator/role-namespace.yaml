{{- if .Values.operator.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: strimzi-cluster-operator-namespaced
  labels:
    {{- include "countly-migrations.labels" . | nindent 4 }}
  annotations:
    {{- include "countly-migrations.syncWave" (dict "wave" "-1" "root" .) | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "services", "endpoints", "configmaps", "secrets", "events", "persistentvolumeclaims", "serviceaccounts"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "replicasets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["policy"]
    resources: ["poddisruptionbudgets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies", "ingresses"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["kafka.strimzi.io"]
    resources: ["kafkas", "kafkaconnects", "kafkaconnectors", "kafkamirrormaker2s", "kafkabridges", "kafkarebalances", "kafkanodepools"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["kafka.strimzi.io"]
    resources: ["*/status"]
    verbs: ["get", "patch", "update"]
  - apiGroups: ["kafka.strimzi.io"]
    resources: ["*/finalizers"]
    verbs: ["update"]
  - apiGroups: ["core.strimzi.io"]
    resources: ["strimzipodsets", "strimzipodsets/status"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
{{- end }}
