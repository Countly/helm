{{- /* ===== Broker config vs replica count validations ===== */}}
{{- $brokerCount := int .Values.brokers.replicas }}
{{- $rf := index .Values.brokers.config "default.replication.factor" | default 1 }}
{{- if gt (int $rf) $brokerCount }}
{{- fail (printf "default.replication.factor (%d) cannot exceed broker replicas (%d)" (int $rf) $brokerCount) }}
{{- end }}
{{- $minIsr := index .Values.brokers.config "min.insync.replicas" | default 1 }}
{{- if gt (int $minIsr) $brokerCount }}
{{- fail (printf "min.insync.replicas (%d) cannot exceed broker replicas (%d)" (int $minIsr) $brokerCount) }}
{{- end }}
{{- $offsetsRf := index .Values.brokers.config "offsets.topic.replication.factor" | default 1 }}
{{- if gt (int $offsetsRf) $brokerCount }}
{{- fail (printf "offsets.topic.replication.factor (%d) cannot exceed broker replicas (%d)" (int $offsetsRf) $brokerCount) }}
{{- end }}
{{- $txnRf := index .Values.brokers.config "transaction.state.log.replication.factor" | default 1 }}
{{- if gt (int $txnRf) $brokerCount }}
{{- fail (printf "transaction.state.log.replication.factor (%d) cannot exceed broker replicas (%d)" (int $txnRf) $brokerCount) }}
{{- end }}
{{- /* Validate connect workerConfig replication factors */}}
{{- $srcConfigRf := index .Values.connectSrc.workerConfig "config.storage.replication.factor" | default 1 }}
{{- if gt (int $srcConfigRf) $brokerCount }}
{{- fail (printf "connectSrc config.storage.replication.factor (%d) cannot exceed broker replicas (%d)" (int $srcConfigRf) $brokerCount) }}
{{- end }}
{{- $sinkConfigRf := index .Values.connectSink.workerConfig "config.storage.replication.factor" | default 1 }}
{{- if gt (int $sinkConfigRf) $brokerCount }}
{{- fail (printf "connectSink config.storage.replication.factor (%d) cannot exceed broker replicas (%d)" (int $sinkConfigRf) $brokerCount) }}
{{- end }}
---
apiVersion: {{ .Values.strimzi.apiVersion }}
kind: KafkaNodePool
metadata:
  name: {{ include "countly-migrations.fullname" . }}-brokers
  annotations:
    "helm.sh/resource-policy": keep
    {{- include "countly-migrations.syncWave" (dict "wave" "5" "root" .) | nindent 4 }}
  labels:
    strimzi.io/cluster: {{ include "countly-migrations.fullname" . }}
    {{- include "countly-migrations.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.brokers.replicas }}
  roles:
    - broker
  storage:
    type: persistent-claim
    size: {{ .Values.brokers.persistence.size }}
    {{- $brokerSC := include "countly-migrations.storageClassName" (dict "component" .Values.brokers.persistence "root" .) }}
    {{- if $brokerSC }}
    class: {{ $brokerSC | quote }}
    {{- end }}
    deleteClaim: {{ include "countly-migrations.deleteClaim" . }}
  resources:
    {{- toYaml .Values.brokers.resources | nindent 4 }}
  jvmOptions:
    -Xms: {{ .Values.brokers.jvmOptions.xms }}
    -Xmx: {{ .Values.brokers.jvmOptions.xmx }}
  template:
    pod:
      {{- with .Values.brokers.scheduling.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.brokers.scheduling.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: {{ .Values.strimzi.apiVersion }}
kind: KafkaNodePool
metadata:
  name: {{ include "countly-migrations.fullname" . }}-controllers
  annotations:
    "helm.sh/resource-policy": keep
    {{- include "countly-migrations.syncWave" (dict "wave" "5" "root" .) | nindent 4 }}
  labels:
    strimzi.io/cluster: {{ include "countly-migrations.fullname" . }}
    {{- include "countly-migrations.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.controllers.replicas }}
  roles:
    - controller
  storage:
    type: persistent-claim
    size: {{ .Values.controllers.persistence.size }}
    {{- $controllerSC := include "countly-migrations.storageClassName" (dict "component" .Values.controllers.persistence "root" .) }}
    {{- if $controllerSC }}
    class: {{ $controllerSC | quote }}
    {{- end }}
    deleteClaim: {{ include "countly-migrations.deleteClaim" . }}
  resources:
    {{- toYaml .Values.controllers.resources | nindent 4 }}
  template:
    pod:
      {{- with .Values.controllers.scheduling.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.controllers.scheduling.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: {{ .Values.strimzi.apiVersion }}
kind: Kafka
metadata:
  name: {{ include "countly-migrations.fullname" . }}
  labels:
    {{- include "countly-migrations.labels" . | nindent 4 }}
  annotations:
    "helm.sh/resource-policy": keep
    strimzi.io/kraft: enabled
    strimzi.io/node-pools: enabled
    {{- include "countly-migrations.syncWave" (dict "wave" "5" "root" .) | nindent 4 }}
spec:
  kafka:
    version: {{ .Values.version | quote }}
    listeners:
      {{- range .Values.listeners }}
      - name: {{ .name }}
        port: {{ .port }}
        type: {{ .type }}
        tls: {{ .tls }}
      {{- end }}
    config:
      {{- range $key, $value := .Values.brokers.config }}
      {{ $key }}: {{ $value | quote }}
      {{- end }}
    {{- if .Values.metrics.enabled }}
    metricsConfig:
      type: jmxPrometheusExporter
      valueFrom:
        configMapKeyRef:
          name: {{ include "countly-migrations.fullname" . }}-metrics
          key: kafka-metrics-config.yml
    {{- end }}
  entityOperator: {}
