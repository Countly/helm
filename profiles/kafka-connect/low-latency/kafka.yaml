# Kafka Connect Profile: Low Latency
# Optimized for small deployments prioritizing low RAM usage.
# Uses small batches with frequent writes to ClickHouse.
# Trade-off: Higher ClickHouse write load, lower memory footprint.
kafkaConnect:
  resources:
    requests:
      cpu: "1"
      memory: "4Gi"
    limits:
      cpu: "2"
      memory: "4Gi"
  jvmOptions:
    xms: "2g"
    xmx: "2g"
  env:
    KAFKA_CONSUMER_FETCH_MIN_BYTES: "5242880"
    KAFKA_CONSUMER_FETCH_MAX_WAIT_MS: "10000"
    KAFKA_CONSUMER_MAX_POLL_RECORDS: "50000"
    KAFKA_CONSUMER_MAX_PARTITION_FETCH_BYTES: "33554432"
    KAFKA_CONSUMER_FETCH_MAX_BYTES: "134217728"
    CLICKHOUSE_SETTINGS: >-
      async_insert=1,
      wait_for_async_insert=1,
      async_insert_use_adaptive_busy_timeout=1,
      async_insert_busy_timeout_ms=2000,
      async_insert_max_data_size=67108864,
      async_insert_max_query_number=16,
      min_insert_block_size_rows=50000,
      min_insert_block_size_bytes=67108864,
      max_partitions_per_insert_block=500
