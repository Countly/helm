# Observability Profile: External Grafana
# All backends (Prometheus, Loki, Tempo, Pyroscope) deployed in-cluster.
# Grafana is NOT deployed — connect your external Grafana to the in-cluster backends.
#
# After deploying, point your external Grafana datasources to:
#   Prometheus: http://<release>-prometheus.observability.svc.cluster.local:9090
#   Loki:       http://<release>-loki.observability.svc.cluster.local:3100
#   Tempo:      <release>-tempo.observability.svc.cluster.local:4317 (gRPC)
#   Pyroscope:  http://<release>-pyroscope.observability.svc.cluster.local:4040
mode: "hybrid"

metrics:
  enabled: true
traces:
  enabled: true
logs:
  enabled: true
profiling:
  enabled: true

grafana:
  enabled: false

kubeStateMetrics:
  enabled: true
nodeExporter:
  enabled: true
