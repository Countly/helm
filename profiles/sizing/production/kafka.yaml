# Profile: production — Kafka chart sizing
#
# IMPORTANT: This profile requires a minimum of 3 Kafka brokers.
# If you override brokers.replicas to fewer than 3, you MUST also override:
#   brokers.config.min.insync.replicas (default 2)
#   brokers.config.offsets.topic.replication.factor (default 3)
#   brokers.config.transaction.state.log.replication.factor (default 3)
#   brokers.config.transaction.state.log.min.isr (default 2)
#   kafkaConnect.workerConfig.config.storage.replication.factor (default 2)
#   kafkaConnect.workerConfig.offset.storage.replication.factor (default 2)
#   kafkaConnect.workerConfig.status.storage.replication.factor (default 2)

brokers:
  replicas: 3
  resources:
    requests: { cpu: "2", memory: "12Gi" }
    limits: { cpu: "2", memory: "12Gi" }
  jvmOptions:
    xms: "4g"
    xmx: "4g"
  persistence:
    volumes:
      - id: 0
        size: 200Gi
  config:
    default.replication.factor: 2
    min.insync.replicas: 2
    offsets.topic.replication.factor: 3
    transaction.state.log.replication.factor: 3
    transaction.state.log.min.isr: 2
    auto.create.topics.enable: false
  scheduling:
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: DoNotSchedule

controllers:
  replicas: 3
  resources:
    requests: { cpu: "500m", memory: "2Gi" }
    limits: { cpu: "1", memory: "2Gi" }
  scheduling:
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: DoNotSchedule

cruiseControl:
  enabled: true
  resources:
    requests: { cpu: "1", memory: "2Gi" }
    limits: { cpu: "1", memory: "2Gi" }

kafkaConnect:
  replicas: 2
  resources:
    requests: { cpu: "2", memory: "8Gi" }
    limits: { cpu: "2", memory: "8Gi" }
  jvmOptions:
    xms: "5g"
    xmx: "5g"
