# Profile: production — Observability chart sizing

prometheus:
  retention:
    time: "90d"
  storage:
    size: 100Gi
  resources:
    requests: { cpu: "2", memory: "3Gi" }
    limits: { cpu: "2", memory: "4Gi" }

loki:
  retention: "90d"
  storage:
    size: 100Gi
  resources:
    requests: { cpu: "500m", memory: "1Gi" }
    limits: { cpu: "1", memory: "2Gi" }

tempo:
  retention: "336h"                       # 14 days — Tempo requires Go time.Duration (no 'd' suffix)
  storage:
    size: 150Gi
  resources:
    requests: { cpu: "3", memory: "6Gi" }
    limits: { cpu: "4", memory: "10Gi" }

pyroscope:
  retention: "336h"
  storage:
    size: 20Gi
  resources:
    requests: { cpu: "500m", memory: "1Gi" }
    limits: { cpu: "1", memory: "2Gi" }

grafana:
  resources:
    requests: { cpu: "1", memory: "1Gi" }
    limits: { cpu: "2", memory: "2Gi" }

alloy:
  resources:
    requests: { cpu: "500m", memory: "1Gi" }
    limits: { cpu: "2", memory: "2Gi" }

alloyOtlp:
  resources:
    requests: { cpu: "500m", memory: "1Gi" }
    limits: { cpu: "2", memory: "2Gi" }
  memoryLimiter:
    limit: "1600MiB"
    spikeLimit: "400MiB"

alloyMetrics:
  resources:
    requests: { cpu: "500m", memory: "512Mi" }
    limits: { cpu: "500m", memory: "512Mi" }
