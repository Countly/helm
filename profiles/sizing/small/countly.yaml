# Profile: small — Countly chart sizing

api:
  replicaCount: 1
  resources:
    requests: { cpu: "500m", memory: "1.5Gi" }
    limits: { cpu: "1", memory: "2Gi" }
  hpa:
    maxReplicas: 3

frontend:
  replicaCount: 1
  resources:
    requests: { cpu: "500m", memory: "1Gi" }
    limits: { cpu: "500m", memory: "1.5Gi" }

ingestor:
  replicaCount: 1
  resources:
    requests: { cpu: "500m", memory: "1.5Gi" }
    limits: { cpu: "1", memory: "2Gi" }
  hpa:
    maxReplicas: 4

aggregator:
  replicaCount: 1
  resources:
    requests: { cpu: "500m", memory: "1.5Gi" }
    limits: { cpu: "1", memory: "2Gi" }
  hpa:
    minReplicas: 1
    maxReplicas: 4
  pdb:
    enabled: false
  scheduling:
    antiAffinity:
      enabled: false

jobserver:
  replicaCount: 1
  resources:
    requests: { cpu: "500m", memory: "1Gi" }
    limits: { cpu: "500m", memory: "1.5Gi" }

# Match single-broker Kafka cluster (RF=1)
config:
  kafka:
    COUNTLY_CONFIG__KAFKA_REPLICATIONFACTOR: "1"

