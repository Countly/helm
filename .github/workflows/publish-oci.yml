name: Publish Helm Charts (OCI)

on:
  release:
    types: [published]

concurrency:
  group: publish-oci
  cancel-in-progress: false

permissions: {}

env:
  REGISTRY: ghcr.io
  REGISTRY_PATH: ghcr.io/countly

jobs:
  lint:
    name: Lint Charts
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1
        with:
          version: v3.17.0

      - name: Lint all charts
        run: |
          for chart in charts/*/; do
            echo "Linting ${chart}..."
            helm lint "${chart}" --strict
          done

  publish:
    name: Publish and Sign Charts
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: lint
    permissions:
      contents: read
      packages: write
      id-token: write
    outputs:
      artifacts: ${{ steps.publish.outputs.artifacts }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1
        with:
          version: v3.17.0

      - name: Install Cosign
        uses: sigstore/cosign-installer@7e8b541eb2e61bf99390e1afd4be13a184e9ebc5 # v3.10.1

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@57aae528053a48a3f6235f2d9461b05fbcb7366d # v0.23.1

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${REGISTRY} -u ${{ github.actor }} --password-stdin

      - name: Package, push, sign, and attach SBOM
        id: publish
        run: |
          mkdir -p /tmp/helm-packages
          artifacts="["
          first=true

          for chart_dir in charts/*/; do
            chart_name=$(basename "${chart_dir}")
            chart_version=$(yq '.version' "${chart_dir}/Chart.yaml")
            if [ -z "${chart_version}" ] || [ "${chart_version}" = "null" ]; then
              echo "ERROR: Could not read version from ${chart_dir}/Chart.yaml"
              exit 1
            fi

            pkg="/tmp/helm-packages/${chart_name}-${chart_version}.tgz"
            echo "::group::${chart_name}:${chart_version}"

            # Package
            helm package "${chart_dir}" --destination /tmp/helm-packages/

            # Push with retry (transient GHCR failures)
            max_retries=3
            push_output=""
            for attempt in $(seq 1 $max_retries); do
              push_output=$(helm push "${pkg}" "oci://${REGISTRY_PATH}" 2>&1) && break
              echo "Push attempt ${attempt}/${max_retries} failed, retrying in 5s..."
              sleep 5
            done
            echo "${push_output}"
            digest=$(echo "${push_output}" | grep -oE 'sha256:[a-f0-9]{64}' | tail -1)

            if [ -z "${digest}" ]; then
              echo "ERROR: Could not extract digest for ${chart_name}"
              exit 1
            fi

            ref="${REGISTRY_PATH}/${chart_name}@${digest}"
            echo "Digest: ${digest}"

            # Sign the OCI artifact (keyless via Sigstore OIDC)
            echo "Signing ${chart_name}..."
            cosign sign --yes "${ref}"

            # Generate SBOM (CycloneDX JSON)
            sbom_file="/tmp/helm-packages/${chart_name}-${chart_version}.sbom.cdx.json"
            echo "Generating SBOM for ${chart_name}..."
            syft dir:"${chart_dir}" -o cyclonedx-json="${sbom_file}"

            # Attach SBOM to the OCI artifact
            cosign attach sbom --sbom "${sbom_file}" "${ref}"

            # Sign the SBOM attachment
            cosign sign --yes --attachment sbom "${ref}"

            echo "::endgroup::"

            # Build matrix JSON for provenance attestation job
            if [ "${first}" = true ]; then first=false; else artifacts+=","; fi
            artifacts+="{\"name\":\"${REGISTRY_PATH}/${chart_name}\",\"digest\":\"${digest}\"}"
          done

          artifacts+="]"
          echo "artifacts=${artifacts}" >> "$GITHUB_OUTPUT"

      - name: Summary
        run: |
          echo "## Published Charts" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "All charts are signed with Cosign (keyless/Sigstore) and include SBOM attestations." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          for chart_dir in charts/*/; do
            chart_name=$(basename "${chart_dir}")
            chart_version=$(yq '.version' "${chart_dir}/Chart.yaml")
            echo "- \`oci://${REGISTRY_PATH}/${chart_name}:${chart_version}\` — signed + SBOM" >> "$GITHUB_STEP_SUMMARY"
          done

  attest:
    name: Provenance Attestation
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: publish
    permissions:
      id-token: write
      attestations: write
      packages: read
    strategy:
      matrix:
        artifact: ${{ fromJSON(needs.publish.outputs.artifacts) }}
    steps:
      - name: Attest build provenance
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.4.0
        with:
          subject-name: ${{ matrix.artifact.name }}
          subject-digest: ${{ matrix.artifact.digest }}
          push-to-registry: true

  tag:
    name: Tag Chart Versions
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [publish, attest]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Create chart version tags
        run: |
          for chart_dir in charts/*/; do
            chart_name=$(basename "${chart_dir}")
            chart_version=$(yq '.version' "${chart_dir}/Chart.yaml")
            tag="${chart_name}-v${chart_version}"
            if git rev-parse "${tag}" >/dev/null 2>&1; then
              echo "Tag ${tag} already exists, skipping."
            else
              echo "Creating tag ${tag}..."
              git tag "${tag}"
              git push origin "${tag}"
            fi
          done
