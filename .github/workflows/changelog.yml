name: Update Changelog

on:
  push:
    branches: [main]
    paths-ignore:
      - 'CHANGELOG.md'
      - '.github/**'
  workflow_dispatch:
    inputs:
      since_tag:
        description: 'Generate changelog since this tag (default: latest release tag)'
        required: false
        type: string

concurrency:
  group: changelog
  cancel-in-progress: true

permissions: {}

jobs:
  changelog:
    name: Generate Changelog
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Determine base tag
        id: base
        run: |
          # Use environment variable to avoid direct expression injection
          SINCE_TAG="${INPUT_SINCE_TAG}"
          if [ -n "${SINCE_TAG}" ]; then
            echo "tag=${SINCE_TAG}" >> "$GITHUB_OUTPUT"
          else
            tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
            echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          fi
        env:
          INPUT_SINCE_TAG: ${{ github.event.inputs.since_tag }}

      - name: Generate changelog
        id: generate
        env:
          BASE_TAG: ${{ steps.base.outputs.tag }}
        run: |
          if [ -n "${BASE_TAG}" ]; then
            RANGE="${BASE_TAG}..HEAD"
            echo "Generating changelog since ${BASE_TAG}"
          else
            RANGE="HEAD"
            echo "Generating changelog from full history"
          fi

          # Collect commits grouped by type
          ADDED=""
          CHANGED=""
          FIXED=""
          DOCS=""
          REMOVED=""

          # Helper: append entry to a category variable without leading newline
          append_entry() {
            local current="$1" entry="$2"
            if [ -z "${current}" ]; then
              echo "${entry}"
            else
              echo "${current}\n${entry}"
            fi
          }

          while IFS= read -r line; do
            # Skip empty lines
            [ -z "${line}" ] && continue

            # Extract commit hash and message
            hash=$(echo "${line}" | cut -d' ' -f1)
            msg=$(echo "${line}" | cut -d' ' -f2-)

            # Determine affected areas from changed files
            scope=""
            files_changed=$(git diff-tree --no-commit-id --name-only -r "${hash}" 2>/dev/null)
            charts_touched=$(echo "${files_changed}" | grep '^charts/' | cut -d'/' -f2 | sort -u | tr '\n' ',' | sed 's/,$//')
            other_scopes=""
            echo "${files_changed}" | grep -q '^profiles/' && other_scopes="${other_scopes:+${other_scopes},}profiles"
            echo "${files_changed}" | grep -q '^environments/' && other_scopes="${other_scopes:+${other_scopes},}environments"
            echo "${files_changed}" | grep -q '^docs/' && other_scopes="${other_scopes:+${other_scopes},}docs"
            echo "${files_changed}" | grep -q '^helmfile' && other_scopes="${other_scopes:+${other_scopes},}helmfile"
            all_scopes="${charts_touched}"
            [ -n "${other_scopes}" ] && all_scopes="${all_scopes:+${all_scopes},}${other_scopes}"
            if [ -n "${all_scopes}" ]; then
              scope="(${all_scopes}) "
            fi

            # Categorize by conventional commit prefix
            case "${msg}" in
              feat:*|feat\(*|add:*|add\(*)
                clean_msg=$(echo "${msg}" | sed 's/^[a-z]*\([^)]*\)\?: *//')
                ADDED=$(append_entry "${ADDED}" "- ${scope}${clean_msg}")
                ;;
              fix:*|fix\(*)
                clean_msg=$(echo "${msg}" | sed 's/^[a-z]*\([^)]*\)\?: *//')
                FIXED=$(append_entry "${FIXED}" "- ${scope}${clean_msg}")
                ;;
              docs:*|docs\(*)
                clean_msg=$(echo "${msg}" | sed 's/^[a-z]*\([^)]*\)\?: *//')
                DOCS=$(append_entry "${DOCS}" "- ${scope}${clean_msg}")
                ;;
              remove:*|deprecate:*)
                clean_msg=$(echo "${msg}" | sed 's/^[a-z]*\([^)]*\)\?: *//')
                REMOVED=$(append_entry "${REMOVED}" "- ${scope}${clean_msg}")
                ;;
              refactor:*|refactor\(*|chore:*|chore\(*)
                clean_msg=$(echo "${msg}" | sed 's/^[a-z]*\([^)]*\)\?: *//')
                CHANGED=$(append_entry "${CHANGED}" "- ${scope}${clean_msg}")
                ;;
              *)
                CHANGED=$(append_entry "${CHANGED}" "- ${scope}${msg}")
                ;;
            esac
          done <<< "$(git log --format='%h %s' ${RANGE} --no-merges)"

          # Deduplicate entries
          ADDED=$(echo -e "${ADDED}" | awk '!seen[$0]++')
          CHANGED=$(echo -e "${CHANGED}" | awk '!seen[$0]++')
          FIXED=$(echo -e "${FIXED}" | awk '!seen[$0]++')
          DOCS=$(echo -e "${DOCS}" | awk '!seen[$0]++')
          REMOVED=$(echo -e "${REMOVED}" | awk '!seen[$0]++')

          # Build changelog entry
          ENTRY=""
          [ -n "${ADDED}" ] && ENTRY="${ENTRY}\n### Added\n${ADDED}\n"
          [ -n "${CHANGED}" ] && ENTRY="${ENTRY}\n### Changed\n${CHANGED}\n"
          [ -n "${FIXED}" ] && ENTRY="${ENTRY}\n### Fixed\n${FIXED}\n"
          [ -n "${DOCS}" ] && ENTRY="${ENTRY}\n### Documentation\n${DOCS}\n"
          [ -n "${REMOVED}" ] && ENTRY="${ENTRY}\n### Removed\n${REMOVED}\n"

          if [ -z "${ENTRY}" ]; then
            echo "No changes detected."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "has_changes=true" >> "$GITHUB_OUTPUT"

          # Preserve existing released sections from committed CHANGELOG.md
          RELEASED_SECTIONS=""
          if git show HEAD:CHANGELOG.md > /tmp/old-changelog.md 2>/dev/null; then
            # Extract everything from the first versioned release header onward
            RELEASED_SECTIONS=$(awk '/^## \[[0-9]/{found=1} found{print}' /tmp/old-changelog.md)
          fi

          # Write new CHANGELOG.md with unreleased + preserved released sections
          {
            echo "# Changelog"
            echo ""
            echo "All notable changes to the Countly Helm Charts will be documented in this file."
            echo ""
            echo "The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.1.0/)."
            echo ""
            echo "## [Unreleased]"
            echo ""
            echo -e "${ENTRY}"
            if [ -n "${RELEASED_SECTIONS}" ]; then
              echo "${RELEASED_SECTIONS}"
            fi
          } > CHANGELOG.md

      - name: Create Pull Request
        if: steps.generate.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676 # v7.0.11
        with:
          commit-message: "docs: update CHANGELOG.md for next release"
          branch: changelog/update
          title: "docs: update CHANGELOG.md for next release"
          body: |
            Automated changelog update based on commits since the last release.

            Review the generated entries and adjust wording if needed before merging.
          labels: documentation
          delete-branch: true
