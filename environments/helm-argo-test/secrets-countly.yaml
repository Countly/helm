# Countly secrets — fill these in before first deploy.
# This file is intentionally using direct Helm values for initial setup.
secrets:
  mode: values
  common:
    encryptionReportsKey: "helm-argo-test-reports-key-2026"
    webSessionSecret: "helm-argo-test-web-session-2026"
    passwordSecret: "helm-argo-test-password-secret-2026"
  clickhouse:
    username: "default"
    password: "helm-argo-test-clickhouse-2026"
    database: "countly_drill"
  kafka:
    securityProtocol: "PLAINTEXT"
  mongodb:
    password: "helm-argo-test-mongo-2026"
