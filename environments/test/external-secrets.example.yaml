# =============================================================================
# External Secrets Operator (ESO) Configuration Example
# =============================================================================
# When using secrets.mode=externalSecret, configure the ESO remoteRefs
# in environments/<env>/countly.yaml:
#
# secrets:
#   mode: externalSecret
#   externalSecret:
#     refreshInterval: "1h"
#     secretStoreRef:
#       name: my-secret-store
#       kind: ClusterSecretStore
#     remoteRefs:
#       common:
#         encryptionReportsKey: "countly/encryption-reports-key"
#         webSessionSecret: "countly/web-session-secret"
#         passwordSecret: "countly/password-secret"
#       clickhouse:
#         url: "countly/clickhouse-url"
#         username: "countly/clickhouse-username"
#         password: "countly/clickhouse-password"
#         database: "countly/clickhouse-database"
#       kafka:
#         brokers: "countly/kafka-brokers"
#         securityProtocol: "countly/kafka-security-protocol"
#       mongodb:
#         connectionString: "countly/mongodb-connection-string"
#
# Prerequisites:
#   1. Install External Secrets Operator: https://external-secrets.io/
#   2. Create a SecretStore or ClusterSecretStore pointing to your secrets backend
#   3. Ensure the ESO service account has access to the referenced secrets
#
# Supported backends: AWS Secrets Manager, HashiCorp Vault, GCP Secret Manager,
#                     Azure Key Vault, and many more.
