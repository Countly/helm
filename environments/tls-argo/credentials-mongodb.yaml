# MongoDB secrets sourced from Google Secret Manager through External Secrets.
secrets:
  mode: externalSecret
  externalSecret:
    refreshInterval: "1h"
    secretStoreRef:
      name: gcp-secrets
      kind: ClusterSecretStore
    remoteRefs:
      admin:
        password: "tls-argo-mongodb-admin-password"
      app:
        password: "tls-argo-mongodb-app-password"
      metrics:
        password: "tls-argo-mongodb-metrics-password"

users:
  admin:
    enabled: true
  metrics:
    enabled: true
