# =============================================================================
# External Secrets Operator (ESO) Configuration Example
# =============================================================================
# When using secrets.mode=externalSecret, configure the ESO remoteRefs
# in the chart-specific secrets files under environments/<env>/:
#
# environments/<env>/secrets-countly.yaml
#   secrets:
#     mode: externalSecret
#     externalSecret:
#       refreshInterval: "1h"
#       secretStoreRef:
#         name: gcp-secrets
#         kind: ClusterSecretStore
#       remoteRefs:
#         common:
#           encryptionReportsKey: "customers/acme/countly/encryption-reports-key"
#           webSessionSecret: "customers/acme/countly/web-session-secret"
#           passwordSecret: "customers/acme/countly/password-secret"
#         clickhouse:
#           url: "customers/acme/countly/clickhouse-url"
#           username: "customers/acme/countly/clickhouse-username"
#           password: "customers/acme/countly/clickhouse-password"
#           database: "customers/acme/countly/clickhouse-database"
#         kafka:
#           brokers: "customers/acme/countly/kafka-brokers"
#           securityProtocol: "customers/acme/countly/kafka-security-protocol"
#         mongodb:
#           connectionString: "customers/acme/countly/mongodb-connection-string"
#
# environments/<env>/secrets-clickhouse.yaml
#   secrets:
#     mode: externalSecret
#     externalSecret:
#       refreshInterval: "1h"
#       secretStoreRef:
#         name: gcp-secrets
#         kind: ClusterSecretStore
#       remoteRefs:
#         defaultUserPassword: "customers/acme/clickhouse/default-user-password"
#
# environments/<env>/secrets-kafka.yaml
#   secrets:
#     mode: externalSecret
#     externalSecret:
#       refreshInterval: "1h"
#       secretStoreRef:
#         name: gcp-secrets
#         kind: ClusterSecretStore
#       remoteRefs:
#         clickhouse:
#           username: "customers/acme/kafka-connect/clickhouse-username"
#           password: "customers/acme/kafka-connect/clickhouse-password"
#
# environments/<env>/secrets-mongodb.yaml
#   secrets:
#     mode: externalSecret
#     externalSecret:
#       refreshInterval: "1h"
#       secretStoreRef:
#         name: gcp-secrets
#         kind: ClusterSecretStore
#       remoteRefs:
#         app:
#           password: "customers/acme/mongodb/app-password"
#         metrics:
#           password: "customers/acme/mongodb/metrics-password"
#
# For GAR image pulls, configure this in environments/<env>/global.yaml:
#
# global:
#   imagePullSecrets:
#     - name: countly-registry
#   imagePullSecretExternalSecret:
#     enabled: true
#     refreshInterval: "1h"
#     secretStoreRef:
#       name: gcp-secrets
#       kind: ClusterSecretStore
#     remoteRef:
#       key: "customers/acme/gar-dockerconfig"
#
# Prerequisites:
#   1. Install External Secrets Operator: https://external-secrets.io/
#   2. Create a SecretStore or ClusterSecretStore pointing to your secrets backend
#   3. Ensure the ESO service account has access to the referenced secrets
#
# Supported backends: AWS Secrets Manager, HashiCorp Vault, GCP Secret Manager,
#                     Azure Key Vault, and many more.
