# =============================================================================
# Countly Deployment — Global Configuration
# =============================================================================
# Copy this directory to create your deployment environment:
#   cp -r environments/reference environments/my-deployment
#
# Then deploy with:
#   helmfile -e my-deployment apply
# =============================================================================

global:
  # --- Profile Selectors ---
  sizing: production              # local | small | production
  observability: full             # disabled | full | external-grafana | external
  kafkaConnect: balanced          # throughput | balanced | low-latency
  tls: letsencrypt                # none | letsencrypt | provided | selfSigned
  security: open                  # open | hardened

  # --- Registry & Storage ---
  imageRegistry: ""               # Private registry prefix (leave empty for public images)
  storageClass: ""                # Default storage class for all PVCs (leave empty for cluster default)
  imagePullSecrets: []            # Docker config secrets for private registries

# --- Ingress ---
ingress:
  hostname: analytics.example.com
  className: nginx

# --- Backing Service Modes ---
backingServices:
  mongodb:
    mode: bundled                 # bundled | external
  clickhouse:
    mode: bundled                 # bundled | external
  kafka:
    mode: bundled                 # bundled | external

# --- Observability ---
# The chart mode is derived from global.observability above.
# Set global.observability to: disabled | full | external-grafana | external
