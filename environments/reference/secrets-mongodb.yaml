# MongoDB secrets — FILL IN before first deploy
secrets:
  mode: values

users:
  admin:
    enabled: false
    password: ""                 # OPTIONAL: super admin/root-style user when enabled
  app:
    password: ""                 # REQUIRED: must match secrets-countly.yaml secrets.mongodb.password
  metrics:
    enabled: true
    password: ""                 # REQUIRED: metrics exporter password

