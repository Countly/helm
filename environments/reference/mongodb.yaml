# =============================================================================
# MongoDB Chart — Comprehensive Reference Configuration
# =============================================================================
# Every configurable key from charts/countly-mongodb/values.yaml is listed here.
# Override only what differs from the profile defaults in your environment.
# =============================================================================

# --- Global Settings (inherited from helmfile globals) ---
global:
  imageRegistry: ""
  imagePullSecrets: []
  storageClass: ""
  sizing: small                           # local | small | production
  scheduling:
    nodeSelector: {}
    tolerations: []

nameOverride: ""
fullnameOverride: ""

createNamespace: false

# =============================================================================
# MongoDB Server
# =============================================================================
mongodb:
  version: "8.2.5"
  members: 2                              # Replica set member count

  resources:
    requests:
      cpu: "500m"
      memory: "2Gi"
    limits:
      cpu: "2"
      memory: "8Gi"

  persistence:
    storageClass: ""                      # Overrides global.storageClass for MongoDB PVCs
    size: 100Gi

  # --- Scheduling ---
  scheduling:
    nodeSelector: {}
    tolerations: []
    affinity: {}
    antiAffinity:
      enabled: true
      type: preferred                     # preferred | required
      topologyKey: kubernetes.io/hostname
      weight: 100

  # --- TLS ---
  tls:
    enabled: false

# =============================================================================
# Users
# =============================================================================
users:
  # --- Application User ---
  app:
    name: app
    database: admin
    roles:
      - name: readWriteAnyDatabase
        db: admin
      - name: dbAdmin
        db: admin
    passwordSecretName: app-user-password
    passwordSecretKey: password
    password: ""                          # REQUIRED on first install

  # --- Metrics Exporter User ---
  metrics:
    enabled: true
    name: metrics
    database: admin
    roles:
      - name: clusterMonitor
        db: admin
      - name: read
        db: local
    passwordSecretName: metrics-user-password
    passwordSecretKey: password
    password: ""                          # REQUIRED on first install

# =============================================================================
# Prometheus Exporter
# =============================================================================
exporter:
  enabled: true
  image: percona/mongodb_exporter:0.47.2
  port: 9216
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "256Mi"
  service:
    enabled: true
  args:
    - --collect-all
    - --collector.diagnosticdata
    - --collector.replicasetstatus
    - --collector.dbstats
    - --collector.topmetrics
    - --collector.indexstats
    - --collector.collstats

# =============================================================================
# Pod Disruption Budget
# =============================================================================
podDisruptionBudget:
  enabled: false
  maxUnavailable: 1

# =============================================================================
# Network Policy
# =============================================================================
networkPolicy:
  enabled: false
  allowedNamespaces:
    - countly
  allowMonitoring: false
  monitoringNamespaceSelector:
    kubernetes.io/metadata.name: monitoring
  additionalIngress: []
  # additionalIngress:
  #   - from:
  #       - namespaceSelector:
  #           matchLabels:
  #             kubernetes.io/metadata.name: my-app-namespace
  #     ports:
  #       - port: 27017
  #         protocol: TCP

# =============================================================================
# Secrets
# =============================================================================
secrets:
  keep: true                              # Retain secrets on helm uninstall
