# =============================================================================
# Image Pull Secrets Example
# =============================================================================
# DO NOT COMMIT THIS FILE WITH REAL VALUES UNENCRYPTED.
#
# Use this when Countly and Kafka Connect pull from a private registry
# such as GCP Artifact Registry (GAR).
#
# Replace:
#   - metadata.name with your actual secret name if not using "countly-gar"
#   - namespaces if your releases run elsewhere
#   - .dockerconfigjson with the base64-encoded contents of your Docker config
#
# You need one secret per namespace because imagePullSecrets are namespaced.
# For the default layout in this repo, create the same secret in:
#   - countly
#   - kafka
#
# Example source for the Docker config:
#   cat ~/.docker/config.json | base64 | tr -d '\n'
#
# Kubernetes secret type must be: kubernetes.io/dockerconfigjson
# =============================================================================

apiVersion: v1
kind: Secret
metadata:
  name: countly-gar
  namespace: countly
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: CHANGEME_BASE64_DOCKER_CONFIG_JSON
---
apiVersion: v1
kind: Secret
metadata:
  name: countly-gar
  namespace: kafka
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: CHANGEME_BASE64_DOCKER_CONFIG_JSON
