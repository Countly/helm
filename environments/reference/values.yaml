# =============================================================================
# Reference Tier — every overridable value that tier files can set
# =============================================================================
# This file documents ALL knobs available for environment tiers.
# Copy to a new tier directory and uncomment/adjust what you need.
#
# Values here override chart defaults (values.yaml) and values-common.yaml.
# Customer overlays applied after this will override these values.
#
# See also: examples/overlay-reference.yaml for the full set including
# config, secrets, ingress, and chart-specific settings.
# =============================================================================

global:
  clusterProfile: production                     # "small" or "production"
  storageClass: "gp3"                            # Default storage class for all PVCs
  scheduling:
    nodeSelector: {}
    tolerations: []

# =============================================================================
#  COUNTLY CHART  (charts/countly)
# =============================================================================

# --- api ---
api:
  replicaCount: 2
  resources:
    requests: { cpu: "1", memory: "3.5Gi" }
    limits: { cpu: "1", memory: "4Gi" }
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 6
    metrics:
      cpu:
        averageUtilization: 70
      memory:
        averageUtilization: 80
    behavior:
      scaleUp:
        stabilizationWindowSeconds: 0
        policies:
          - type: Percent
            value: 100
            periodSeconds: 15
      scaleDown:
        stabilizationWindowSeconds: 300
        policies:
          - type: Percent
            value: 10
            periodSeconds: 60
  pdb:
    enabled: true
    minAvailable: 1
  terminationGracePeriodSeconds: 120
  scheduling:
    nodeSelector: {}
    tolerations: []
    topologySpreadConstraints: []
    antiAffinity:
      enabled: true
      type: preferred                            # preferred | required
      topologyKey: kubernetes.io/hostname
      weight: 100

# --- frontend ---
frontend:
  replicaCount: 2
  resources:
    requests: { cpu: "1", memory: "2.5Gi" }
    limits: { cpu: "1", memory: "3Gi" }
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 4
    metrics:
      cpu:
        averageUtilization: 80
      memory: {}
    behavior: {}
  pdb:
    enabled: true
    minAvailable: 1
  terminationGracePeriodSeconds: 30
  scheduling:
    nodeSelector: {}
    tolerations: []
    topologySpreadConstraints: []
    antiAffinity:
      enabled: true
      type: preferred
      topologyKey: kubernetes.io/hostname
      weight: 100

# --- ingestor ---
ingestor:
  replicaCount: 2
  resources:
    requests: { cpu: "1", memory: "3Gi" }
    limits: { cpu: "1", memory: "3Gi" }
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 12
    metrics:
      cpu:
        averageUtilization: 65
      memory:
        averageUtilization: 75
    behavior: {}
  pdb:
    enabled: true
    minAvailable: 1
  terminationGracePeriodSeconds: 120
  scheduling:
    nodeSelector: {}
    tolerations: []
    topologySpreadConstraints: []
    antiAffinity:
      enabled: true
      type: preferred
      topologyKey: kubernetes.io/hostname
      weight: 100

# --- aggregator ---
aggregator:
  replicaCount: 4
  resources:
    requests: { cpu: "1", memory: "3.5Gi" }
    limits: { cpu: "2", memory: "4Gi" }
  hpa:
    enabled: true
    minReplicas: 4
    maxReplicas: 8
    metrics:
      cpu:
        averageUtilization: 65
      memory:
        averageUtilization: 65
    behavior:
      scaleUp:
        stabilizationWindowSeconds: 0
        policies:
          - type: Percent
            value: 100
            periodSeconds: 15
      scaleDown:
        stabilizationWindowSeconds: 300
        policies:
          - type: Percent
            value: 10
            periodSeconds: 60
  pdb:
    enabled: true
    minAvailable: 1
  terminationGracePeriodSeconds: 60
  scheduling:
    nodeSelector: {}
    tolerations: []
    topologySpreadConstraints: []
    antiAffinity:
      enabled: true
      type: preferred
      topologyKey: kubernetes.io/hostname
      weight: 100

# --- jobserver ---
jobserver:
  replicaCount: 1
  resources:
    requests: { cpu: "1", memory: "3Gi" }
    limits: { cpu: "1", memory: "3Gi" }
  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 1
    metrics:
      cpu:
        averageUtilization: 80
      memory:
        averageUtilization: 85
    behavior: {}
  pdb:
    enabled: false
  terminationGracePeriodSeconds: 30
  scheduling:
    nodeSelector: {}
    tolerations: []
    topologySpreadConstraints: []
    antiAffinity:
      enabled: false

# Node.js heap tuning per component
nodeOptions:
  api: "--max-old-space-size=3072 --max-semi-space-size=256"
  frontend: "--max-old-space-size=2048"
  ingestor: "--max-old-space-size=2048 --max-semi-space-size=256"
  aggregator: "--max-old-space-size=3072 --max-semi-space-size=128"
  jobserver: "--max-old-space-size=2048 --max-semi-space-size=256"

# =============================================================================
#  MONGODB CHART  (charts/countly-mongodb)
# =============================================================================

mongodb:
  version: "8.0.13"
  members: 3                                     # ReplicaSet size (1, 3, 5)
  image: quay.io/mongodb/mongodb-community-server
  imageTag: ""                                   # Defaults to <version>-ubi8

  resources:
    requests: { cpu: "3", memory: "6Gi" }
    limits: { cpu: "4", memory: "8Gi" }

  persistence:
    storageClass: ""                             # Falls back to global.storageClass
    size: 500Gi

  tls:
    enabled: false

  scheduling:
    nodeSelector: {}
    tolerations: []
    affinity: {}
    antiAffinity:
      enabled: true
      type: preferred                            # preferred | required
      topologyKey: kubernetes.io/hostname
      weight: 100

users:
  app:
    name: app
    database: admin
    roles:
      - { name: readWriteAnyDatabase, db: admin }
      - { name: dbAdmin, db: countly }
    passwordSecretName: app-user-password
    passwordSecretKey: password
    password: ""

  metrics:
    enabled: true
    name: metrics
    database: admin
    roles:
      - { name: clusterMonitor, db: admin }
      - { name: read, db: local }
    passwordSecretName: metrics-user-password
    passwordSecretKey: password
    password: ""

exporter:
  enabled: true
  image: percona/mongodb_exporter:0.40.0
  port: 9216
  resources:
    requests: { cpu: "50m", memory: "64Mi" }
    limits: { cpu: "200m", memory: "256Mi" }
  args:
    - --collect-all
    - --collector.diagnosticdata
    - --collector.replicasetstatus
    - --collector.dbstats
    - --collector.topmetrics
    - --collector.indexstats
    - --collector.collstats

# =============================================================================
#  CLICKHOUSE CHART  (charts/countly-clickhouse)
# =============================================================================

clickhouseOperator:
  apiVersion: clickhouse.com/v1alpha1

version: "26.2"                                  # ClickHouse server + keeper version
shards: 1                                        # Number of shards
replicas: 2                                      # Replicas per shard

image:
  server: clickhouse/clickhouse-server
  keeper: clickhouse/clickhouse-keeper

database: countly_drill

auth:
  defaultUserPassword:
    existingSecret: ""
    secretName: clickhouse-default-password
    key: password
    password: ""
  adminUser:
    enabled: false                               # Enable for admin user with access_management
    passwordSha256Hex: ""                        # Supply via overlay, NOT in VCS

server:
  securityContext:
    runAsNonRoot: true
    runAsUser: 101
    runAsGroup: 101
    fsGroup: 101
  resources:
    requests: { cpu: "4", memory: "12Gi" }
    limits: { cpu: "4", memory: "16Gi" }
  persistence:
    storageClass: ""                             # Falls back to global.storageClass
    size: 500Gi
  settings:
    maxConnections: 4096
    extraConfig: ""                              # Raw config.xml XML snippet
    extraUsersConfig: ""                         # Raw users.xml XML snippet (inner XML only)
    prometheus:
      enabled: true
      port: 9363
      endpoint: /metrics
  scheduling:
    nodeSelector: {}
    tolerations: []
    affinity: {}
    topologySpreadConstraints: []
    antiAffinity:
      enabled: true
      type: preferred
      topologyKey: kubernetes.io/hostname
      weight: 100

keeper:
  replicas: 3
  securityContext:
    runAsNonRoot: true
    runAsUser: 101
    runAsGroup: 101
    fsGroup: 101
  resources:
    requests: { cpu: "500m", memory: "1Gi" }
    limits: { cpu: "1", memory: "2Gi" }
  persistence:
    storageClass: ""
    size: 50Gi
  settings:
    prometheus:
      enabled: true
      port: 9363
      endpoint: /metrics
  scheduling:
    nodeSelector: {}
    tolerations: []
    affinity: {}
    antiAffinity:
      enabled: true
      type: preferred
      topologyKey: kubernetes.io/hostname
      weight: 100

podDisruptionBudget:
  server:
    enabled: true
    maxUnavailable: 1
  keeper:
    enabled: true
    maxUnavailable: 1

serviceMonitor:
  enabled: true
  interval: "15s"
  serviceType: headless

# =============================================================================
#  KAFKA CHART  (charts/countly-kafka)
# =============================================================================

# version: "4.1.1"

brokers:
  replicas: 3
  resources:
    requests: { cpu: "2", memory: "12Gi" }
    limits: { cpu: "2", memory: "12Gi" }
  jvmOptions:
    xms: "4g"
    xmx: "4g"
  persistence:
    volumes:
      - id: 0
        size: 200Gi
        storageClass: ""                         # Falls back to global.storageClass
    deleteClaim: false
  config:
    default.replication.factor: 2
    min.insync.replicas: 1
    log.retention.hours: 168                     # 7 days
    log.segment.bytes: "1073741824"              # 1 GB
    compression.type: lz4
    auto.create.topics.enable: true
    offsets.topic.replication.factor: 2
    num.partitions: 24
    transaction.state.log.replication.factor: 2
  scheduling:
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: DoNotSchedule

controllers:
  replicas: 3
  resources:
    requests: { cpu: "500m", memory: "2Gi" }
    limits: { cpu: "1", memory: "2Gi" }
  persistence:
    size: 20Gi
    storageClass: ""
  scheduling:
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: DoNotSchedule

listeners:
  - name: internal
    port: 9092
    type: internal
    tls: false

cruiseControl:
  enabled: true
  resources:
    requests: { cpu: "1", memory: "2Gi" }
    limits: { cpu: "1", memory: "2Gi" }
  jvmOptions:
    xms: "1g"
    xmx: "2g"
  autoRebalance:
    - mode: add-brokers
    - mode: remove-brokers

kafkaConnect:
  enabled: true
  name: connect-ch
  image: "countly/kafka-connect-clickhouse:1.3.5"
  replicas: 2
  bootstrapServers: ""
  resources:
    requests: { cpu: "2", memory: "8Gi" }
    limits: { cpu: "2", memory: "8Gi" }
  jvmOptions:
    xms: "5g"
    xmx: "5g"
  workerConfig:
    group.id: connect-ch
    config.storage.topic: connect_ch_configs
    offset.storage.topic: connect_ch_offsets
    status.storage.topic: connect_ch_status
    config.storage.replication.factor: 2
    offset.storage.replication.factor: 2
    status.storage.replication.factor: 2
    offset.storage.partitions: 25
    status.storage.partitions: 5
    key.converter: org.apache.kafka.connect.storage.StringConverter
    value.converter: org.apache.kafka.connect.json.JsonConverter
    value.converter.schemas.enable: "false"
    connector.client.config.override.policy: All
    config.providers: env
    config.providers.env.class: org.apache.kafka.common.config.provider.EnvVarConfigProvider
  clickhouse:
    existingSecret: ""
    secretName: clickhouse-auth
    host: ""
    port: "8123"
    ssl: "false"
    database: "countly_drill"
    username: "default"
    password: ""
  env:
    EXACTLY_ONCE: "false"
    ERRORS_RETRY_TIMEOUT: "300"
    ERRORS_TOLERANCE: "none"
    CLICKHOUSE_SETTINGS: "input_format_binary_read_json_as_string=1,allow_experimental_json_type=1,enable_json_type=1,async_insert=1,wait_for_async_insert=1,async_insert_use_adaptive_busy_timeout=1,async_insert_busy_timeout_ms=10000,async_insert_max_data_size=268435456,async_insert_max_query_number=64,min_insert_block_size_rows=250000,min_insert_block_size_bytes=268435456,max_partitions_per_insert_block=500"
    BYPASS_ROW_BINARY: "false"
    TABLE_REFRESH_INTERVAL: "300"
    KEY_CONVERTER: org.apache.kafka.connect.storage.StringConverter
    VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
    VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
    KAFKA_CONSUMER_FETCH_MIN_BYTES: "33554432"
    KAFKA_CONSUMER_FETCH_MAX_WAIT_MS: "60000"
    KAFKA_CONSUMER_MAX_POLL_RECORDS: "250000"
    KAFKA_CONSUMER_MAX_PARTITION_FETCH_BYTES: "134217728"
    KAFKA_CONSUMER_FETCH_MAX_BYTES: "536870912"
    KAFKA_CONSUMER_MAX_POLL_INTERVAL_MS: "900000"
    KAFKA_CONSUMER_SESSION_TIMEOUT_MS: "45000"
    KAFKA_CONSUMER_HEARTBEAT_INTERVAL_MS: "15000"
    KAFKA_CONSUMER_REQUEST_TIMEOUT_MS: "120000"
  scheduling:
    nodeSelector: {}
    tolerations: []
    affinity: {}
    antiAffinity:
      enabled: true
      type: preferred
      topologyKey: kubernetes.io/hostname
      weight: 100
  connectors:
    - name: ch-sink-drill-events
      enabled: true
      state: running
      class: com.clickhouse.kafka.connect.ClickHouseSinkConnector
      tasksMax: 1
      autoRestart:
        enabled: true
        maxRestarts: 10
      config:
        topics: drill-events
        topic2TableMap: "drill-events=drill_events"
        hostname: "${env:CLICKHOUSE_HOST}"
        port: "${env:CLICKHOUSE_PORT}"
        ssl: "${env:CLICKHOUSE_SSL}"
        database: "${env:CLICKHOUSE_DB}"
        username: "${env:CLICKHOUSE_USER}"
        password: "${env:CLICKHOUSE_PASSWORD}"
        exactlyOnce: "${env:EXACTLY_ONCE}"
        errors.retry.timeout: "${env:ERRORS_RETRY_TIMEOUT}"
        errors.tolerance: "${env:ERRORS_TOLERANCE}"
        clickhouseSettings: "${env:CLICKHOUSE_SETTINGS}"
        bypassRowBinary: "${env:BYPASS_ROW_BINARY}"
        tableRefreshInterval: "${env:TABLE_REFRESH_INTERVAL}"
        key.converter: "${env:KEY_CONVERTER}"
        value.converter: "${env:VALUE_CONVERTER}"
        value.converter.schemas.enable: "${env:VALUE_CONVERTER_SCHEMAS_ENABLE}"
        consumer.override.fetch.min.bytes: "${env:KAFKA_CONSUMER_FETCH_MIN_BYTES}"
        consumer.override.fetch.max.wait.ms: "${env:KAFKA_CONSUMER_FETCH_MAX_WAIT_MS}"
        consumer.override.max.poll.records: "${env:KAFKA_CONSUMER_MAX_POLL_RECORDS}"
        consumer.override.max.partition.fetch.bytes: "${env:KAFKA_CONSUMER_MAX_PARTITION_FETCH_BYTES}"
        consumer.override.fetch.max.bytes: "${env:KAFKA_CONSUMER_FETCH_MAX_BYTES}"
        consumer.override.request.timeout.ms: "${env:KAFKA_CONSUMER_REQUEST_TIMEOUT_MS}"
        consumer.override.max.poll.interval.ms: "${env:KAFKA_CONSUMER_MAX_POLL_INTERVAL_MS}"
        consumer.override.session.timeout.ms: "${env:KAFKA_CONSUMER_SESSION_TIMEOUT_MS}"
        consumer.override.heartbeat.interval.ms: "${env:KAFKA_CONSUMER_HEARTBEAT_INTERVAL_MS}"
        connection.timeout: "60"
        socket.timeout: "30000"
        retry.count: "3"
        connection.pool.size: "10"
        healthcheck.enabled: "true"
        healthcheck.interval: "10000"
      dlq: {}

clickhouseNamespace: clickhouse
