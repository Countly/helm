# =============================================================================
# Reference Tier — every overridable value that tier files can set across all 5 charts
# =============================================================================
# This file documents ALL knobs available for environment tiers.
# Copy to a new tier directory and uncomment/adjust what you need.
#
# Values here are PRODUCTION defaults (matching tier2 profile).
# They override chart defaults (values.yaml) and values-common.yaml.
# Customer overlays applied after this will override these values.
#
# See also: examples/overlay-reference.yaml for the full set including
# config, secrets, ingress, and chart-specific settings.
#
# NOTE: Tier files MAY also override config values (e.g., tier1 overrides
# config.kafka.COUNTLY_CONFIG__KAFKA_REPLICATIONFACTOR). The full config
# reference is in overlay-reference.yaml — copy specific keys as needed.
#
# YAML key conflicts: Some top-level keys (networkPolicy, podDisruptionBudget,
# version, image) exist in multiple charts with different structures. Only
# one definition per key can exist in this file. The countly chart version
# is active YAML; other charts' versions are shown as comments.
# =============================================================================

global:
  clusterProfile: production                     # "small" or "production"
  storageClass: "gp3"                            # Default storage class for all PVCs
  scheduling:
    nodeSelector: {}
    tolerations: []

# =============================================================================
#  COUNTLY CHART  (charts/countly)
# =============================================================================

# --- Network Policy (countly chart) ---
networkPolicy:
  enabled: true                                    # Restrict pod ingress traffic
  ingressNamespaceSelector:
    kubernetes.io/metadata.name: ingress-nginx
  additionalIngress: []

# --- api ---
api:
  enabled: true
  replicaCount: 2
  command: ["npm", "run", "start:api"]
  port: 3001
  healthCheck:
    path: /o/ping
    initialDelaySeconds: 30
    periodSeconds: 30
    timeoutSeconds: 120
  terminationGracePeriodSeconds: 120
  resources:
    requests: { cpu: "1", memory: "3.5Gi" }
    limits: { cpu: "1", memory: "4Gi" }
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 6
    metrics:
      cpu:
        averageUtilization: 70
      memory:
        averageUtilization: 80
    behavior:
      scaleUp:
        stabilizationWindowSeconds: 0
        policies:
          - type: Percent
            value: 100
            periodSeconds: 15
      scaleDown:
        stabilizationWindowSeconds: 300
        policies:
          - type: Percent
            value: 10
            periodSeconds: 60
  pdb:
    enabled: true
    minAvailable: 1
  scheduling:
    nodeSelector: {}
    tolerations: []
    affinity: {}
    topologySpreadConstraints: []
    antiAffinity:
      enabled: true
      type: preferred                            # preferred | required
      topologyKey: kubernetes.io/hostname
      weight: 100
  extraEnv: []
  extraEnvFrom: []

# --- frontend ---
frontend:
  enabled: true
  replicaCount: 2
  command: ["npm", "run", "start:frontend"]
  port: 6001
  healthCheck:
    path: /ping
    initialDelaySeconds: 30
    periodSeconds: 30
    timeoutSeconds: 5
  terminationGracePeriodSeconds: 30
  resources:
    requests: { cpu: "1", memory: "2.5Gi" }
    limits: { cpu: "1", memory: "3Gi" }
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 4
    metrics:
      cpu:
        averageUtilization: 80
      memory: {}
    behavior: {}
  pdb:
    enabled: true
    minAvailable: 1
  scheduling:
    nodeSelector: {}
    tolerations: []
    affinity: {}
    topologySpreadConstraints: []
    antiAffinity:
      enabled: true
      type: preferred
      topologyKey: kubernetes.io/hostname
      weight: 100
  extraEnv: []
  extraEnvFrom: []

# --- ingestor ---
ingestor:
  enabled: true
  replicaCount: 2
  command: ["npm", "run", "start:ingestor"]
  port: 3010
  healthCheck:
    path: /o/ping
    initialDelaySeconds: 30
    periodSeconds: 30
    timeoutSeconds: 120
  terminationGracePeriodSeconds: 120
  resources:
    requests: { cpu: "1", memory: "3Gi" }
    limits: { cpu: "1", memory: "3Gi" }
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 12
    metrics:
      cpu:
        averageUtilization: 65
      memory:
        averageUtilization: 75
    behavior: {}
  pdb:
    enabled: true
    minAvailable: 1
  scheduling:
    nodeSelector: {}
    tolerations: []
    affinity: {}
    topologySpreadConstraints: []
    antiAffinity:
      enabled: true
      type: preferred
      topologyKey: kubernetes.io/hostname
      weight: 100
  extraEnv: []
  extraEnvFrom: []

# --- aggregator ---
aggregator:
  enabled: true
  replicaCount: 4
  command: ["npm", "run", "start:aggregator"]
  port: 0                                        # No HTTP port
  healthCheck: {}                                # No HTTP health checks
  terminationGracePeriodSeconds: 60
  resources:
    requests: { cpu: "1", memory: "3.5Gi" }
    limits: { cpu: "2", memory: "4Gi" }
  hpa:
    enabled: true
    minReplicas: 4
    maxReplicas: 8
    metrics:
      cpu:
        averageUtilization: 65
      memory:
        averageUtilization: 65
    behavior:
      scaleUp:
        stabilizationWindowSeconds: 0
        policies:
          - type: Percent
            value: 100
            periodSeconds: 15
      scaleDown:
        stabilizationWindowSeconds: 300
        policies:
          - type: Percent
            value: 10
            periodSeconds: 60
  pdb:
    enabled: true
    minAvailable: 1
  scheduling:
    nodeSelector: {}
    tolerations: []
    affinity: {}
    topologySpreadConstraints: []
    antiAffinity:
      enabled: true
      type: preferred
      topologyKey: kubernetes.io/hostname
      weight: 100
  extraEnv: []
  extraEnvFrom: []

# --- jobserver ---
jobserver:
  enabled: true
  replicaCount: 1
  command: ["npm", "run", "start:jobserver"]
  port: 3020
  healthCheck:
    path: /o/ping
    initialDelaySeconds: 30
    periodSeconds: 30
    timeoutSeconds: 5
  terminationGracePeriodSeconds: 30
  resources:
    requests: { cpu: "1", memory: "3Gi" }
    limits: { cpu: "1", memory: "3Gi" }
  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 1
    metrics:
      cpu:
        averageUtilization: 80
      memory:
        averageUtilization: 85
    behavior: {}
  pdb:
    enabled: false
  scheduling:
    nodeSelector: {}
    tolerations: []
    affinity: {}
    topologySpreadConstraints: []
    antiAffinity:
      enabled: false
  extraEnv: []
  extraEnvFrom: []

# Node.js heap tuning per component
nodeOptions:
  api: "--max-old-space-size=3072 --max-semi-space-size=256"
  frontend: "--max-old-space-size=2048"
  ingestor: "--max-old-space-size=2048 --max-semi-space-size=256"
  aggregator: "--max-old-space-size=3072 --max-semi-space-size=128"
  jobserver: "--max-old-space-size=2048 --max-semi-space-size=256"

# =============================================================================
#  MONGODB CHART  (charts/countly-mongodb)
# =============================================================================

mongodb:
  version: "8.2.5"
  members: 3                                     # ReplicaSet size (1, 3, 5)
  image: quay.io/mongodb/mongodb-community-server
  imageTag: ""                                   # Defaults to <version>-ubi8

  resources:
    requests: { cpu: "3", memory: "6Gi" }
    limits: { cpu: "4", memory: "8Gi" }

  persistence:
    storageClass: ""                             # Falls back to global.storageClass
    size: 500Gi

  tls:
    enabled: false

  scheduling:
    nodeSelector: {}
    tolerations: []
    affinity: {}
    antiAffinity:
      enabled: true
      type: preferred                            # preferred | required
      topologyKey: kubernetes.io/hostname
      weight: 100

users:
  app:
    name: app
    database: admin
    roles:
      - { name: readWriteAnyDatabase, db: admin }
      - { name: dbAdmin, db: countly }
    passwordSecretName: app-user-password
    passwordSecretKey: password
    password: ""

  metrics:
    enabled: true
    name: metrics
    database: admin
    roles:
      - { name: clusterMonitor, db: admin }
      - { name: read, db: local }
    passwordSecretName: metrics-user-password
    passwordSecretKey: password
    password: ""

exporter:
  enabled: true
  image: percona/mongodb_exporter:0.40.0
  port: 9216
  resources:
    requests: { cpu: "50m", memory: "64Mi" }
    limits: { cpu: "200m", memory: "256Mi" }
  service:
    enabled: true
  args:
    - --collect-all
    - --collector.diagnosticdata
    - --collector.replicasetstatus
    - --collector.dbstats
    - --collector.topmetrics
    - --collector.indexstats
    - --collector.collstats

# MongoDB PDB (top-level key — does NOT conflict with ClickHouse podDisruptionBudget
# because only one chart consumes each key based on its own values schema)
# NOTE: This key IS shared with the ClickHouse chart's podDisruptionBudget.
# The ClickHouse version (with server/keeper sub-keys) takes precedence here.
# For the MongoDB chart, set PDB via a per-chart overlay if needed.
# MongoDB chart structure:
#   podDisruptionBudget:
#     enabled: true
#     maxUnavailable: 1

# MongoDB networkPolicy (conflicts with countly chart's networkPolicy key above).
# For the MongoDB chart, set networkPolicy via a per-chart overlay.
# MongoDB chart structure:
#   networkPolicy:
#     enabled: false
#     allowedNamespaces: [countly]
#     allowMonitoring: false
#     monitoringNamespaceSelector:
#       kubernetes.io/metadata.name: monitoring
#     additionalIngress: []

# =============================================================================
#  CLICKHOUSE CHART  (charts/countly-clickhouse)
# =============================================================================

clickhouseOperator:
  apiVersion: clickhouse.com/v1alpha1

# version: "26.2"                                # ClickHouse version (conflicts with kafka chart's version key)
shards: 1                                        # Number of shards
replicas: 2                                      # Replicas per shard

database: countly_drill

auth:
  defaultUserPassword:
    existingSecret: ""
    secretName: clickhouse-default-password
    key: password
    password: ""
  adminUser:
    enabled: false
    passwordSha256Hex: ""

server:
  securityContext:
    runAsNonRoot: true
    runAsUser: 101
    runAsGroup: 101
    fsGroup: 101
  resources:
    requests: { cpu: "4", memory: "12Gi" }
    limits: { cpu: "4", memory: "16Gi" }
  persistence:
    storageClass: ""                             # Falls back to global.storageClass
    size: 500Gi
  settings:
    maxConnections: 4096
    extraConfig: ""                              # Raw config.xml XML snippet
    extraUsersConfig: ""                         # Raw users.xml XML snippet
    prometheus:
      enabled: true
      port: 9363
      endpoint: /metrics
  scheduling:
    nodeSelector: {}
    tolerations: []
    affinity: {}
    topologySpreadConstraints: []
    antiAffinity:
      enabled: true
      type: preferred
      topologyKey: kubernetes.io/hostname
      weight: 100

keeper:
  replicas: 3
  securityContext:
    runAsNonRoot: true
    runAsUser: 101
    runAsGroup: 101
    fsGroup: 101
  resources:
    requests: { cpu: "500m", memory: "1Gi" }
    limits: { cpu: "1", memory: "2Gi" }
  persistence:
    storageClass: ""
    size: 50Gi
  settings:
    prometheus:
      enabled: true
      port: 9363
      endpoint: /metrics
  scheduling:
    nodeSelector: {}
    tolerations: []
    affinity: {}
    antiAffinity:
      enabled: true
      type: preferred
      topologyKey: kubernetes.io/hostname
      weight: 100

# ClickHouse PDB (this key is shared with MongoDB chart — ClickHouse structure wins here)
podDisruptionBudget:
  server:
    enabled: true
    maxUnavailable: 1
  keeper:
    enabled: true
    maxUnavailable: 1

serviceMonitor:
  enabled: true
  interval: "15s"
  serviceType: headless                          # "headless" for per-pod, "clusterIP" for any-pod

# ClickHouse networkPolicy (conflicts with countly chart's networkPolicy key above).
# For the ClickHouse chart, set networkPolicy via a per-chart overlay.
# ClickHouse chart structure:
#   networkPolicy:
#     enabled: false
#     allowedNamespaces: [countly, kafka]
#     allowMonitoring: false
#     monitoringNamespaceSelector:
#       kubernetes.io/metadata.name: monitoring
#     additionalIngress: []

# =============================================================================
#  KAFKA CHART  (charts/countly-kafka)
# =============================================================================

# version: "4.2.0"                               # Kafka version (conflicts with clickhouse version key)

brokers:
  replicas: 3
  resources:
    requests: { cpu: "2", memory: "12Gi" }
    limits: { cpu: "2", memory: "12Gi" }
  jvmOptions:
    xms: "4g"
    xmx: "4g"
  persistence:
    volumes:
      - id: 0
        size: 200Gi
        storageClass: ""                         # Falls back to global.storageClass
    deleteClaim: false
  config:
    default.replication.factor: 2
    min.insync.replicas: 2
    log.retention.hours: 168                     # 7 days
    log.segment.bytes: "1073741824"              # 1 GB
    compression.type: lz4
    auto.create.topics.enable: false             # Production: false
    offsets.topic.replication.factor: 2
    num.partitions: 24
    transaction.state.log.replication.factor: 2
  scheduling:
    nodeSelector: {}
    tolerations: []
    affinity: {}
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: DoNotSchedule

controllers:
  replicas: 3
  resources:
    requests: { cpu: "500m", memory: "2Gi" }
    limits: { cpu: "1", memory: "2Gi" }
  persistence:
    size: 20Gi
    storageClass: ""
  scheduling:
    nodeSelector: {}
    tolerations: []
    affinity: {}
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: DoNotSchedule

listeners:
  - name: internal
    port: 9092
    type: internal
    tls: false

cruiseControl:
  enabled: true
  resources:
    requests: { cpu: "1", memory: "2Gi" }
    limits: { cpu: "1", memory: "2Gi" }
  jvmOptions:
    xms: "1g"
    xmx: "2g"
  autoRebalance:
    - mode: add-brokers
    - mode: remove-brokers

kafkaConnect:
  enabled: true
  replicas: 2
  resources:
    requests: { cpu: "2", memory: "8Gi" }
    limits: { cpu: "2", memory: "8Gi" }
  jvmOptions:
    xms: "5g"
    xmx: "5g"
  workerConfig:
    config.storage.replication.factor: 2
    offset.storage.replication.factor: 2
    status.storage.replication.factor: 2
  hpa:
    enabled: false
    minReplicas: 1
    maxReplicas: 3
    metrics:
      cpu:
        averageUtilization: 70
      memory:
        averageUtilization: 80
    behavior:
      scaleUp:
        stabilizationWindowSeconds: 120
        policies:
          - type: Percent
            value: 50
            periodSeconds: 120
          - type: Pods
            value: 2
            periodSeconds: 120
        selectPolicy: Min
      scaleDown:
        stabilizationWindowSeconds: 600
        policies:
          - type: Percent
            value: 25
            periodSeconds: 300
          - type: Pods
            value: 1
            periodSeconds: 300
        selectPolicy: Min
  scheduling:
    nodeSelector: {}
    tolerations: []
    affinity: {}
    antiAffinity:
      enabled: true
      type: preferred
      topologyKey: kubernetes.io/hostname
      weight: 100

# Kafka networkPolicy (conflicts with countly chart's networkPolicy key above).
# For the Kafka chart, set networkPolicy via a per-chart overlay.
# Kafka chart structure:
#   networkPolicy:
#     enabled: false
#     allowedNamespaces: [countly]
#     allowMonitoring: false
#     monitoringNamespaceSelector:
#       kubernetes.io/metadata.name: monitoring

clickhouseNamespace: clickhouse

# =============================================================================
#  OBSERVABILITY CHART  (charts/countly-observability)
# =============================================================================

# -- Deployment mode: "full" (all in-cluster), "hybrid" (no Grafana), "external" (no backends)
mode: full

# -- Cluster name injected into Prometheus external_labels
clusterName: countly-local

# -- Cross-namespace references for scrape target discovery
countlyNamespace: countly
# clickhouseNamespace: clickhouse                    # Already defined above (kafka chart)
mongodbNamespace: mongodb
kafkaNamespace: kafka
ingressNamespace: ingress-nginx

# --- Per-signal toggles + sampling ---
metrics:
  enabled: true
  sampling:
    interval: "15s"                                  # Global Prometheus scrape_interval

traces:
  enabled: true
  sampling:
    strategy: "AlwaysOn"                             # AlwaysOn | TraceIdRatio | ParentBased
    ratio: 1.0                                       # 0.0-1.0, used when strategy != AlwaysOn

logs:
  enabled: true
  sampling:
    enabled: false
    dropRate: 0                                      # 0.0-1.0, fraction of logs to drop

profiling:
  enabled: true
  sampling:
    rate: "100"                                      # Advisory only — SDK config, not server-enforced

# --- Prometheus ---
prometheus:
  image:
    repository: prom/prometheus
    tag: "v3.10.0"
  retention:
    time: "30d"
    size: "50GB"
  storage:
    size: 100Gi
    storageClass: ""                                 # Falls back to global.storageClass
  resources:
    requests: { cpu: "2", memory: "3Gi" }
    limits: { cpu: "2", memory: "4Gi" }
  extraArgs: []
  scheduling:
    nodeSelector: {}
    tolerations: []
    affinity: {}
  external:
    remoteWriteUrl: ""                               # Full Prometheus remote write URL
    auth:
      existingSecret: ""
      bearerTokenKey: ""
    tls:
      insecureSkipVerify: false
      caSecretName: ""
      caKey: ""

# --- Loki ---
loki:
  image:
    repository: grafana/loki
    tag: "3.6.7"
  retention: "30d"
  storage:
    backend: "filesystem"                            # filesystem | s3 | gcs | azure
    size: 100Gi
    storageClass: ""
    bucket: ""                                       # Bucket/container name (required for object backends)
    endpoint: ""                                     # Custom endpoint (e.g. MinIO)
    region: ""                                       # Cloud region (S3)
    insecure: false                                  # Use HTTP instead of HTTPS
    forcePathStyle: false                            # S3 path-style access (MinIO)
    existingSecret: ""                               # K8s Secret name to mount (credential file)
    secretKey: "key.json"                            # Key within the Secret
    secretMountPath: "/var/secrets/storage"
    envFromSecret: ""                                # K8s Secret name to inject as env vars
    config: {}                                       # Provider-specific passthrough
  resources:
    requests: { cpu: "500m", memory: "1Gi" }
    limits: { cpu: "1", memory: "2Gi" }
  config:
    maxStreamsPerUser: 10000
    maxLineSize: 256000
    ingestionRateMb: 64
    ingestionBurstSizeMb: 128
  scheduling:
    nodeSelector: {}
    tolerations: []
    affinity: {}
  external:
    pushUrl: ""                                      # Full Loki push URL
    auth:
      existingSecret: ""
      bearerTokenKey: ""
    tls:
      insecureSkipVerify: false

# --- Tempo ---
tempo:
  image:
    repository: grafana/tempo
    tag: "2.10.1"
  retention: "12h"
  storage:
    backend: "local"                                 # local | s3 | gcs | azure
    size: 150Gi
    storageClass: ""
    bucket: ""
    endpoint: ""
    region: ""
    insecure: false
    forcePathStyle: false
    existingSecret: ""
    secretKey: "key.json"
    secretMountPath: "/var/secrets/storage"
    envFromSecret: ""
    config: {}
  resources:
    requests: { cpu: "3", memory: "6Gi" }
    limits: { cpu: "4", memory: "10Gi" }
  config:
    ingestionRateLimitBytes: 100000000
    ingestionBurstSizeBytes: 150000000
    maxTracesPerUser: 50000
    maxBytesPerTrace: 5000000
  scheduling:
    nodeSelector: {}
    tolerations: []
    affinity: {}
  external:
    otlpGrpcEndpoint: ""                             # Tempo OTLP gRPC host:port
    otlpHttpEndpoint: ""                             # Tempo OTLP HTTP URL (optional)
    auth:
      existingSecret: ""
      headerKey: ""
    tls:
      insecureSkipVerify: true

# --- Pyroscope ---
pyroscope:
  image:
    repository: grafana/pyroscope
    tag: "1.18.1"
  retention: "72h"                                   # Go duration (h, m, s only — no 'd')
  storage:
    backend: "filesystem"                            # filesystem | s3 | gcs | azure | swift
    size: 20Gi
    storageClass: ""
    bucket: ""
    endpoint: ""
    region: ""
    insecure: false
    forcePathStyle: false
    existingSecret: ""
    secretKey: "key.json"
    secretMountPath: "/var/secrets/storage"
    envFromSecret: ""
    config: {}
  resources:
    requests: { cpu: "500m", memory: "1Gi" }
    limits: { cpu: "1", memory: "2Gi" }
  scheduling:
    nodeSelector: {}
    tolerations: []
    affinity: {}
  external:
    ingestUrl: ""                                    # Pyroscope ingest URL
    auth:
      existingSecret: ""
      headerKey: ""
    tls:
      insecureSkipVerify: false

# --- Grafana (only deployed when mode == "full") ---
grafana:
  enabled: true
  image:
    repository: grafana/grafana
    tag: "12.4.0"
  admin:
    existingSecret: ""                               # Use pre-existing Secret for admin creds
    userKey: "admin-user"
    passwordKey: "admin-password"
  persistence:
    enabled: false                                   # Ephemeral by default (declarative config)
    size: 10Gi
    storageClass: ""
  resources:
    requests: { cpu: "1", memory: "1Gi" }
    limits: { cpu: "2", memory: "2Gi" }
  plugins:
    install: "grafana-pyroscope-datasource"
  featureToggles: "tempoSearch,tempoBackendSearch,traceqlEditor"
  dashboards:
    enabled: true
    core: true
    data: true
    clickhouse: true
  pdb:
    enabled: false
    minAvailable: 1
  scheduling:
    nodeSelector: {}
    tolerations: []
    affinity: {}
  external:
    url: ""                                          # External Grafana URL (NOTES.txt only)

# --- Alloy (DaemonSet — logs only) ---
alloy:
  image:
    repository: grafana/alloy
    tag: "v1.13.2"
  resources:
    requests: { cpu: "500m", memory: "1Gi" }
    limits: { cpu: "2", memory: "2Gi" }
  scheduling:
    nodeSelector:
      kubernetes.io/os: linux
    tolerations: []

# --- Alloy-OTLP (Deployment — OTLP traces + profiling receive) ---
alloyOtlp:
  image:
    repository: grafana/alloy
    tag: "v1.13.2"
  replicas: 1
  resources:
    requests: { cpu: "500m", memory: "1Gi" }
    limits: { cpu: "2", memory: "2Gi" }
  memoryLimiter:
    limit: "1600MiB"
    spikeLimit: "400MiB"
  scheduling:
    nodeSelector: {}
    tolerations: []

# --- Alloy-Metrics (Deployment — ALL Prometheus scraping) ---
alloyMetrics:
  image:
    repository: grafana/alloy
    tag: "v1.13.2"
  replicas: 1
  resources:
    requests: { cpu: "500m", memory: "512Mi" }
    limits: { cpu: "500m", memory: "512Mi" }
  pdb:
    enabled: false
    minAvailable: 1
  scheduling:
    nodeSelector: {}
    tolerations: []

# --- kube-state-metrics ---
kubeStateMetrics:
  enabled: true
  image:
    repository: registry.k8s.io/kube-state-metrics/kube-state-metrics
    tag: "v2.18.0"
  resources:
    requests: { cpu: "10m", memory: "32Mi" }
    limits: { cpu: "100m", memory: "256Mi" }
  namespaces:
    - countly
    - observability
    - ingress-nginx
    - kube-system
    - clickhouse
    - mongodb
    - kafka
  scheduling:
    nodeSelector: {}
    tolerations: []

# --- node-exporter ---
nodeExporter:
  enabled: true
  image:
    repository: prom/node-exporter
    tag: "v1.10.2"
  resources:
    requests: { cpu: "100m", memory: "180Mi" }
    limits: { cpu: "250m", memory: "300Mi" }

# Observability ingress (conflicts with countly chart's ingress key above).
# For the observability chart (Grafana), set ingress via a per-chart overlay.
# Observability chart structure:
#   ingress:
#     enabled: false
#     className: nginx
#     annotations: {}
#     hosts:
#       - host: obs.example.com
#     tls: []

# Observability networkPolicy (conflicts with countly chart's networkPolicy key above).
# For the observability chart, set networkPolicy via a per-chart overlay.
# Observability chart structure:
#   networkPolicy:
#     enabled: false
#     additionalIngress: []
