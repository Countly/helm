# =============================================================================
# External Secrets Operator + Google Secret Manager
# ClusterSecretStore Example
# =============================================================================
# Apply this once per cluster after External Secrets Operator is installed.
#
# Prerequisites:
#   - The external-secrets controller service account is annotated for Workload
#     Identity with a GCP service account that can read Secret Manager secrets.
#   - The GCP service account has at least:
#       roles/secretmanager.secretAccessor
#
# This file is a reference only. Adapt project IDs and names to your cluster.
# =============================================================================

apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: gcp-secrets
spec:
  provider:
    gcpsm:
      projectID: countly-dev-313620
      auth:
        workloadIdentity:
          clusterLocation: us-central1
          clusterName: change-me
          clusterProjectID: countly-dev-313620
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
