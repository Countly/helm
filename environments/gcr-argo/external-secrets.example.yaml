# =============================================================================
# External Secrets Operator (ESO) Configuration Example
# =============================================================================
# When using secrets.mode=externalSecret, configure the ESO remoteRefs
# in the chart-specific files under environments/<env>/:
#
# environments/<env>/secrets-countly.yaml
#   secrets:
#     mode: externalSecret
#     externalSecret:
#       refreshInterval: "1h"
#       secretStoreRef:
#         name: gcp-secrets
#         kind: ClusterSecretStore
#       remoteRefs:
#         common:
#           encryptionReportsKey: "acme-countly-encryption-reports-key"
#           webSessionSecret: "acme-countly-web-session-secret"
#           passwordSecret: "acme-countly-password-secret"
#         clickhouse:
#           password: "acme-countly-clickhouse-password"
#         mongodb:
#           password: "acme-countly-mongodb-password"
#
# environments/<env>/secrets-kafka.yaml
#   secrets:
#     mode: externalSecret
#     externalSecret:
#       refreshInterval: "1h"
#       secretStoreRef:
#         name: gcp-secrets
#         kind: ClusterSecretStore
#       remoteRefs:
#         clickhouse:
#           password: "acme-kafka-connect-clickhouse-password"
#
# environments/<env>/secrets-clickhouse.yaml
#   secrets:
#     mode: externalSecret
#     externalSecret:
#       refreshInterval: "1h"
#       secretStoreRef:
#         name: gcp-secrets
#         kind: ClusterSecretStore
#       remoteRefs:
#         defaultUserPassword: "acme-clickhouse-default-user-password"
#
# environments/<env>/secrets-mongodb.yaml
#   secrets:
#     mode: externalSecret
#     externalSecret:
#       refreshInterval: "1h"
#       secretStoreRef:
#         name: gcp-secrets
#         kind: ClusterSecretStore
#       remoteRefs:
#         admin:
#           password: "acme-mongodb-admin-password"
#         app:
#           password: "acme-mongodb-app-password"
#         metrics:
#           password: "acme-mongodb-metrics-password"
#
# For GAR image pulls, configure this in environments/<env>/global.yaml:
#
# global:
#   imagePullSecrets:
#     - name: countly-registry
#   imagePullSecretExternalSecret:
#     enabled: true
#     refreshInterval: "1h"
#     secretStoreRef:
#       name: gcp-secrets
#       kind: ClusterSecretStore
#     remoteRef:
#       key: "acme-gar-dockerconfig"
#
# Prerequisites:
#   1. Install External Secrets Operator: https://external-secrets.io/
#   2. Create a SecretStore or ClusterSecretStore pointing to your secrets backend
#   3. Ensure the ESO service account has access to the referenced secrets
#
# Supported backends: AWS Secrets Manager, HashiCorp Vault, GCP Secret Manager,
#                     Azure Key Vault, and many more.
