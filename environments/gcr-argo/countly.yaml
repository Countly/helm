# Customer-specific Countly overrides only.
# Leave this file minimal so sizing / TLS / observability / security profiles apply cleanly.

global:
  imageSource:
    mode: gcpArtifactRegistry
    gcpArtifactRegistry:
      repositoryPrefix: us-docker.pkg.dev/countly-01/countly-unified
  imagePullSecretExternalSecret:
    enabled: true
    refreshInterval: "1h"
    secretStoreRef:
      name: gcp-secrets
      kind: ClusterSecretStore
    remoteRef:
      key: customers-gcr-argo-gar-dockerconfig
  imagePullSecrets:
    - name: countly-registry

image:
  digest: "sha256:b42efb9713ee11d173fe409924fb9e2a208b5c0beafed9e42f349b996b6650a4"
