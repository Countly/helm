# Customer-specific Kafka overrides only.
# Keep tier1 defaults intact for other customers; this cluster needs a smaller
# Kafka Connect footprint to fit on the current node pool.

kafkaConnect:
  resources:
    requests:
      memory: "4Gi"
    limits:
      memory: "4Gi"
  jvmOptions:
    xms: "2g"
    xmx: "2g"
