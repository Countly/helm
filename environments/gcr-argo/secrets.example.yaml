# =============================================================================
# Countly Deployment — Complete Secrets Reference
# =============================================================================
# DO NOT COMMIT THIS FILE WITH REAL VALUES.
#
# This file documents ALL secrets required for a first-time install.
# Copy to your environment directory and fill in real values, then
# split into per-chart secret files (see below).
#
# For production deployments, use one of:
#   - secrets.mode: existingSecret (pre-created Kubernetes secrets)
#   - secrets.mode: externalSecret (External Secrets Operator)
#   - SOPS encryption (see secrets.sops.example.yaml)
# =============================================================================

# --- countly chart (environments/<env>/credentials-countly.yaml) ---
secrets:
  common:
    encryptionReportsKey: "CHANGEME-min-8-chars"
    webSessionSecret: "CHANGEME-min-8-chars"
    passwordSecret: "CHANGEME-min-8-chars"
  clickhouse:
    password: "CHANGEME-match-clickhouse-chart"
  mongodb:
    password: "CHANGEME-match-mongodb-chart"

# --- countly-mongodb chart (environments/<env>/credentials-mongodb.yaml) ---
users:
  app:
    password: "CHANGEME-match-secrets.mongodb.password"
  metrics:
    password: "CHANGEME-metrics-exporter"

# --- countly-clickhouse chart (environments/<env>/credentials-clickhouse.yaml) ---
auth:
  defaultUserPassword:
    password: "CHANGEME-match-secrets.clickhouse.password"

# --- countly-kafka chart (environments/<env>/credentials-kafka.yaml) ---
kafkaConnect:
  clickhouse:
    password: "CHANGEME-match-clickhouse-password"
