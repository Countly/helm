# Countly secrets: static values in Git, passwords from Google Secret Manager via External Secrets Operator
secrets:
  mode: externalSecret
  clickhouse:
    username: "default"
    database: "countly_drill"
  kafka:
    securityProtocol: "PLAINTEXT"
  externalSecret:
    refreshInterval: "1h"
    secretStoreRef:
      name: gcp-secrets
      kind: ClusterSecretStore
    remoteRefs:
      common:
        encryptionReportsKey: customers-gcr-argo-countly-encryption-reports-key
        webSessionSecret: customers-gcr-argo-countly-web-session-secret
        passwordSecret: customers-gcr-argo-countly-password-secret
      clickhouse:
        password: customers-gcr-argo-countly-clickhouse-password
      mongodb:
        password: customers-gcr-argo-countly-mongodb-password
