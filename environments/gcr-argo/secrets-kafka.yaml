# Kafka Connect secrets from Google Secret Manager via External Secrets Operator
secrets:
  mode: externalSecret
  # keep non-sensitive static values here; fetch only passwords remotely
  externalSecret:
    refreshInterval: "1h"
    secretStoreRef:
      name: gcp-secrets
      kind: ClusterSecretStore
    remoteRefs:
      clickhouse:
        password: customers-gcr-argo-kafka-connect-clickhouse-password
