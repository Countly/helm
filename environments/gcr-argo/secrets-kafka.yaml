# Kafka Connect secrets from Google Secret Manager via External Secrets Operator
secrets:
  mode: externalSecret
  externalSecret:
    refreshInterval: "1h"
    secretStoreRef:
      name: gcp-secrets
      kind: ClusterSecretStore
    remoteRefs:
      clickhouse:
        username: customers-gcr-argo-kafka-connect-clickhouse-username
        password: customers-gcr-argo-kafka-connect-clickhouse-password
