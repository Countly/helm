# Countly secrets from Google Secret Manager via External Secrets Operator
secrets:
  mode: externalSecret
  externalSecret:
    refreshInterval: "1h"
    secretStoreRef:
      name: gcp-secrets
      kind: ClusterSecretStore
    remoteRefs:
      common:
        encryptionReportsKey: customers-gcr-argo-countly-encryption-reports-key
        webSessionSecret: customers-gcr-argo-countly-web-session-secret
        passwordSecret: customers-gcr-argo-countly-password-secret
      clickhouse:
        url: customers-gcr-argo-countly-clickhouse-url
        username: customers-gcr-argo-countly-clickhouse-username
        password: customers-gcr-argo-countly-clickhouse-password
        database: customers-gcr-argo-countly-clickhouse-database
      kafka:
        brokers: customers-gcr-argo-countly-kafka-brokers
        securityProtocol: customers-gcr-argo-countly-kafka-security-protocol
      mongodb:
        connectionString: customers-gcr-argo-countly-mongodb-connection-string
