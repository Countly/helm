# Countly secrets: static values in Git, passwords from Google Secret Manager via External Secrets Operator
secrets:
  mode: externalSecret
  common:
    encryptionReportsKey: "gcr-argo-encryption-key-2026"
    webSessionSecret: "gcr-argo-web-session-2026"
    passwordSecret: "gcr-argo-password-secret-2026"
  clickhouse:
    username: "default"
    database: "countly_drill"
  kafka:
    securityProtocol: "PLAINTEXT"
  externalSecret:
    refreshInterval: "1h"
    secretStoreRef:
      name: gcp-secrets
      kind: ClusterSecretStore
    remoteRefs:
      clickhouse:
        password: customers-gcr-argo-countly-clickhouse-password
      mongodb:
        password: customers-gcr-argo-countly-mongodb-password
