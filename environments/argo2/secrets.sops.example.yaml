# =============================================================================
# SOPS Encrypted Secrets Example
# =============================================================================
# Encrypt this file with SOPS before committing:
#   sops --encrypt --in-place environments/<env>/secrets-countly.yaml
#
# Configure helmfile to decrypt with the helm-secrets plugin:
#   values:
#     - secrets://environments/<env>/secrets-countly.yaml
#
# See: https://github.com/jkroepke/helm-secrets
# =============================================================================

# This file would contain the same structure as secrets.example.yaml
# but encrypted with SOPS (AGE, AWS KMS, GCP KMS, or Azure Key Vault).
#
# Example .sops.yaml configuration:
#   creation_rules:
#     - path_regex: .*secrets.*\.yaml$
#       age: >-
#         age1xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
