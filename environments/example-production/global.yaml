# Example: Production deployment with Let's Encrypt TLS

global:
  sizing: production
  security: hardened
  tls: letsencrypt
  observability: full
  kafkaConnect: balanced
  kafkaConnectSizing: production
  imageSource:
    mode: gcpArtifactRegistry
    gcpArtifactRegistry:
      repositoryPrefix: us-docker.pkg.dev/countly-01/countly-unified
  imagePullSecretExternalSecret:
    enabled: true
    refreshInterval: "1h"
    secretStoreRef:
      name: gcp-secrets
      kind: ClusterSecretStore
    remoteRef:
      key: customer-a-gar-dockerconfig
  imagePullSecrets:
    - name: countly-registry
  storageClass: gp3

gateway:
  hostname: analytics.example.com
  tls:
    mode: letsencrypt
    clusterIssuer: letsencrypt-prod

backingServices:
  mongodb:   { mode: bundled }
  clickhouse: { mode: bundled }
  kafka:     { mode: bundled }
