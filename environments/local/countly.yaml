# Local environment — Countly chart choices (non-sizing)

# Ingress with self-signed TLS
ingress:
  enabled: true
  className: nginx
  hostname: helm-test.count.ly
  annotations:
    nginx.org/client-max-body-size: "50m"
    nginx.org/proxy-buffering: "True"
    nginx.org/proxy-buffer-size: "256k"
    nginx.org/proxy-buffers: "16 256k"
    nginx.org/proxy-busy-buffers-size: "512k"
    nginx.org/proxy-max-temp-file-size: "2048m"
    nginx.org/client-body-buffer-size: "2m"
    nginx.org/proxy-connect-timeout: "60s"
    nginx.org/proxy-read-timeout: "120s"
    nginx.org/proxy-send-timeout: "120s"
    nginx.org/keepalive: "256"
    nginx.org/server-snippets: |
      otel_trace on;
      otel_trace_context propagate;
      client_header_timeout 30s;
    nginx.org/location-snippets: |
      proxy_set_header X-Request-ID $request_id;
      proxy_set_header X-Request-Start $msec;
      proxy_request_buffering on;
      proxy_next_upstream error timeout http_502 http_503 http_504;
      proxy_next_upstream_timeout 30s;
      proxy_next_upstream_tries 3;
      proxy_temp_file_write_size 1m;
      client_body_timeout 120s;
  tls:
    mode: selfSigned

# Updated image with OTel trace correlation fixes (requestHook, responseHook, NodeSDK)
image:
  digest: "sha256:469da06592a8abc6ea9f5b77564a09540564bb6828d821025cc5af5e8b5100c6"

# Local: single replica for all components
api:
  replicaCount: 1
  hpa:
    maxReplicas: 1

aggregator:
  replicaCount: 1
  hpa:
    minReplicas: 1
    maxReplicas: 1

ingestor:
  replicaCount: 1
  hpa:
    maxReplicas: 1

# Override Kafka replication factor — local has only 1 broker
config:
  kafka:
    COUNTLY_CONFIG__KAFKA_REPLICATIONFACTOR: "1"
  otel:
    OTEL_ENABLED: "true"
    OTEL_EXPORTER_OTLP_ENDPOINT: "http://countly-observability-alloy-otlp.observability.svc.cluster.local:4318"
    OTEL_EXPORTER_OTLP_PROTOCOL: "http/protobuf"
    PYROSCOPE_ENABLED: "true"
    PYROSCOPE_ENDPOINT: "http://countly-observability-alloy-otlp.observability.svc.cluster.local:9999"
