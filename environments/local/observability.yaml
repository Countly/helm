# Local environment — Observability chart choices (non-sizing)

# Deployment mode: full | hybrid | external | disabled
mode: full

# Grafana admin password is auto-generated and stored in a Secret.
# To retrieve it: kubectl get secret -n observability <release>-countly-observability-grafana -o jsonpath='{.data.admin-password}' | base64 -d
# To use your own secret: set grafana.admin.existingSecret and grafana.admin.passwordKey

# Grafana Gateway API
gateway:
  enabled: true
  className: eg
  hostname: obs-test.count.ly
