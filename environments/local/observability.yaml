# Local environment — Observability chart choices (non-sizing)

# Deployment mode: full | hybrid | external | disabled
mode: full

# Grafana admin credentials
grafana:
  auth:
    adminPassword: "countly-local-2026"

# Grafana ingress with self-signed TLS
ingress:
  enabled: true
  className: nginx
  annotations:
    # Must match the Countly chart's ClusterIssuer: <release-name>-ca-issuer
    cert-manager.io/cluster-issuer: countly-ca-issuer
  hosts:
    - host: obs-test.count.ly
  tls:
    - hosts:
        - obs-test.count.ly
      secretName: grafana-tls
