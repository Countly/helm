# Local environment — Kafka chart overrides (non-sizing)
# Profile defaults come from profiles/sizing/local/kafka.yaml and
# profiles/kafka-connect-sizing/local/kafka.yaml
# Credentials come from credentials-kafka.yaml

# Use OTel-enabled image (includes /opt/otel/opentelemetry-javaagent.jar)
kafkaConnect:
  image: "countly/strimzi-kafka-connect-clickhouse:kafka4.2.0-ch1.3.5-strimzi0.51-otel2.12.0"
  otel:
    enabled: true
    resourceAttributes: "service.namespace=countly,deployment.environment=local"
