# Local environment — Kafka chart overrides (non-sizing)
# Profile defaults come from profiles/sizing/local/kafka.yaml
# Secrets come from secrets-kafka.yaml

# Use OTel-enabled image (includes /opt/otel/opentelemetry-javaagent.jar)
kafkaConnect:
  image: "gcr.io/countly-dev-313620/strimzi/kafka-connect-clickhouse:4.2.0-1.3.5-otel-strimzi-amd64"
  otel:
    enabled: true
    resourceAttributes: "service.namespace=countly,deployment.environment=local"
