# =============================================================================
# Countly Deployment — Global Configuration
# =============================================================================

global:
  sizing: production
  observability: full
  kafkaConnect: balanced
  tls: letsencrypt
  security: open

  imageRegistry: ""
  storageClass: ""
  imagePullSecrets: []

ingress:
  hostname: helm-argocd.count.ly
  className: nginx

backingServices:
  mongodb:
    mode: bundled
  clickhouse:
    mode: bundled
  kafka:
    mode: bundled
