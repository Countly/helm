# Countly secrets sourced from Google Secret Manager through External Secrets.
secrets:
  mode: externalSecret
  clickhouse:
    username: "default"
    database: "countly_drill"
  kafka:
    securityProtocol: "PLAINTEXT"
  externalSecret:
    refreshInterval: "1h"
    secretStoreRef:
      name: gcp-secrets
      kind: ClusterSecretStore
    remoteRefs:
      common:
        encryptionReportsKey: "prod-argo-countly-encryption-reports-key"
        webSessionSecret: "prod-argo-countly-web-session-secret"
        passwordSecret: "prod-argo-countly-password-secret"
      clickhouse:
        password: "prod-argo-countly-clickhouse-password"
      mongodb:
        password: "prod-argo-mongodb-app-password"
