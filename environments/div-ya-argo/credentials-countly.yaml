# Countly secrets — FILL IN before first deploy
# Passwords must match across charts (see secrets.example.yaml)
secrets:
  mode: externalSecret
  clickhouse:
    username: "default"
    database: "countly_drill"
  kafka:
    securityProtocol: "PLAINTEXT"
  externalSecret:
    refreshInterval: "1h"
    secretStoreRef:
      name: gcp-secrets
      kind: ClusterSecretStore
    remoteRefs:
      common:
        encryptionReportsKey: div-ya-argo-countly-encryption-reports-key
        webSessionSecret: div-ya-argo-countly-web-session-secret
        passwordSecret: div-ya-argo-countly-password-secret
      clickhouse:
        password: div-ya-argo-countly-clickhouse-password
      mongodb:
        password: div-ya-argo-countly-mongodb-password
