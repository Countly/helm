# Example: Small deployment (development/staging)

global:
  sizing: small
  security: open
  tls: none
  observability: full
  kafkaConnect: balanced
  kafkaConnectSizing: small

gateway:
  hostname: analytics-dev.example.com

backingServices:
  mongodb:   { mode: bundled }
  clickhouse: { mode: bundled }
  kafka:     { mode: bundled }
