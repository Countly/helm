# Countly secrets for final-argo.
secrets:
  mode: externalSecret
  clickhouse:
    username: "default"
    database: "countly_drill"
  kafka:
    securityProtocol: "PLAINTEXT"
  externalSecret:
    refreshInterval: "1h"
    secretStoreRef:
      name: gcp-secrets
      kind: ClusterSecretStore
    remoteRefs:
      common:
        encryptionReportsKey: final-argo-countly-encryption-reports-key
        webSessionSecret: final-argo-countly-web-session-secret
        passwordSecret: final-argo-countly-password-secret
      clickhouse:
        password: final-argo-countly-clickhouse-password
      mongodb:
        password: final-argo-mongodb-app-password
