# MongoDB secrets for final-argo.
secrets:
  mode: externalSecret
  externalSecret:
    refreshInterval: "1h"
    secretStoreRef:
      name: gcp-secrets
      kind: ClusterSecretStore
    remoteRefs:
      admin:
        password: final-argo-mongodb-admin-password
      app:
        password: final-argo-mongodb-app-password
      metrics:
        password: final-argo-mongodb-metrics-password

users:
  admin:
    enabled: true
  metrics:
    enabled: true
