apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: customer-external-secrets
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
    - git:
        repoURL: https://github.com/Countly/helm.git
        revision: main
        files:
          - path: argocd/customers/*.yaml
  template:
    metadata:
      name: "{{ .customer }}-external-secrets"
      annotations:
        argocd.argoproj.io/sync-wave: "-23"
    spec:
      project: default
      source:
        repoURL: https://charts.external-secrets.io
        chart: external-secrets
        targetRevision: 1.3.1
        helm:
          releaseName: external-secrets
          values: |
            installCRDs: true
            serviceAccount:
              create: true
              annotations:
                iam.gke.io/gcp-service-account: "{{ .gcpServiceAccountEmail }}"
      destination:
        server: "{{ .server }}"
        namespace: external-secrets
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
