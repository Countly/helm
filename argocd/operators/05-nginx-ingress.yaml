apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: nginx-ingress
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
    - git:
        repoURL: https://github.com/Countly/helm.git
        revision: main
        files:
          - path: argocd/customers/*.yaml
  template:
    metadata:
      name: "{{ .customer }}-nginx-ingress"
      annotations:
        argocd.argoproj.io/sync-wave: "-25"
    spec:
      project: default
      sources:
        - repoURL: https://helm.nginx.com/stable
          chart: nginx-ingress
          targetRevision: 2.1.0
          helm:
            releaseName: nginx-ingress
            valueFiles:
              - $values/nginx-ingress-values.yaml
            values: |
              {{- $lbIP := dig "nginxIngress" "service" "loadBalancerIP" "" . -}}
              {{- if $lbIP }}
              controller:
                service:
                  loadBalancerIP: {{ $lbIP | quote }}
              {{- end }}
        - repoURL: https://github.com/Countly/helm.git
          targetRevision: main
          ref: values
      destination:
        server: "{{ .server }}"
        namespace: ingress-nginx
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
          - RespectIgnoreDifferences=true
      ignoreDifferences:
        - group: apiextensions.k8s.io
          kind: CustomResourceDefinition
          name: apdoslogconfs.appprotectdos.f5.com
          jsonPointers:
            - /spec/preserveUnknownFields
        - group: apiextensions.k8s.io
          kind: CustomResourceDefinition
          name: apdospolicies.appprotectdos.f5.com
          jsonPointers:
            - /spec/preserveUnknownFields
        - group: apiextensions.k8s.io
          kind: CustomResourceDefinition
          name: aplogconfs.appprotect.f5.com
          jsonPointers:
            - /spec/preserveUnknownFields
        - group: apiextensions.k8s.io
          kind: CustomResourceDefinition
          name: appolicies.appprotect.f5.com
          jsonPointers:
            - /spec/preserveUnknownFields
        - group: apiextensions.k8s.io
          kind: CustomResourceDefinition
          name: apusersigs.appprotect.f5.com
          jsonPointers:
            - /spec/preserveUnknownFields
        - group: ""
          kind: Service
          name: nginx-ingress-controller
          namespace: ingress-nginx
          jsonPointers:
            - /metadata/annotations/cloud.google.com~1neg
            - /spec/healthCheckNodePort
            - /spec/ports/0/nodePort
            - /spec/ports/1/nodePort
