apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: customer-cluster-secret-store
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
    - git:
        repoURL: https://github.com/Countly/helm.git
        revision: main
        files:
          - path: argocd/customers/*.yaml
  template:
    metadata:
      name: "{{ .customer }}-cluster-secret-store"
      annotations:
        argocd.argoproj.io/sync-wave: "-22"
    spec:
      project: default
      source:
        repoURL: https://github.com/Countly/helm.git
        targetRevision: main
        path: charts/countly-cluster-secret-store
        helm:
          releaseName: countly-cluster-secret-store
          parameters:
            - name: secretStore.name
              value: "gcp-secrets"
            - name: secretStore.secretManagerProjectID
              value: "{{ .secretManagerProjectID }}"
            - name: secretStore.clusterProjectID
              value: "{{ .clusterProjectID }}"
            - name: secretStore.clusterName
              value: "{{ .clusterName }}"
            - name: secretStore.clusterLocation
              value: "{{ .clusterLocation }}"
      destination:
        server: "{{ .server }}"
        namespace: external-secrets
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - ServerSideApply=true
