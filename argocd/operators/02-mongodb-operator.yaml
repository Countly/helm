apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mongodb-kubernetes-operator
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-28"
spec:
  project: default
  source:
    repoURL: https://mongodb.github.io/helm-charts
    chart: mongodb-kubernetes
    targetRevision: 1.7.0
    helm:
      releaseName: mongodb-kubernetes-operator
      valuesObject:
        operator:
          watchedResources:
            - mongodbcommunity
  destination:
    server: https://34.135.156.216
    namespace: mongodb
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true

