apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mongodb-crds
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-29"
spec:
  project: default
  source:
    repoURL: https://github.com/mongodb/mongodb-kubernetes.git
    targetRevision: "1.7.0"
    path: public
    directory:
      include: crds.yaml
  destination:
    server: https://34.135.156.216
    namespace: mongodb
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true

