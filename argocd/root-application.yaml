apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: countly-bootstrap
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Countly/helm.git
    targetRevision: gcp-artifact-rep-integration
    path: argocd
    directory:
      recurse: true
      exclude: "{operator-manifests/**,customers/**}"
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
