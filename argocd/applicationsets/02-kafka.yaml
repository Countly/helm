apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: countly-kafka
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
    - git:
        repoURL: https://github.com/Countly/helm.git
        revision: gcp-artifact-rep-integration
        files:
          - path: argocd/customers/*.yaml
  template:
    metadata:
      name: "{{ .customer }}-kafka"
      annotations:
        argocd.argoproj.io/sync-wave: "5"
    spec:
      project: "{{ .project }}"
      source:
        repoURL: https://github.com/Countly/helm.git
        targetRevision: gcp-artifact-rep-integration
        path: charts/countly-kafka
        helm:
          releaseName: countly-kafka
          valueFiles:
            - "../../environments/{{ .environment }}/global.yaml"
            - "../../profiles/sizing/{{ .sizing }}/kafka.yaml"
            - "../../profiles/kafka-connect/{{ .kafkaConnect }}/kafka.yaml"
            - "../../profiles/observability/{{ .observability }}/kafka.yaml"
            - "../../profiles/security/{{ .security }}/kafka.yaml"
            - "../../environments/{{ .environment }}/kafka.yaml"
            - "../../environments/{{ .environment }}/secrets-kafka.yaml"
          parameters:
            - name: argocd.enabled
              value: "true"
            - name: global.sizing
              value: "{{ .sizing }}"
            - name: global.security
              value: "{{ .security }}"
            - name: global.observability
              value: "{{ .observability }}"
            - name: global.kafkaConnect
              value: "{{ .kafkaConnect }}"
      destination:
        server: "{{ .server }}"
        namespace: kafka
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
          - RespectIgnoreDifferences=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
      ignoreDifferences:
        - group: kafka.strimzi.io
          kind: Kafka
          jsonPointers:
            - /status
        - group: kafka.strimzi.io
          kind: KafkaConnect
          jsonPointers:
            - /status
        - group: kafka.strimzi.io
          kind: KafkaConnector
          jsonPointers:
            - /status
        - group: kafka.strimzi.io
          kind: KafkaNodePool
          jsonPointers:
            - /status
