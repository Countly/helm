apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: countly-mongodb
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - customer: helm-argocd
            project: helm-argocd
            server: https://34.135.156.216
            sizing: production
            security: open
  template:
    metadata:
      name: "{{customer}}-mongodb"
      annotations:
        argocd.argoproj.io/sync-wave: "0"
    spec:
      project: "{{project}}"
      source:
        repoURL: https://github.com/Countly/helm.git
        targetRevision: deploy-test-ui
        path: charts/countly-mongodb
        helm:
          releaseName: countly-mongodb
          valueFiles:
            - "../../environments/{{customer}}/global.yaml"
            - "../../profiles/sizing/{{sizing}}/mongodb.yaml"
            - "../../profiles/security/{{security}}/mongodb.yaml"
            - "../../environments/{{customer}}/mongodb.yaml"
            - "../../environments/{{customer}}/secrets-mongodb.yaml"
          parameters:
            - name: argocd.enabled
              value: "true"
      destination:
        server: "{{server}}"
        namespace: mongodb
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
          - RespectIgnoreDifferences=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
      ignoreDifferences:
        - group: mongodbcommunity.mongodb.com
          kind: MongoDBCommunity
          jsonPointers:
            - /status
