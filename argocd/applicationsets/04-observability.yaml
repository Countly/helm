apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: countly-observability
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
    - git:
        repoURL: https://github.com/Countly/helm.git
        revision: gcp-artifact-rep-integration
        files:
          - path: argocd/customers/*.yaml
  template:
    metadata:
      name: "{{ .customer }}-observability"
      annotations:
        argocd.argoproj.io/sync-wave: "15"
    spec:
      project: "{{ .project }}"
      source:
        repoURL: https://github.com/Countly/helm.git
        targetRevision: gcp-artifact-rep-integration
        path: '{{ if eq .observability "disabled" }}charts/noop{{ else }}charts/countly-observability{{ end }}'
        helm:
          releaseName: countly-observability
          valueFiles:
            - "../../environments/{{ .environment }}/global.yaml"
            - "../../profiles/sizing/{{ .sizing }}/observability.yaml"
            - "../../profiles/observability/{{ .observability }}/observability.yaml"
            - "../../profiles/security/{{ .security }}/observability.yaml"
            - "../../environments/{{ .environment }}/observability.yaml"
            - "../../environments/{{ .environment }}/secrets-observability.yaml"
          parameters:
            - name: argocd.enabled
              value: "true"
            - name: global.sizing
              value: "{{ .sizing }}"
            - name: global.security
              value: "{{ .security }}"
            - name: global.observability
              value: "{{ .observability }}"
      destination:
        server: "{{ .server }}"
        namespace: observability
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
          - RespectIgnoreDifferences=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
