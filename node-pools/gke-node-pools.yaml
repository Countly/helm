# Google Kubernetes Engine Node Pool Configurations  
# Apply with: gcloud container node-pools create [POOL_NAME] --cluster=[CLUSTER_NAME]
#
# All pools use node-config-raw.yaml for performance optimizations:
# - vm.max_map_count=262144 (required for ClickHouse/Elasticsearch)
# - Network buffer tuning (critical for Kafka throughput) 
# - TCP optimizations (improves database workloads)
# - cpuManagerPolicy=static (better CPU isolation)

---
# 1. Default Pool - General purpose for Countly apps, observability, and system workloads
# Countly services have no node preferences, just pod anti-affinity for HA
# Handles: Countly API/Frontend/Ingestor/Aggregator/JobServer + Observability + System pods
apiVersion: v1
kind: ConfigMap
metadata:
  name: default-pool-config
  namespace: kube-system
data:
  create-command: |
    gcloud container node-pools create default-pool \
      --cluster=stats-clone \
      --zone=europe-west1-b \
      --machine-type=e2-standard-16 \
      --num-nodes=1 \
      --enable-autoscaling \
      --min-nodes=1 \
      --max-nodes=1 \
      --disk-size=100GB \
      --disk-type=pd-ssd \
      --enable-autorepair \
      --enable-autoupgrade \
      --system-config-from-file=node-config-raw.yaml \
      --labels=customer=countly_dev \
      --metadata="disable-legacy-endpoints=true"

---
# 3. ClickHouse Pool - Combined for ClickHouse servers and keeper nodes
# Both ClickHouse server and keeper prefer role=clickhouse, combine for efficiency
# Handles: ClickHouse server pods, ClickHouse Keeper coordination pods
apiVersion: v1
kind: ConfigMap
metadata:
  name: clickhouse-pool-config
  namespace: kube-system
data:
  create-command: |
    gcloud container node-pools create clickhouse-pool-2 \
      --cluster=ak-cluster-experiment \
      --zone=europe-west1-b \
      --machine-type=e2-standard-16 \
      --num-nodes=1 \
      --enable-autoscaling \
      --min-nodes=1 \
      --max-nodes=1 \
      --disk-size=2200GB \
      --disk-type=pd-ssd \
      --enable-autorepair \
      --enable-autoupgrade \
      --node-labels="role=clickhouse" \
      --system-config-from-file=node-config-raw.yaml \
      --labels=customer=perf-test \
      --metadata="disable-legacy-endpoints=true"

---
# 4. MongoDB Pool - For MongoDB replica set nodes
# MongoDB services prefer role=mongodb, keep separate from ClickHouse
# Handles: MongoDB replica set primary, secondary, and arbiter nodes
apiVersion: v1
kind: ConfigMap
metadata:
  name: mongodb-pool-config
  namespace: kube-system
data:
  create-command: |
    gcloud container node-pools create mongodb-pool \
      --cluster=ak-cluster-experiment \
      --zone=europe-west1-b \
      --machine-type=e2-standard-16 \
      --num-nodes=1 \
      --enable-autoscaling \
      --min-nodes=1 \
      --max-nodes=1 \
      --disk-size=1000GB \
      --disk-type=pd-ssd \
      --enable-autorepair \
      --enable-autoupgrade \
      --node-labels="role=mongodb" \
      --system-config-from-file=node-config-raw.yaml \
      --labels=customer=perf-test \
      --metadata="disable-legacy-endpoints=true"

---
# 2. Kafka Pool - For Kafka controllers, brokers, and connect workloads
#  All Kafka services prefer role=kafka, merge into single pool for efficiency
# Handles: Kafka Controllers, Brokers, Cruise Control, Kafka Connect
apiVersion: v1
kind: ConfigMap
metadata:
  name: kafka-pool-config
  namespace: kube-system
data:
  create-command: |
    gcloud container node-pools create kafka-pool \
      --cluster=ak-cluster-experiment \
      --zone=europe-west1-b \
      --machine-type=e2-standard-16 \
      --num-nodes=1 \
      --enable-autoscaling \
      --min-nodes=1 \
      --max-nodes=2 \
      --disk-size=2000GB \
      --disk-type=pd-ssd \
      --enable-autorepair \
      --enable-autoupgrade \
      --node-labels="role=kafka" \
      --system-config-from-file=node-config-raw.yaml \
      --labels=customer=perf-test \
      --metadata="disable-legacy-endpoints=true"