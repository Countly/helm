# GKE Node Configuration for High-Performance Workloads
# Optimized for Kafka, ClickHouse, MongoDB, and Countly workloads

kubeletConfig:
  # Enable static CPU manager for better CPU isolation and performance
  # Assigns whole CPU cores to guaranteed pods, reduces context switching
  # Critical for latency-sensitive workloads like ClickHouse and Kafka brokers
  cpuManagerPolicy: static

linuxConfig:
  sysctl:
    # === MEMORY MANAGEMENT ===
    # ClickHouse requires high mmap limits for segment files
    # Default is 65530, but ClickHouse/Elasticsearch need 262144+ for large datasets
    # Without this, ClickHouse will fail to start with "too many open files" errors
    "vm.max_map_count": '262144'
    
    # Minimize swapping for database workloads (ClickHouse, MongoDB, Kafka)
    # Default is 60, setting to 1 keeps data in memory as much as possible
    "vm.swappiness": '1'

    # === I/O OPTIMIZATION ===
    # Trigger writeback when dirty pages reach 15% of memory (vs default 20%)
    # Earlier writeback prevents I/O spikes, better for database workloads
    "vm.dirty_ratio": '15'
    
    # Background writeback starts at 5% of memory (vs default 10%)
    # More aggressive background writes for smoother I/O performance
    "vm.dirty_background_ratio": '5'

    # === NETWORK BUFFER TUNING ===
    # Kafka generates massive network throughput, needs large buffers
    # These settings prevent packet drops during high-throughput scenarios
    
    # Maximum socket receive/send buffer sizes (16MB each)
    # Critical for Kafka broker-to-broker replication and client throughput
    "net.core.rmem_max": '16777216'  # 16MB max receive buffer
    "net.core.wmem_max": '16777216'  # 16MB max send buffer
    
    # Default socket buffer sizes (256KB each)
    # Reasonable defaults for most connections without explicit tuning
    "net.core.rmem_default": '262144'  # 256KB default receive
    "net.core.wmem_default": '262144'  # 256KB default send
    
    # Socket option memory limit (64KB)
    # Used for socket metadata, connection tracking
    "net.core.optmem_max": '65536'
    
    # Maximum listen() backlog queue (65536 connections)
    # Critical for high-connection workloads like Countly API under load
    "net.core.somaxconn": '65536'
    
    # Network device receive queue size
    # Prevents packet drops when network interface is busy
    "net.core.netdev_max_backlog": '65536'
    
    # Low-latency polling settings (50 microseconds)
    # Reduces CPU usage while maintaining low latency for network I/O
    "net.core.busy_poll": '50'
    "net.core.busy_read": '50'

    # === TCP OPTIMIZATION ===
    # Database workloads need optimized TCP for bulk data transfer
    
    # TCP receive buffer auto-tuning (min 4KB, default 87KB, max 16MB)
    # Automatically scales based on bandwidth-delay product
    "net.ipv4.tcp_rmem": '4096 87380 16777216'
    
    # TCP send buffer auto-tuning (min 4KB, default 64KB, max 16MB) 
    # Optimizes for both latency and throughput
    "net.ipv4.tcp_wmem": '4096 65536 16777216'
    
    # Enable TIME_WAIT socket reuse (reduces connection exhaustion)
    # Safe for server workloads, improves connection handling under load
    "net.ipv4.tcp_tw_reuse": '1'

    # === SECURITY HARDENING ===
    # Disable IPv6 to reduce attack surface and complexity
    # Most internal Kubernetes networking uses IPv4, IPv6 adds unnecessary overhead
    "net.ipv6.conf.all.disable_ipv6": '1'
    "net.ipv6.conf.default.disable_ipv6": '1'