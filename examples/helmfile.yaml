# Example Helmfile for customer deployment
# Copy to your deployment repo and customize

repositories: []

helmDefaults:
  wait: true
  timeout: 600
  createNamespace: true

releases:
  - name: countly-mongodb
    chart: ./charts/countly-mongodb
    namespace: mongodb
    values:
      - values-common.yaml
      - environments/tier2/values.yaml
      - overlay-customer.yaml

  - name: countly-clickhouse
    chart: ./charts/countly-clickhouse
    namespace: clickhouse
    values:
      - values-common.yaml
      - environments/tier2/values.yaml
      - overlay-customer.yaml

  - name: countly-kafka
    chart: ./charts/countly-kafka
    namespace: kafka
    values:
      - values-common.yaml
      - environments/tier2/values.yaml
      - overlay-customer.yaml
    needs:
      - mongodb/countly-mongodb
      - clickhouse/countly-clickhouse

  - name: countly
    chart: ./charts/countly
    namespace: countly
    values:
      - values-common.yaml
      - environments/tier2/values.yaml
      - overlay-customer.yaml
      # NEVER commit secrets overlay to VCS
      # - overlay-secrets.yaml
    needs:
      - mongodb/countly-mongodb
      - clickhouse/countly-clickhouse
      - kafka/countly-kafka

environments:
  production:
