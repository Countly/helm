# Example secrets overlay — copy this file and fill in real values
# DO NOT commit your actual secrets file (only this example template is safe to commit)
# Usage: cp overlay-secrets.yaml ../my-secrets.yaml && $EDITOR ../my-secrets.yaml
#        helm install countly ./charts/countly -f ... -f my-secrets.yaml

secrets:
  common:
    encryptionReportsKey: "my-encryption-key-here"
    webSessionSecret: "my-session-secret-here"
    passwordSecret: "my-password-secret-here"
  clickhouse:
    password: "clickhouse-password-here"
  kafka:
    securityProtocol: "SASL_SSL"
    saslMechanism: "SCRAM-SHA-512"
    saslUsername: "countly"
    saslPassword: "kafka-password-here"
