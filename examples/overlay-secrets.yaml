# Example secrets overlay (DO NOT commit to VCS)
# Usage: helm install countly ./charts/countly -f ... -f overlay-secrets.yaml

secrets:
  common:
    encryptionReportsKey: "my-encryption-key-here"
    webSessionSecret: "my-session-secret-here"
    passwordSecret: "my-password-secret-here"
  clickhouse:
    password: "clickhouse-password-here"
  kafka:
    securityProtocol: "SASL_SSL"
    saslMechanism: "SCRAM-SHA-512"
    saslUsername: "countly"
    saslPassword: "kafka-password-here"
