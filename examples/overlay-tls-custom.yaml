# =============================================================================
# TLS Overlay -- Bring Your Own Certificate
# =============================================================================
# Use your own TLS certificate and private key.
#
# PREREQUISITES:
#   Create the TLS secret BEFORE running helm install:
#     kubectl create namespace countly
#     kubectl create secret tls countly-tls \
#       --cert=path/to/tls.crt \
#       --key=path/to/tls.key \
#       -n countly
#
# USAGE:
#   helm install countly ./charts/countly \
#     -f values-common.yaml \
#     -f environments/tier1/values.yaml \
#     -f examples/overlay-tls-custom.yaml \
#     -n countly
#
# RENEWAL:
#   When your certificate expires, update the secret:
#     kubectl create secret tls countly-tls \
#       --cert=new-tls.crt --key=new-tls.key \
#       -n countly --dry-run=client -o yaml | kubectl apply -f -
# =============================================================================

ingress:
  tls:
    - hosts:
        - analytics.example.com            # CHANGEME: your real domain
      secretName: countly-tls              # Must match the secret you created
  hosts:
    - host: analytics.example.com          # CHANGEME: must match tls[].hosts
