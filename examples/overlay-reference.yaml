# =============================================================================
# Full Reference Overlay — every overridable value across all 4 Helm charts
# =============================================================================
# This single overlay file is applied to ALL 4 charts via helmfile.
# Each chart ignores keys it doesn't recognize.
#
# IMPORTANT: Some top-level keys exist in multiple charts with different
# structures. These are marked with [CHART-SPECIFIC] below. Since YAML
# does not allow duplicate keys, only one version can be active at a time.
# In practice, the tier files (environments/) handle the non-conflicting
# keys, and per-chart overlays handle the rest.
#
# Usage:
#   helmfile -f helmfile.yaml apply
#   (with this file listed in the values: array for each release)
# =============================================================================

# ─────────────────────────────────────────────────────────────────────────────
# GLOBAL (shared across all charts via values-common.yaml)
# ─────────────────────────────────────────────────────────────────────────────
global:
  imageRegistry: "myregistry.example.com"       # Prepended to all image names
  imagePullSecrets:                              # Secrets for private registries
    - name: my-registry-creds
  storageClass: "gp3"                            # Default SC for all PVCs
  clusterProfile: production                     # "small" or "production"
  scheduling:
    nodeSelector:                                # Global node selector
      workload: countly
    tolerations:                                 # Global tolerations
      - key: workload
        value: countly
        effect: NoSchedule

# ─────────────────────────────────────────────────────────────────────────────
# [CHART-SPECIFIC] Keys that exist in multiple charts
# ─────────────────────────────────────────────────────────────────────────────
# The following top-level keys have different structures per chart.
# Only ONE definition per key can exist in this file. Pick the chart you need,
# or use separate per-chart overlay files for conflicting keys.
#
#   image:
#     countly chart    → image: { repository, tag, pullPolicy }
#     clickhouse chart → image: { server, keeper }
#
#   version:
#     clickhouse chart → version: "26.2"    (ClickHouse server version)
#     kafka chart      → version: "4.2.0"   (Kafka version)
#
#   secrets:
#     countly chart    → secrets: { keep, rotationId, common, clickhouse, kafka, mongodb }
#     mongodb chart    → secrets: { keep }
#     clickhouse chart → secrets: { keep }
#     kafka chart      → secrets: { keep }
#
#   nameOverride / fullnameOverride / createNamespace:
#     All charts accept these but they are chart-scoped.
#
#   clickhouseNamespace:
#     countly chart    → clickhouseNamespace: clickhouse
#     kafka chart      → clickhouseNamespace: clickhouse

# ─────────────────────────────────────────────────────────────────────────────
# Using the countly chart's image structure (most commonly overridden):
image:
  repository: countly-unified                     # When global.imageRegistry is set, don't repeat registry here
  tag: "26.01"
  pullPolicy: IfNotPresent                       # Always | IfNotPresent | Never
# For the clickhouse chart, use a separate overlay or set in tier:
#   image:
#     server: clickhouse/clickhouse-server
#     keeper: clickhouse/clickhouse-keeper

nameOverride: ""
fullnameOverride: ""
createNamespace: false
clickhouseNamespace: clickhouse
kafkaNamespace: kafka

# =============================================================================
#  COUNTLY CHART  (charts/countly)
# =============================================================================

serviceAccount:
  create: true
  name: ""                                       # Auto-generated if empty
  annotations:
    eks.amazonaws.com/role-arn: "arn:aws:iam::role/countly"

# ─────────────────────────────────────────────────────────────────────────────
# COMPONENT: api
# ─────────────────────────────────────────────────────────────────────────────
api:
  enabled: true
  replicaCount: 2
  command: ["npm", "run", "start:api"]           # Container entrypoint
  port: 3001                                     # HTTP port
  healthCheck:
    path: /o/ping                                # Liveness/readiness endpoint
    initialDelaySeconds: 30
    periodSeconds: 30
    timeoutSeconds: 120
  terminationGracePeriodSeconds: 120
  resources:
    requests: { cpu: "1", memory: "3.5Gi" }
    limits: { cpu: "2", memory: "4Gi" }
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    metrics:
      cpu:
        averageUtilization: 70
      memory:
        averageUtilization: 80
    behavior:
      scaleUp:
        stabilizationWindowSeconds: 0
        policies:
          - type: Percent
            value: 100
            periodSeconds: 15
      scaleDown:
        stabilizationWindowSeconds: 300
        policies:
          - type: Percent
            value: 10
            periodSeconds: 60
  pdb:
    enabled: true
    minAvailable: 1
  scheduling:
    nodeSelector:
      workload: countly-api
    tolerations:
      - key: workload
        value: countly-api
        effect: NoSchedule
    affinity: {}                                 # Raw affinity override (replaces antiAffinity)
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: topology.kubernetes.io/zone
        whenUnsatisfiable: DoNotSchedule
    antiAffinity:
      enabled: true
      type: preferred                            # preferred | required
      topologyKey: kubernetes.io/hostname
      weight: 100                                # 1-100, only for "preferred"
  extraEnv:                                      # Additional env vars
    - name: MY_CUSTOM_VAR
      value: "my-value"
  extraEnvFrom:                                  # Inject from ConfigMap/Secret
    - configMapRef:
        name: my-extra-config

# ─────────────────────────────────────────────────────────────────────────────
# COMPONENT: frontend
# ─────────────────────────────────────────────────────────────────────────────
frontend:
  enabled: true
  replicaCount: 2
  command: ["npm", "run", "start:frontend"]
  port: 6001
  healthCheck:
    path: /ping
    initialDelaySeconds: 120
    periodSeconds: 30
    timeoutSeconds: 5
  terminationGracePeriodSeconds: 30
  resources:
    requests: { cpu: "1", memory: "2.5Gi" }
    limits: { cpu: "1", memory: "3Gi" }
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 4
    metrics:
      cpu:
        averageUtilization: 80
      memory: {}
    behavior: {}
  pdb:
    enabled: true
    minAvailable: 1
  scheduling:
    nodeSelector: {}
    tolerations: []
    affinity: {}
    topologySpreadConstraints: []
    antiAffinity:
      enabled: true
      type: preferred
      topologyKey: kubernetes.io/hostname
      weight: 100
  extraEnv: []
  extraEnvFrom: []

# ─────────────────────────────────────────────────────────────────────────────
# COMPONENT: ingestor
# ─────────────────────────────────────────────────────────────────────────────
ingestor:
  enabled: true
  replicaCount: 2
  command: ["npm", "run", "start:ingestor"]
  port: 3010
  healthCheck:
    path: /o/ping
    initialDelaySeconds: 30
    periodSeconds: 30
    timeoutSeconds: 120
  terminationGracePeriodSeconds: 120
  resources:
    requests: { cpu: "1", memory: "3Gi" }
    limits: { cpu: "2", memory: "4Gi" }
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 12
    metrics:
      cpu:
        averageUtilization: 65
      memory:
        averageUtilization: 75
    behavior: {}
  pdb:
    enabled: true
    minAvailable: 1
  scheduling:
    nodeSelector: {}
    tolerations: []
    affinity: {}
    topologySpreadConstraints: []
    antiAffinity:
      enabled: true
      type: preferred
      topologyKey: kubernetes.io/hostname
      weight: 100
  extraEnv: []
  extraEnvFrom: []

# ─────────────────────────────────────────────────────────────────────────────
# COMPONENT: aggregator  (Kafka consumer — no HTTP port)
# ─────────────────────────────────────────────────────────────────────────────
aggregator:
  enabled: true
  replicaCount: 4
  command: ["npm", "run", "start:aggregator"]
  port: 0                                        # No HTTP port
  healthCheck: {}                                # No HTTP health checks
  terminationGracePeriodSeconds: 60
  resources:
    requests: { cpu: "1", memory: "3.5Gi" }
    limits: { cpu: "2", memory: "4Gi" }
  hpa:
    enabled: true
    minReplicas: 4
    maxReplicas: 8
    metrics:
      cpu:
        averageUtilization: 65
      memory:
        averageUtilization: 65
    behavior:
      scaleUp:
        stabilizationWindowSeconds: 0
        policies:
          - type: Percent
            value: 100
            periodSeconds: 15
      scaleDown:
        stabilizationWindowSeconds: 300
        policies:
          - type: Percent
            value: 10
            periodSeconds: 60
  pdb:
    enabled: true
    minAvailable: 1
  scheduling:
    nodeSelector: {}
    tolerations: []
    affinity: {}
    topologySpreadConstraints: []
    antiAffinity:
      enabled: true
      type: preferred
      topologyKey: kubernetes.io/hostname
      weight: 100
  extraEnv: []
  extraEnvFrom: []

# ─────────────────────────────────────────────────────────────────────────────
# COMPONENT: jobserver
# ─────────────────────────────────────────────────────────────────────────────
jobserver:
  enabled: true
  replicaCount: 1
  command: ["npm", "run", "start:jobserver"]
  port: 3020
  healthCheck:
    path: /o/ping
    initialDelaySeconds: 120
    periodSeconds: 30
    timeoutSeconds: 5
  terminationGracePeriodSeconds: 30
  resources:
    requests: { cpu: "1", memory: "3Gi" }
    limits: { cpu: "1", memory: "3Gi" }
  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 1
    metrics:
      cpu:
        averageUtilization: 80
      memory:
        averageUtilization: 85
    behavior: {}
  pdb:
    enabled: false
  scheduling:
    nodeSelector: {}
    tolerations: []
    affinity: {}
    topologySpreadConstraints: []
    antiAffinity:
      enabled: false
  extraEnv: []
  extraEnvFrom: []

# ─────────────────────────────────────────────────────────────────────────────
# CONFIGURATION (env vars injected into components)
# ─────────────────────────────────────────────────────────────────────────────
config:
  common:
    NODE_ENV: production
    COUNTLY_PLUGINS: "mobile,web,desktop,plugins,density,locale,browser,sources,views,logger,systemlogs,populator,reports,crashes,push,star-rating,slipping-away-users,compare,server-stats,dbviewer,crash_symbolication,crash-analytics,alerts,onboarding,consolidate,remote-config,hooks,dashboards,sdk,data-manager,guides,heatmaps,retention_segments,formulas,funnels,cohorts,ab-testing,performance-monitoring,config-transfer,data-migration,two-factor-auth,blocking,concurrent_users,revenue,activity-map,flows,surveys,event-timeline,drill,multi,active_users,ip-blocker,kafka,clickhouse"
    COUNTLY_CONFIG__FILESTORAGE: gridfs
    COUNTLY_CONFIG__DRILL_EVENTS_DRIVER: clickhouse
    COUNTLY_CONFIG__SHARED_CONNECTION: "true"
    COUNTLY_CONFIG__DATABASE_ADAPTERPREFERENCE: '["clickhouse","mongodb"]'
    COUNTLY_CONFIG__DATABASE_ADAPTERS_MONGODB_ENABLED: "true"
    COUNTLY_CONFIG__DATABASE_ADAPTERS_CLICKHOUSE_ENABLED: "true"
    COUNTLY_CONFIG__DATABASE_FAILONCONNECTIONERROR: "true"
    COUNTLY_CONFIG__EVENTSINK_SINKS: '["kafka"]'
    COUNTLY_CONFIG__RELOADCONFIGAFTER: "10000"   # ms between config reloads

  api:
    COUNTLY_CONTAINER: api
    COUNTLY_CONFIG__API_PORT: "3001"
    COUNTLY_CONFIG__API_HOST: "0.0.0.0"
    COUNTLY_CONFIG__API_MAX_SOCKETS: "1024"
    COUNTLY_CONFIG__API_MAX_UPLOAD_FILE_SIZE: "209715200"   # 200MB
    COUNTLY_CONFIG__API_TIMEOUT: "120000"                   # ms

  frontend:
    COUNTLY_CONTAINER: frontend
    COUNTLY_CONFIG__WEB_PORT: "6001"
    COUNTLY_CONFIG__WEB_HOST: "0.0.0.0"
    COUNTLY_CONFIG__WEB_SECURE_COOKIES: "false"
    COUNTLY_CONFIG__COOKIE_MAXAGE: "86400000"               # 24h in ms

  ingestor:
    COUNTLY_CONTAINER: ingestor
    COUNTLY_CONFIG__INGESTOR_PORT: "3010"
    COUNTLY_CONFIG__INGESTOR_HOST: "0.0.0.0"

  aggregator:
    COUNTLY_CONTAINER: aggregator
    UV_THREADPOOL_SIZE: "6"

  jobserver:
    COUNTLY_CONTAINER: jobserver
    COUNTLY_CONFIG__JOBSERVER_PORT: "3020"

  clickhouse:
    COUNTLY_CONFIG__CLICKHOUSE_QUERYOPTIONS_MAX_EXECUTION_TIME: "600"
    COUNTLY_CONFIG__CLICKHOUSE_REQUEST_TIMEOUT: "1200000"
    COUNTLY_CONFIG__CLICKHOUSE_MAX_OPEN_CONNECTIONS: "10"
    COUNTLY_CONFIG__CLICKHOUSE_APPLICATION: countly_drill
    COUNTLY_CONFIG__CLICKHOUSE_COMPRESSION_REQUEST: "false"
    COUNTLY_CONFIG__CLICKHOUSE_COMPRESSION_RESPONSE: "false"
    COUNTLY_CONFIG__CLICKHOUSE_KEEP_ALIVE_ENABLED: "true"
    COUNTLY_CONFIG__CLICKHOUSE_KEEP_ALIVE_IDLE_SOCKET_TTL: "10000"
    COUNTLY_CONFIG__CLICKHOUSE_CLUSTER_NAME: countly_cluster
    COUNTLY_CONFIG__CLICKHOUSE_CLUSTER_SHARDS: "false"
    COUNTLY_CONFIG__CLICKHOUSE_CLUSTER_REPLICAS: "false"
    COUNTLY_CONFIG__CLICKHOUSE_CLUSTER_ISCLOUD: "false"
    COUNTLY_CONFIG__CLICKHOUSE_REPLICATION_COORDINATORTYPE: keeper
    COUNTLY_CONFIG__CLICKHOUSE_REPLICATION_ZKPATH: "/clickhouse/tables/{shard}/{database}/{table}"
    COUNTLY_CONFIG__CLICKHOUSE_REPLICATION_REPLICANAME: "{replica}"
    COUNTLY_CONFIG__CLICKHOUSE_PARALLELREPLICAS_ENABLED: "false"
    COUNTLY_CONFIG__CLICKHOUSE_PARALLELREPLICAS_MAXPARALLELREPLICAS: "2"
    COUNTLY_CONFIG__CLICKHOUSE_DISTRIBUTED_WRITETHROUGH: "true"
    COUNTLY_CONFIG__CLICKHOUSE_DISTRIBUTED_INSERTDISTRIBUTEDSYNC: "true"
    COUNTLY_CONFIG__CLICKHOUSE_DICTIONARY_NATIVEPORT: "9000"
    COUNTLY_CONFIG__CLICKHOUSE_DICTIONARY_SECURE: "false"
    COUNTLY_CONFIG__CLICKHOUSE_IDENTITY_DAYSOLD: "30"
    COUNTLY_CONFIG__CLICKHOUSE_IDENTITY_LIFETIME_MIN: "60"
    COUNTLY_CONFIG__CLICKHOUSE_IDENTITY_LIFETIME_MAX: "120"

  kafka:
    COUNTLY_CONFIG__KAFKA_ENABLED: "true"
    COUNTLY_CONFIG__KAFKA_DRILLEVENTSTOPIC: drill-events
    COUNTLY_CONFIG__KAFKA_CLUSTER_NAME: cly-kafka
    COUNTLY_CONFIG__KAFKA_PARTITIONS: "100"
    COUNTLY_CONFIG__KAFKA_REPLICATIONFACTOR: "2"
    COUNTLY_CONFIG__KAFKA_RETENTIONMS: "604800000"          # 7 days
    COUNTLY_CONFIG__KAFKA_ENABLETRANSACTIONS: "false"
    COUNTLY_CONFIG__KAFKA_TRANSACTIONTIMEOUT: "60000"
    COUNTLY_CONFIG__KAFKA_RDKAFKA_CLIENTID: countly-app
    COUNTLY_CONFIG__KAFKA_RDKAFKA_REQUESTTIMEOUTMS: "20000"
    COUNTLY_CONFIG__KAFKA_RDKAFKA_CONNECTIONTIMEOUTMS: "8000"
    COUNTLY_CONFIG__KAFKA_RDKAFKA_LINGERMS: "10"
    COUNTLY_CONFIG__KAFKA_RDKAFKA_RETRIES: "5"
    COUNTLY_CONFIG__KAFKA_RDKAFKA_ACKS: "-1"
    COUNTLY_CONFIG__KAFKA_CONSUMER_FETCHMINBYTES: "1024000"
    COUNTLY_CONFIG__KAFKA_CONSUMER_FETCHMAXWAITMS: "1200"
    COUNTLY_CONFIG__KAFKA_CONSUMER_SESSIONTIMEOUTMS: "120000"
    COUNTLY_CONFIG__KAFKA_CONSUMER_HEARTBEATINTERVALMS: "20000"
    COUNTLY_CONFIG__KAFKA_CONSUMER_AUTOOFFSETRESET: earliest
    COUNTLY_CONFIG__KAFKA_CONSUMER_ENABLEAUTOCOMMIT: "false"
    COUNTLY_CONFIG__KAFKA_CONSUMER_MAXPOLLINTERVALMS: "600000"

  otel:
    OTEL_ENABLED: "true"
    OTEL_EXPORTER_OTLP_ENDPOINT: "http://alloy.observability.svc.cluster.local:4318"
    OTEL_EXPORTER_OTLP_PROTOCOL: "http/protobuf"
    PYROSCOPE_ENABLED: "false"

# Node.js heap tuning per component
nodeOptions:
  api: "--max-old-space-size=3072 --max-semi-space-size=256"
  frontend: "--max-old-space-size=2048"
  ingestor: "--max-old-space-size=2048 --max-semi-space-size=256"
  aggregator: "--max-old-space-size=3072 --max-semi-space-size=128"
  jobserver: "--max-old-space-size=2048 --max-semi-space-size=256"

# ─────────────────────────────────────────────────────────────────────────────
# SECRETS (countly chart)
# ─────────────────────────────────────────────────────────────────────────────
secrets:
  keep: true                                     # Preserve secrets on helm uninstall
  rotationId: ""                                 # Change to trigger secret rotation

  common:
    existingSecret: ""                           # Use pre-existing K8s Secret name
    encryptionReportsKey: "my-encryption-key"    # Min 8 chars
    webSessionSecret: "my-session-secret"        # Min 8 chars
    passwordSecret: "my-password-secret"         # Min 8 chars

  clickhouse:
    existingSecret: ""                           # Use pre-existing K8s Secret name
    host: "ch.clickhouse.svc"
    port: "8123"
    username: "default"
    password: "clickhouse-password-here"
    database: "countly_drill"

  kafka:
    existingSecret: ""                           # Use pre-existing K8s Secret name
    brokers: "cly-kafka-kafka-bootstrap.kafka.svc:9092"
    securityProtocol: "SASL_SSL"                 # PLAINTEXT | SASL_PLAINTEXT | SASL_SSL | SSL
    saslMechanism: "SCRAM-SHA-512"               # SCRAM-SHA-512 | PLAIN | etc.
    saslUsername: "countly"
    saslPassword: "kafka-password-here"

  mongodb:
    existingSecret: "countly-mongodb-app-mongodb-conn"  # Created by MongoDB operator
    key: "connectionString.standard"
    connectionString: ""                         # Or provide directly

# NOTE: mongodb, clickhouse, and kafka charts also have:
#   secrets:
#     keep: true
# This is merged from the same file. The sub-keys (common, clickhouse, etc.)
# are ignored by those charts since they don't define them in their schema.

# ─────────────────────────────────────────────────────────────────────────────
# INGRESS (countly chart)
# ─────────────────────────────────────────────────────────────────────────────
ingress:
  enabled: true
  className: nginx
  annotations:
    # F5 NGINX Ingress Controller (OSS) annotations
    nginx.org/client-max-body-size: "50m"
    nginx.org/proxy-buffering: "True"
    nginx.org/proxy-buffer-size: "256k"
    nginx.org/proxy-buffers: "16 256k"
    nginx.org/proxy-busy-buffers-size: "512k"
    nginx.org/proxy-max-temp-file-size: "2048m"
    nginx.org/client-body-buffer-size: "2m"
    nginx.org/proxy-connect-timeout: "60s"
    nginx.org/proxy-read-timeout: "120s"
    nginx.org/proxy-send-timeout: "120s"
    nginx.org/keepalive: "256"
    nginx.org/server-snippets: |
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Port $server_port;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Scheme $scheme;
      proxy_set_header Connection "";
      proxy_set_header X-Request-ID $request_id;
      proxy_set_header X-Request-Start $msec;
      proxy_set_header traceparent $http_traceparent;
      proxy_set_header tracestate $http_tracestate;
      client_header_timeout 30s;
    nginx.org/location-snippets: |
      proxy_request_buffering on;
      proxy_next_upstream error timeout http_502 http_503 http_504;
      proxy_next_upstream_timeout 30s;
      proxy_next_upstream_tries 3;
      proxy_temp_file_write_size 1m;
      client_body_timeout 120s;
  tls:
    - hosts:
        - analytics.example.com
      secretName: analytics-tls
  # TLS certificate generation (dev/test only)
  # For production, use cert-manager or provide your own secret.
  selfSignedCert:
    enabled: true                                   # false for production
    secretName: analytics-tls                       # Must match tls[].secretName
    cn: analytics.example.com                       # Common name / SAN
    daysValid: 365
  hosts:
    - host: analytics.example.com

# ─────────────────────────────────────────────────────────────────────────────
# INGRESS CONTROLLER OBSERVABILITY (k8s/ingress/f5-nginx-values.yaml)
# ─────────────────────────────────────────────────────────────────────────────
# These values are NOT part of the Countly Helm chart — they are set in the
# F5 NGINX Ingress Controller's own values file (k8s/ingress/f5-nginx-values.yaml).
# Shown here for reference only.
#
# Prometheus metrics:
#   prometheus:
#     create: true                 # false to disable metrics endpoint
#     port: 9113
#     serviceMonitor:
#       create: false              # true if using Prometheus Operator
#
# OpenTelemetry tracing (disabled by default):
#   controller.config.entries:
#     otel-exporter-endpoint: "http://alloy.observability.svc.cluster.local:4317"
#     otel-service-name: "nginx-ingress"
#     otel-trace-in-http: "true"


# =============================================================================
#  MONGODB CHART  (charts/countly-mongodb)
# =============================================================================

mongodb:
  version: "8.2.5"
  members: 3                                     # ReplicaSet size (1, 3, 5)
  image: quay.io/mongodb/mongodb-community-server
  imageTag: ""                                   # Defaults to <version>-ubi8

  resources:
    requests: { cpu: "3", memory: "6Gi" }
    limits: { cpu: "4", memory: "8Gi" }

  persistence:
    storageClass: "gp3"
    size: 500Gi

  scheduling:
    nodeSelector:
      workload: mongodb
    tolerations: []
    affinity: {}
    antiAffinity:
      enabled: true
      type: preferred                            # preferred | required
      topologyKey: kubernetes.io/hostname
      weight: 100

  tls:
    enabled: false

users:
  app:
    name: app
    database: admin
    roles:
      - { name: readWriteAnyDatabase, db: admin }
      - { name: dbAdmin, db: countly }
    passwordSecretName: app-user-password
    passwordSecretKey: password
    password: ""                                 # Required on first install
  metrics:
    enabled: true
    name: metrics
    database: admin
    roles:
      - { name: clusterMonitor, db: admin }
      - { name: read, db: local }
    passwordSecretName: metrics-user-password
    passwordSecretKey: password
    password: ""

exporter:
  enabled: true
  image: percona/mongodb_exporter:0.40.0
  port: 9216
  resources:
    requests: { cpu: "50m", memory: "64Mi" }
    limits: { cpu: "200m", memory: "256Mi" }
  args:
    - --collect-all
    - --collector.diagnosticdata
    - --collector.replicasetstatus
    - --collector.dbstats
    - --collector.topmetrics
    - --collector.indexstats
    - --collector.collstats


# =============================================================================
#  CLICKHOUSE CHART  (charts/countly-clickhouse)
# =============================================================================
# NOTE: The following keys conflict with other charts and use the clickhouse
# chart's structure here. See [CHART-SPECIFIC] note above.
#
#   version: "26.2"             ← clickhouse version (kafka uses version: "4.2.0")
#   image:                      ← already defined above with countly structure
#     server: clickhouse/clickhouse-server
#     keeper: clickhouse/clickhouse-keeper

clickhouseOperator:
  apiVersion: clickhouse.com/v1alpha1

# version: "26.2"              # ← Would conflict with kafka's version key

shards: 1                                        # Number of shards
replicas: 2                                      # Replicas per shard

database: countly_drill

auth:
  defaultUserPassword:
    existingSecret: ""                           # Use pre-existing K8s Secret
    secretName: clickhouse-default-password
    key: password
    password: ""                                 # Required if no existingSecret

server:
  resources:
    requests: { cpu: "4", memory: "12Gi" }
    limits: { cpu: "4", memory: "16Gi" }
  persistence:
    storageClass: "gp3"
    size: 500Gi
  settings:
    maxConnections: 4096
    extraConfig: ""                              # Raw config.xml XML snippet
    extraUsersConfig: ""                          # Raw users.xml XML snippet
  scheduling:
    nodeSelector:
      workload: clickhouse
    tolerations: []
    affinity: {}
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: topology.kubernetes.io/zone
        whenUnsatisfiable: DoNotSchedule
    antiAffinity:
      enabled: true
      type: preferred
      topologyKey: kubernetes.io/hostname
      weight: 100

keeper:
  replicas: 3
  resources:
    requests: { cpu: "500m", memory: "1Gi" }
    limits: { cpu: "1", memory: "2Gi" }
  persistence:
    storageClass: "gp3"
    size: 50Gi
  scheduling:
    nodeSelector: {}
    tolerations: []
    affinity: {}
    antiAffinity:
      enabled: true
      type: preferred
      topologyKey: kubernetes.io/hostname
      weight: 100

podDisruptionBudget:
  server:
    enabled: true
    maxUnavailable: 1
  keeper:
    enabled: true
    maxUnavailable: 1


# =============================================================================
#  KAFKA CHART  (charts/countly-kafka)
# =============================================================================
# NOTE: The following keys conflict with other charts:
#
#   version: "4.2.0"            ← kafka version (clickhouse uses version: "26.2")
#   clickhouseNamespace:        ← already defined above

strimzi:
  apiVersion: kafka.strimzi.io/v1beta2

# version: "4.2.0"             # ← Would conflict with clickhouse's version key

brokers:
  replicas: 3
  resources:
    requests: { cpu: "2", memory: "12Gi" }
    limits: { cpu: "2", memory: "12Gi" }
  jvmOptions:
    xms: "4g"
    xmx: "4g"
  persistence:
    volumes:
      - id: 0
        size: 200Gi
        storageClass: "gp3"
    deleteClaim: false                           # Keep PVCs on uninstall
  config:
    default.replication.factor: 2
    min.insync.replicas: 1
    log.retention.hours: 168                     # 7 days
    log.segment.bytes: "1073741824"              # 1 GB
    compression.type: lz4
    auto.create.topics.enable: true
    offsets.topic.replication.factor: 2
    num.partitions: 24
    transaction.state.log.replication.factor: 2
  scheduling:
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: DoNotSchedule

controllers:
  replicas: 3
  resources:
    requests: { cpu: "500m", memory: "2Gi" }
    limits: { cpu: "1", memory: "2Gi" }
  persistence:
    size: 20Gi
    storageClass: "gp3"
  scheduling:
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: DoNotSchedule

listeners:
  - name: internal
    port: 9092
    type: internal
    tls: false

cruiseControl:
  enabled: true
  resources:
    requests: { cpu: "1", memory: "2Gi" }
    limits: { cpu: "1", memory: "2Gi" }
  jvmOptions:
    xms: "1g"
    xmx: "2g"
  autoRebalance:
    - mode: add-brokers
    - mode: remove-brokers

kafkaConnect:
  enabled: true
  name: connect-ch
  image: "countly/kafka-connect-clickhouse:1.3.5"
  replicas: 2
  bootstrapServers: ""                           # Auto-resolved if empty
  resources:
    requests: { cpu: "2", memory: "8Gi" }
    limits: { cpu: "2", memory: "8Gi" }
  jvmOptions:
    xms: "5g"
    xmx: "5g"
  workerConfig:
    group.id: connect-ch
    config.storage.topic: connect_ch_configs
    offset.storage.topic: connect_ch_offsets
    status.storage.topic: connect_ch_status
    config.storage.replication.factor: 2
    offset.storage.replication.factor: 2
    status.storage.replication.factor: 2
    offset.storage.partitions: 25
    status.storage.partitions: 5
    key.converter: org.apache.kafka.connect.storage.StringConverter
    value.converter: org.apache.kafka.connect.json.JsonConverter
    value.converter.schemas.enable: "false"
    connector.client.config.override.policy: All
    config.providers: env
    config.providers.env.class: org.apache.kafka.common.config.provider.EnvVarConfigProvider
  clickhouse:
    existingSecret: ""                           # Use pre-existing K8s Secret
    secretName: clickhouse-auth
    host: ""                                     # Auto-resolved if empty
    port: "8123"
    ssl: "false"
    database: "countly_drill"
    username: "default"
    password: ""
  env:
    EXACTLY_ONCE: "false"
    ERRORS_RETRY_TIMEOUT: "300"
    ERRORS_TOLERANCE: "none"                     # "none" | "all"
    CLICKHOUSE_SETTINGS: "input_format_binary_read_json_as_string=1,allow_experimental_json_type=1,enable_json_type=1,async_insert=1,wait_for_async_insert=1,async_insert_use_adaptive_busy_timeout=1,async_insert_busy_timeout_ms=10000,async_insert_max_data_size=268435456,async_insert_max_query_number=64,min_insert_block_size_rows=250000,min_insert_block_size_bytes=268435456,max_partitions_per_insert_block=500"
    BYPASS_ROW_BINARY: "false"
    TABLE_REFRESH_INTERVAL: "300"
    KEY_CONVERTER: org.apache.kafka.connect.storage.StringConverter
    VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
    VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
    KAFKA_CONSUMER_FETCH_MIN_BYTES: "33554432"          # 32 MB
    KAFKA_CONSUMER_FETCH_MAX_WAIT_MS: "60000"           # 60s
    KAFKA_CONSUMER_MAX_POLL_RECORDS: "250000"
    KAFKA_CONSUMER_MAX_PARTITION_FETCH_BYTES: "134217728" # 128 MB
    KAFKA_CONSUMER_FETCH_MAX_BYTES: "536870912"         # 512 MB
    KAFKA_CONSUMER_MAX_POLL_INTERVAL_MS: "900000"       # 15 min
    KAFKA_CONSUMER_SESSION_TIMEOUT_MS: "45000"
    KAFKA_CONSUMER_HEARTBEAT_INTERVAL_MS: "15000"
    KAFKA_CONSUMER_REQUEST_TIMEOUT_MS: "120000"
  scheduling:
    nodeSelector: {}
    tolerations: []
    affinity: {}
    antiAffinity:
      enabled: true
      type: preferred
      topologyKey: kubernetes.io/hostname
      weight: 100
  connectors:
    - name: ch-sink-drill-events
      enabled: true
      state: running                             # running | paused
      class: com.clickhouse.kafka.connect.ClickHouseSinkConnector
      tasksMax: 1
      autoRestart:
        enabled: true
        maxRestarts: 10
      config:
        topics: drill-events
        topic2TableMap: "drill-events=drill_events"
        hostname: "${env:CLICKHOUSE_HOST}"
        port: "${env:CLICKHOUSE_PORT}"
        ssl: "${env:CLICKHOUSE_SSL}"
        database: "${env:CLICKHOUSE_DB}"
        username: "${env:CLICKHOUSE_USER}"
        password: "${env:CLICKHOUSE_PASSWORD}"
        exactlyOnce: "${env:EXACTLY_ONCE}"
        errors.retry.timeout: "${env:ERRORS_RETRY_TIMEOUT}"
        errors.tolerance: "${env:ERRORS_TOLERANCE}"
        clickhouseSettings: "${env:CLICKHOUSE_SETTINGS}"
        bypassRowBinary: "${env:BYPASS_ROW_BINARY}"
        tableRefreshInterval: "${env:TABLE_REFRESH_INTERVAL}"
        key.converter: "${env:KEY_CONVERTER}"
        value.converter: "${env:VALUE_CONVERTER}"
        value.converter.schemas.enable: "${env:VALUE_CONVERTER_SCHEMAS_ENABLE}"
        consumer.override.fetch.min.bytes: "${env:KAFKA_CONSUMER_FETCH_MIN_BYTES}"
        consumer.override.fetch.max.wait.ms: "${env:KAFKA_CONSUMER_FETCH_MAX_WAIT_MS}"
        consumer.override.max.poll.records: "${env:KAFKA_CONSUMER_MAX_POLL_RECORDS}"
        consumer.override.max.partition.fetch.bytes: "${env:KAFKA_CONSUMER_MAX_PARTITION_FETCH_BYTES}"
        consumer.override.fetch.max.bytes: "${env:KAFKA_CONSUMER_FETCH_MAX_BYTES}"
        consumer.override.request.timeout.ms: "${env:KAFKA_CONSUMER_REQUEST_TIMEOUT_MS}"
        consumer.override.max.poll.interval.ms: "${env:KAFKA_CONSUMER_MAX_POLL_INTERVAL_MS}"
        consumer.override.session.timeout.ms: "${env:KAFKA_CONSUMER_SESSION_TIMEOUT_MS}"
        consumer.override.heartbeat.interval.ms: "${env:KAFKA_CONSUMER_HEARTBEAT_INTERVAL_MS}"
        connection.timeout: "60"
        socket.timeout: "30000"
        retry.count: "3"
        connection.pool.size: "10"
        healthcheck.enabled: "true"
        healthcheck.interval: "10000"
      dlq: {}
