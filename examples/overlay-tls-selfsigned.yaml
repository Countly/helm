# =============================================================================
# TLS Overlay -- Self-Signed via cert-manager (local development)
# =============================================================================
# Uses cert-manager to create a self-signed CA and issue TLS certificates
# automatically. Browsers will show a certificate warning (expected).
#
# PREREQUISITES:
#   1. cert-manager is installed in the cluster (already required for
#      ClickHouse Operator)
#
# USAGE:
#   helm install countly ./charts/countly \
#     -f values-common.yaml \
#     -f environments/local/values.yaml \
#     -f examples/overlay-tls-selfsigned.yaml \
#     -n countly --create-namespace
#
# WHAT IT CREATES:
#   1. SelfSigned ClusterIssuer (bootstrap)
#   2. CA Certificate in cert-manager namespace
#   3. CA ClusterIssuer (signs TLS certs for Ingress)
#   cert-manager then auto-provisions TLS certs via Ingress annotation.
# =============================================================================

tls:
  selfSigned:
    enabled: true
    issuerName: countly-ca-issuer
    caSecretName: countly-ca-keypair

ingress:
  annotations:
    cert-manager.io/cluster-issuer: countly-ca-issuer
  tls:
    - hosts:
        - countly.local                       # CHANGEME: your local hostname
      secretName: countly-tls
  hosts:
    - host: countly.local                     # CHANGEME: must match tls[].hosts
